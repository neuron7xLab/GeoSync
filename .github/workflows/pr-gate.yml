name: PR Gate

on:
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-gate-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  repo-policy:
    name: repo-policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Validate workflow policy invariants
        run: |
          set -euo pipefail
          for wf in .github/workflows/*.yml; do
            grep -Eq '^permissions:' "$wf" || { echo "ERROR: $wf missing permissions"; exit 1; }
            if grep -Eq '^\s*pull_request_target:' "$wf"; then
              echo "ERROR: $wf uses forbidden pull_request_target"
              exit 1
            fi
          done

      - name: Enforce pinned actions policy
        run: |
          set -euo pipefail
          python - <<'PY'
          import re
          from pathlib import Path

          pattern = re.compile(r'^\s*uses:\s*([^\s#]+)')
          violations = []
          for wf in sorted(Path('.github/workflows').glob('*.yml')):
              for lineno, line in enumerate(wf.read_text(encoding='utf-8').splitlines(), start=1):
                  m = pattern.search(line)
                  if not m:
                      continue
                  ref = m.group(1)
                  if ref.startswith('./') or ref.startswith('docker://'):
                      continue
                  if not re.search(r'@[a-f0-9]{40}$', ref):
                      violations.append(f"{wf}:{lineno}: unpinned action reference: {ref}")

          if violations:
              print('\n'.join(violations))
              raise SystemExit(1)
          print('Pinned action policy passed.')
          PY

      - name: Actionlint validation
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD":/repo -w /repo rhysd/actionlint:1.7.8 -color

  python-quality:
    name: python-quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Setup Python environment
        uses: ./.github/actions/setup-tradepulse
        with:
          python-version: '3.11'
          cache-prefix: pr-quality

      - name: Verify pip executable and Python contract
        run: |
          set -euo pipefail
          .venv/bin/python -m pip --version
          .venv/bin/python - <<'PY'
          import tomllib
          from pathlib import Path

          requires = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))['project']['requires-python']
          if requires != '>=3.11,<3.13':
              raise SystemExit(f'Unexpected requires-python: {requires}')
          print(f'requires-python validated: {requires}')
          PY

      - name: Run lint/type gate on changed Python files
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_ref="origin/${{ github.base_ref }}"
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            changed_files=$(git diff --name-only "$base_ref...$GITHUB_SHA")
          else
            changed_files=$(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")
          fi

          mapfile -t py_files < <(echo "$changed_files" | grep -E '\.py$' || true)
          if [[ ${#py_files[@]} -eq 0 ]]; then
            echo "No Python file changes detected; python-quality passes."
            exit 0
          fi

          .venv/bin/ruff check "${py_files[@]}"
          .venv/bin/black --check "${py_files[@]}"
          .venv/bin/mypy "${py_files[@]}"

  python-fast-tests:
    name: python-fast-tests
    runs-on: ubuntu-latest
    needs: python-quality
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Setup Python environment
        uses: ./.github/actions/setup-tradepulse
        with:
          python-version: '3.11'
          cache-prefix: pr-fast-tests

      - name: Verify pip executable
        run: .venv/bin/python -m pip --version

      - name: Run fast deterministic pytest gate
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_ref="origin/${{ github.base_ref }}"
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            changed_files=$(git diff --name-only "$base_ref...$GITHUB_SHA")
          else
            changed_files=$(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")
          fi

          if ! echo "$changed_files" | grep -Eq '^(tests/|core/|backtest/|execution/|src/|pyproject\.toml|requirements(\-dev)?\.(txt|lock)|pytest\.ini)'; then
            echo "No Python runtime/test surface changes detected; python-fast-tests passes."
            exit 0
          fi

          .venv/bin/pytest tests/ -m "not slow and not heavy_math and not nightly and not flaky" -q

  frontend-gate:
    name: frontend-gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Determine if frontend gate applies
        id: changes
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_ref="origin/${{ github.base_ref }}"
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            changed_files=$(git diff --name-only "$base_ref...$GITHUB_SHA")
          else
            changed_files=$(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")
          fi

          if echo "$changed_files" | grep -Eq '^(apps/web/|package\.json|package-lock\.json)$'; then
            echo "frontend_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify frontend lockfile
        if: steps.changes.outputs.frontend_changed == 'true'
        run: test -f apps/web/package-lock.json

      - name: Setup Node.js
        if: steps.changes.outputs.frontend_changed == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Run frontend quality and tests
        if: steps.changes.outputs.frontend_changed == 'true'
        working-directory: apps/web
        run: |
          npm ci
          npm run format:check
          npm run lint
          npm run typecheck
          npm run test -- --ci

      - name: Frontend gate not applicable
        if: steps.changes.outputs.frontend_changed != 'true'
        run: echo 'No frontend changes detected; frontend gate passed deterministically.'

  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Setup Python environment
        uses: ./.github/actions/setup-tradepulse
        with:
          python-version: '3.11'
          cache-prefix: pr-deps

      - name: Verify pip executable
        run: .venv/bin/python -m pip --version

      - name: Dependency review gate
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_ref="origin/${{ github.base_ref }}"
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            changed_files=$(git diff --name-only "$base_ref...$GITHUB_SHA")
          else
            changed_files=$(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")
          fi

          python_dep_changed=false
          frontend_dep_changed=false

          if echo "$changed_files" | grep -Eq '^(requirements(\-dev)?\.(txt|lock)|constraints/security\.txt|pyproject\.toml)$'; then
            python_dep_changed=true
          fi

          if echo "$changed_files" | grep -Eq '^(apps/web/package(-lock)?\.json|package\.json|package-lock\.json)$'; then
            frontend_dep_changed=true
          fi

          if [[ "$python_dep_changed" == "true" ]]; then
            echo "Python dependency manifests changed; running HIGH/CRITICAL pip-audit."
            .venv/bin/pip-audit -r requirements.lock --severity high
            .venv/bin/pip-audit -r requirements-dev.lock --severity high
          fi

          if [[ "$frontend_dep_changed" == "true" ]]; then
            echo "Frontend dependency manifests changed; running npm audit HIGH gate."
            test -f apps/web/package-lock.json
            pushd apps/web >/dev/null
            npm ci
            npm audit --audit-level=high --omit=dev
            popd >/dev/null
          fi

          if [[ "$python_dep_changed" == "false" && "$frontend_dep_changed" == "false" ]]; then
            echo "No dependency-manifest changes detected; dependency-review passes."
          fi

  secrets-supply-chain:
    name: secrets-supply-chain
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Setup Python environment
        uses: ./.github/actions/setup-tradepulse
        with:
          python-version: '3.11'
          cache-prefix: pr-security

      - name: Verify pip executable
        run: .venv/bin/python -m pip --version

      - name: Collect changed files
        id: changed
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_ref="origin/${{ github.base_ref }}"
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            git diff --name-only "$base_ref...$GITHUB_SHA" > /tmp/changed-files.txt
          else
            git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA" > /tmp/changed-files.txt
          fi
          cat /tmp/changed-files.txt

      - name: Bandit on changed security-critical Python files
        run: |
          set -euo pipefail
          mapfile -t bandit_targets < <(grep -E '^(core|backtest|execution|src)/.*\.py$' /tmp/changed-files.txt || true)
          if [[ ${#bandit_targets[@]} -eq 0 ]]; then
            echo "No security-critical Python changes detected; Bandit gate passes."
          else
            .venv/bin/bandit -ll "${bandit_targets[@]}"
          fi

      - name: Detect-secrets using baseline
        run: |
          set -euo pipefail
          mapfile -t existing_changed_files < <(while IFS= read -r f; do [[ -f "$f" ]] && echo "$f"; done < /tmp/changed-files.txt)
          if [[ ${#existing_changed_files[@]} -eq 0 ]]; then
            echo "No file additions/modifications to scan; secrets gate passes."
            exit 0
          fi

          .venv/bin/detect-secrets-hook --baseline .github/detect-secrets.baseline "${existing_changed_files[@]}"

      - name: HIGH/CRITICAL dependency audit guard
        run: |
          .venv/bin/pip-audit -r requirements.lock --severity high
          .venv/bin/pip-audit -r requirements-dev.lock --severity high
