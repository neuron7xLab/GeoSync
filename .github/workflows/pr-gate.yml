name: PR Gate

on:
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-gate-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  repo-policy:
    name: repo-policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Validate workflow YAML and policy invariants
        run: |
          python -m pip install --upgrade pip pyyaml
          python - <<'PY'
          from pathlib import Path
          import sys
          import yaml

          errors = []
          for wf in sorted(Path('.github/workflows').glob('*.yml')):
              try:
                  with wf.open('r', encoding='utf-8') as fh:
                      data = yaml.safe_load(fh)
              except Exception as exc:
                  errors.append(f"{wf}: invalid YAML ({exc})")
                  continue
              if not isinstance(data, dict):
                  errors.append(f"{wf}: workflow root must be a mapping")
                  continue
              text = wf.read_text(encoding='utf-8')
              if 'pull_request_target:' in text:
                  errors.append(f"{wf}: pull_request_target is forbidden for untrusted PR code")
              if 'permissions:' not in text:
                  errors.append(f"{wf}: missing explicit permissions block")

          if errors:
              print('\n'.join(f"ERROR: {e}" for e in errors))
              sys.exit(1)
          print('All workflow policy checks passed.')
          PY

  python-quality:
    name: python-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Python environment
        uses: ./.github/actions/setup-tradepulse
        with:
          python-version: '3.11'
          cache-prefix: pr-quality

      - name: Lint and type-check
        run: |
          .venv/bin/ruff check .
          .venv/bin/black --check .
          .venv/bin/mypy --config-file mypy.ini

  python-fast-tests:
    name: python-fast-tests
    runs-on: ubuntu-latest
    needs: python-quality
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Python environment
        uses: ./.github/actions/setup-tradepulse
        with:
          python-version: '3.11'
          cache-prefix: pr-fast-tests

      - name: Run fast deterministic pytest gate
        run: |
          .venv/bin/pytest tests/ -m "not slow and not heavy_math and not nightly and not flaky" -q

  frontend-gate:
    name: frontend-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Detect frontend changes
        id: changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            frontend:
              - 'apps/web/**'
              - 'package*.json'
              - '.github/workflows/pr-gate.yml'

      - name: Setup Node.js
        if: steps.changes.outputs.frontend == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Run frontend quality and tests
        if: steps.changes.outputs.frontend == 'true'
        working-directory: apps/web
        run: |
          npm ci
          npm run format:check
          npm run lint
          npm run typecheck
          npm run test -- --ci

      - name: Frontend gate not applicable
        if: steps.changes.outputs.frontend != 'true'
        run: echo 'No frontend changes detected; frontend gate passed deterministically.'

  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0

  dependency-review-merge-group:
    name: dependency-review
    runs-on: ubuntu-latest
    if: github.event_name == 'merge_group'
    steps:
      - run: echo 'dependency-review is pull_request-only; merge_group pass-through for stable required check.'

  secrets-supply-chain:
    name: secrets-supply-chain
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Python environment
        uses: ./.github/actions/setup-tradepulse
        with:
          python-version: '3.11'
          cache-prefix: pr-security

      - name: Bandit SAST gate
        run: .venv/bin/bandit -r core backtest execution src -ll

      - name: Detect hardcoded secrets
        run: |
          .venv/bin/detect-secrets scan --all-files > .secrets.baseline
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('.secrets.baseline').read_text(encoding='utf-8'))
          findings = data.get('results', {})
          count = sum(len(v) for v in findings.values())
          if count:
              raise SystemExit(f'Potential secrets found: {count}')
          print('No secrets detected.')
          PY
