name: PR Gate

on:
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-gate-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  repo-policy:
    name: repo-policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Validate workflow policy invariants
        run: |
          set -euo pipefail
          for wf in .github/workflows/*.yml; do
            grep -Eq '^permissions:' "$wf" || { echo "ERROR: $wf missing permissions"; exit 1; }
            if grep -Eq '^\s*pull_request_target:' "$wf"; then
              echo "ERROR: $wf uses forbidden pull_request_target"
              exit 1
            fi
          done
          echo "All workflow policy checks passed."

  python-quality:
    name: python-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Python environment
        uses: ./.github/actions/setup-tradepulse
        with:
          python-version: '3.11'
          cache-prefix: pr-quality

      - name: Lint and type-check
        run: |
          .venv/bin/ruff check .
          .venv/bin/black --check .
          .venv/bin/mypy --config-file mypy.ini

  python-fast-tests:
    name: python-fast-tests
    runs-on: ubuntu-latest
    needs: python-quality
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Python environment
        uses: ./.github/actions/setup-tradepulse
        with:
          python-version: '3.11'
          cache-prefix: pr-fast-tests

      - name: Run fast deterministic pytest gate
        run: |
          .venv/bin/pytest tests/ -m "not slow and not heavy_math and not nightly and not flaky" -q

  frontend-gate:
    name: frontend-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Determine if frontend gate applies
        id: changes
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_ref="origin/${{ github.base_ref }}"
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            changed_files=$(git diff --name-only "$base_ref...$GITHUB_SHA")
          else
            changed_files=$(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")
          fi

          if echo "$changed_files" | grep -Eq '^(apps/web/|package\.json|package-lock\.json|\.github/workflows/pr-gate\.yml)'; then
            echo "frontend_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.changes.outputs.frontend_changed == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Run frontend quality and tests
        if: steps.changes.outputs.frontend_changed == 'true'
        working-directory: apps/web
        run: |
          npm ci
          npm run format:check
          npm run lint
          npm run typecheck
          npm run test -- --ci

      - name: Frontend gate not applicable
        if: steps.changes.outputs.frontend_changed != 'true'
        run: echo 'No frontend changes detected; frontend gate passed deterministically.'

  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Setup Python environment
        uses: ./.github/actions/setup-tradepulse
        with:
          python-version: '3.11'
          cache-prefix: pr-deps

      - name: Dependency review gate
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_ref="origin/${{ github.base_ref }}"
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            changed_files=$(git diff --name-only "$base_ref...$GITHUB_SHA")
          else
            changed_files=$(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")
          fi

          if echo "$changed_files" | grep -Eq '^(requirements(\-dev)?\.(txt|lock)|constraints/security\.txt|pyproject\.toml|apps/web/package(-lock)?\.json)$'; then
            echo "Dependency manifests changed; running high-severity audits."
            .venv/bin/pip-audit -r requirements.lock --severity high
            .venv/bin/pip-audit -r requirements-dev.lock --severity high
          else
            echo "No dependency-manifest changes detected; dependency-review passes."
          fi

  secrets-supply-chain:
    name: secrets-supply-chain
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Python environment
        uses: ./.github/actions/setup-tradepulse
        with:
          python-version: '3.11'
          cache-prefix: pr-security

      - name: Bandit SAST gate
        run: .venv/bin/bandit -r core backtest execution src -ll

      - name: Detect hardcoded secrets
        run: |
          .venv/bin/detect-secrets scan --all-files > .secrets.baseline
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('.secrets.baseline').read_text(encoding='utf-8'))
          findings = data.get('results', {})
          count = sum(len(v) for v in findings.values())
          if count:
              raise SystemExit(f'Potential secrets found: {count}')
          print('No secrets detected.')
          PY
