name: Security Deep Validation

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-deep-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dependency-audit:
    name: dependency-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Python environment
        uses: ./.github/actions/setup-geosync
        with:
          python-version: '3.11'
          cache-prefix: security-deep

      - name: Verify pip executable
        run: .venv/bin/python -m pip --version

      - name: Ensure pip-audit tooling
        run: |
          set -euo pipefail
          if ! .venv/bin/python -m pip show pip-audit >/dev/null 2>&1; then
            .venv/bin/python -m pip install -c constraints/security.txt pip-audit
          fi

      - name: Run pip-audit against locked dependency sets
        run: |
          .venv/bin/pip-audit -r requirements.lock -f json -o /tmp/pip-audit-runtime.json || true
          .venv/bin/pip-audit -r requirements-dev.lock -f json -o /tmp/pip-audit-dev.json || true
          .venv/bin/python .github/scripts/pip_audit_high_gate.py /tmp/pip-audit-runtime.json /tmp/pip-audit-dev.json

  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.120.0
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Run Semgrep
        run: semgrep scan --config auto --error

  codeql:
    name: codeql
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript, go]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@c10b8064de6f491fea524254123dbe5e09572f13 # v3

      - name: Analyze
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v3
