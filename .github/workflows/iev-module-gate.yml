# SPDX-License-Identifier: MIT
#
# IEV module gate — fail-closed verification of the Inference Extrapolation
# Validator artifact. Runs on every change to the module directory or the
# workflow itself; never globs the rest of the repo.
#
# Invariants:
#   * permissions: least-privilege (contents:read).
#   * All actions pinned by 40-char commit SHA (repo-policy invariant).
#   * Three deterministic checks: schema-bound unit tests, falsifier battery,
#     example artifact verification (exit 0 = pass; 2 = contract violation).
name: iev-module-gate

on:
  pull_request:
    paths:
      - 'artifacts/inference_extrapolation_validator/**'
      - '.github/workflows/iev-module-gate.yml'
  push:
    paths:
      - 'artifacts/inference_extrapolation_validator/**'
      - '.github/workflows/iev-module-gate.yml'

permissions:
  contents: read

jobs:
  validate-iev:
    name: validate-iev
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
      - name: Install jsonschema
        run: python -m pip install --upgrade pip jsonschema
      - name: Unit tests
        run: python -m unittest artifacts/inference_extrapolation_validator/test_generate_artifact.py -v
      - name: Falsifier battery
        run: python artifacts/inference_extrapolation_validator/falsifier.py
      - name: End-to-end proof (dynamic timestamps)
        run: bash artifacts/inference_extrapolation_validator/scripts/brutal_e2e_proof.sh
