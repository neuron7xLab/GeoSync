# SPDX-License-Identifier: LicenseRef-TradePulse-Proprietary
[pytest]
addopts = -q -ra --maxfail=50 --continue-on-collection-errors -W error::DeprecationWarning --import-mode=importlib
testpaths =
    tests
    core/neuro/tests
    tests/regression
python_files = test_*.py
pythonpath = .
asyncio_default_fixture_loop_scope = function
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    optional: marks tests that require optional dependencies
    arm: cross-architecture and portability checks for indicators
    heavy_math: compute-intensive suites that gate pull requests
    flaky: quarantined scenarios executed in dedicated CI jobs with reruns
    nightly: full-fidelity regression suites executed in nightly pipelines
    integration: replayable integration suites exercising end-to-end workflows
    smoke: lightweight deployment gates verifying core functionality
    canary: Live canary checks
    live_balance: Auth balance live-only
    L0: static analysis and audit guardrails that run prior to Python execution
    L1: hermetic unit tests with no external I/O or network effects
    L2: contract, schema, OpenAPI, RBAC, and audit-surface validation suites
    L3: integration flows that stitch multiple TradePulse modules together
    L4: end-to-end regression of the trading pipeline and platform workflows
    L5: resilience, chaos, thermodynamic, and progressive rollout scenarios
    L6: infrastructure readiness and environment conformance validations
    L7: UI, accessibility, and signal-rendering quality gates
    UNSTABLE: quarantined suites that signal elevated merge risk but do not block
    monotonic: thermodynamic monotonicity guards for GA/RL safety invariants
filterwarnings =
    ignore::UserWarning
