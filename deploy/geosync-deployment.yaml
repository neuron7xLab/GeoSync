apiVersion: apps/v1
kind: Deployment
metadata:
  name: geosync-api
  labels:
    app.kubernetes.io/name: geosync-api
    app.kubernetes.io/part-of: geosync
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: geosync-api
  template:
    metadata:
      annotations:
        seccomp.security.alpha.kubernetes.io/pod: runtime/default
        co.elastic.logs/enabled: "true"
        co.elastic.logs/module: geosync-api
      labels:
        app: geosync-api
        app.kubernetes.io/name: geosync-api
    spec:
      serviceAccountName: geosync-api
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: geosync-api
      containers:
        - name: geosync-api
          image: ghcr.io/neuron7xLab/GeoSync:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          env:
            - name: GEOSYNC_AUDIT_SECRET
              valueFrom:
                secretKeyRef:
                  name: geosync-secrets
                  key: audit-secret
            - name: GEOSYNC_OAUTH2_ISSUER
              valueFrom:
                secretKeyRef:
                  name: geosync-secrets
                  key: oauth2-issuer
            - name: GEOSYNC_OAUTH2_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: geosync-secrets
                  key: oauth2-audience
            - name: GEOSYNC_OAUTH2_JWKS_URI
              valueFrom:
                secretKeyRef:
                  name: geosync-secrets
                  key: oauth2-jwks-uri
            - name: GEOSYNC_MTLS_TRUSTED_CA_PATH
              value: /etc/geosync/tls/client-ca.pem
            - name: GEOSYNC_MTLS_REVOCATION_LIST_PATH
              value: /etc/geosync/tls/client.crl
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 8001
              name: metrics
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          volumeMounts:
            - name: tls-client-ca
              mountPath: /etc/geosync/tls
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: state-data
              mountPath: /app/state
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: geosync-api
                topologyKey: kubernetes.io/hostname
      volumes:
        - name: tls-client-ca
          secret:
            secretName: geosync-mtls-client
        - name: tmp
          emptyDir: {}
        - name: state-data
          emptyDir: {}
---
# Secrets that provide OAuth credentials and mTLS trust bundles must be
# provisioned outside of source control. The deployment references the
# following secrets, which should be created via your preferred secret
# management workflow (kubectl, ExternalSecrets, etc.):
#   * geosync-secrets with keys: audit-secret, oauth2-issuer,
#     oauth2-audience, oauth2-jwks-uri
#   * geosync-mtls-client with keys: client-ca.pem, client.crl
