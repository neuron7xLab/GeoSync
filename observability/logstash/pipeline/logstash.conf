input {
  beats {
    port => 5044
  }
}

filter {
  if [message] {
    json {
      source => "message"
      target => "tradepulse"
      remove_field => ["message"]
      add_tag => ["tradepulse_json"]
    }
  }

  mutate {
    rename => {
      "tradepulse.log.level" => "log.level"
      "tradepulse.timestamp" => "@timestamp"
    }
    convert => {
      "tradepulse.duration_seconds" => "float"
    }
  }
}

output {
  if "${ELASTICSEARCH_API_KEY}" != "" {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOSTS:http://elasticsearch:9200}"]
      api_key => "${ELASTICSEARCH_API_KEY}"
      index => "${LOG_INDEX_PREFIX:tradepulse-logs}-%{+YYYY.MM.dd}"
    }
  } else if "${ELASTICSEARCH_USERNAME}" != "" {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOSTS:http://elasticsearch:9200}"]
      user => "${ELASTICSEARCH_USERNAME}"
      password => "${ELASTICSEARCH_PASSWORD}"
      index => "${LOG_INDEX_PREFIX:tradepulse-logs}-%{+YYYY.MM.dd}"
    }
  } else {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOSTS:http://elasticsearch:9200}"]
      index => "${LOG_INDEX_PREFIX:tradepulse-logs}-%{+YYYY.MM.dd}"
    }
  }
  stdout {
    codec => rubydebug
  }
}
