#   in-place rename / relocation / mechanism preservation in the new repo
#   before classification.
#
# Schema (validated by tools/archive/compare_old_repo_salvage.py):
#   id                       — unique stable id, kebab-case
#   old_path                 — relative path in the old repo
#   new_path_candidate       — relative path in the new repo (or "MISSING")
#   artifact_type            — CODE | TEST | DOC | CONFIG | IP | PRODUCT | CLI | WORKFLOW
#   status                   — PRESENT_IN_NEW | MISSING | PARTIAL | RENAMED | OBSOLETE | OVERCLAIM | UNKNOWN
#   importance               — CRITICAL | HIGH | MEDIUM | LOW
#   uniqueness               — UNIQUE | COMMON | DERIVATIVE | UNKNOWN
#   mechanism_summary        — what the artifact actually contains (one sentence)
#   what_is_real             — the genuine mechanism / value
#   what_is_overclaim        — the unsupported framing (if any)
#   migration_action         — PORT | PORT_TESTS_ONLY | ARCHIVE | QUARANTINE | REWRITE | REJECT | KEEP_NEW
#   required_non_claim       — text the migrated artifact must carry (or "")
#   required_tests           — list of test paths that must accompany migration
#   falsifier                — what would invalidate the migration (or "")
#   owner_surface            — buyer / use-case / IP authorship surface
#   reason                   — short rationale (one sentence)
#
# Validator failures (fail-closed, see tests/archive/test_old_repo_salvage_ledger.py):
#   * CRITICAL/HIGH item with no migration_action.
#   * CODE item with PORT and empty required_tests.
#   * IP item without ARCHIVE or QUARANTINE.
#   * OVERCLAIM item without required_non_claim.
#   * PRODUCT item with empty owner_surface.
#   * TEST item without owner_surface (linked module/reason).
#   * MISSING item with no decision (KEEP_NEW or empty migration_action).
#   * Duplicate id.
#   * Unknown status / artifact_type / migration_action / importance / uniqueness.
#   * Empty old_path.

