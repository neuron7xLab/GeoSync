# Diff-bound commit acceptor for the D-002G-P3 PR.
#
# Lands the M2 node-payload + injection-sequence sub-domain verifiers
# + realisers + an admissibility-adjudication protocol over the locked
# pre-registration grid. Honest scientific outcome on the prereg
# substrate set: NO new admissibility is unlocked; B1 stays open and
# the PR ships an M3 pre-registration draft locked at this PR's merge
# commit.
#
# Strict scope:
#   * NO canonical D-002G run.
#   * NO D-002G PASS claim.
#   * NO D-002C ledger update.
#   * NO tier promotion / cross-promotion.
#   * NO mutation of any locked governance file (P1 + P2 anchors).
#   * NO P1 / P2 test modification.
#   * NO B2 closure.

id: x10r-d002g-p3-constant-payload-null-recovery
status: ACTIVE
claim_type: governance
promise: >-
  After this PR lands, research/systemic_risk/d002g_null_mechanisms.py
  carries two new M2 sub-domain verifiers
  (verify_m2_node_payload_eligibility,
  verify_m2_injection_sequence_eligibility) and two corresponding
  realisers (realize_m2_node_payload_null,
  realize_m2_injection_sequence_null), plus 10 new verdict literals
  extending M2EligibilityStatus (5 for node_payload, 5 for
  injection_sequence). The realize_null dispatch gains a
  shuffle_domain Literal parameter defaulting to "edge_weight" (P2
  contract preserved) and routing to the correct verifier+realiser
  pair on M2 calls. Two new salt constants M2_NODE_PAYLOAD_SALT=313
  and M2_INJECTION_SEQUENCE_SALT=419 are locked.

  tests/systemic_risk/ gains 5 new P3 test files (node_payload,
  injection_sequence, constant_payload_blockers,
  no_canonical_promotion, traps) totalling 39+ tests, all green.
  docs/governance/ gains the P3 discovery report, the null-domain
  contracts document, the eligibility matrix, the implementation
  report, AND an M3 pre-registration draft locked at this PR's
  merge commit. D002G_CANONICAL_RUN_BLOCKERS.md gains a §B1.P3
  subsection recording the OPEN_REQUIRES_M3 upgrade.

  Strict scope: adjudication infrastructure + tests + docs only.
  This PR does NOT establish D-002G scientific PASS, does NOT
  authorise a canonical run, does NOT touch the D-002C ledger,
  and does NOT close B1 — the M2 node-payload and
  injection-sequence sub-domains are INELIGIBLE on the two
  constant-payload substrates exactly as the M2 edge-weight
  sub-domain was. The honest negative result triggers a fresh M3
  pre-registration; canonical D-002G remains BLOCKED on the
  AND-conjunction of B1 (substrate eligibility — OPEN_REQUIRES_M3)
  AND B2 (percentile-CI limitation) AND any future blocker.

