    grep -q "SOURCE_REGISTRY_PARTIALLY_VERIFIED" artifacts/d002j/data_registry/source_provenance_audit_v1.json || exit 2;
    grep -q "PHILLY_FED_RTDSM" artifacts/d002j/data_registry/source_registry_v1.json || exit 3;
    grep -q "P1A" docs/research/D002J_SOURCE_DOWNGRADE_LOG.md || exit 4;
    test "$(sha256sum docs/governance/D002J_PREREGISTRATION.yaml | awk "{print \$1}")" = "f3dc65b7e64b96eafe6f23ca8bdd0e05dc9bf95b12c2658b227bd0340f7975a0" || exit 5'
