  bash -c 'set -e;
  PYTHONPATH=. python -m pytest tests/systemic_risk/test_d002j_source_provenance_audit.py -q;
  test -f artifacts/d002j/data_registry/source_registry_v1.json;
  test -f artifacts/d002j/data_registry/source_provenance_audit_v1.json;
  test -f artifacts/d002j/data_registry/source_access_smoke_v1.json;
  test -f artifacts/d002j/data_registry/source_evidence_lock_v1.json;
  test -f artifacts/d002j/data_registry/source_registry_audit_summary_v1.json;
  python -m json.tool artifacts/d002j/data_registry/source_registry_v1.json > /dev/null;
  python -m json.tool artifacts/d002j/data_registry/source_provenance_audit_v1.json > /dev/null;
  grep -q "SOURCE_REGISTRY_PARTIALLY_VERIFIED" artifacts/d002j/data_registry/source_provenance_audit_v1.json;
  grep -q "PHILLY_FED_RTDSM" artifacts/d002j/data_registry/source_registry_v1.json;
  grep -q "D-002J-P1B" docs/governance/D002G_CANONICAL_RUN_BLOCKERS.md;
  test "$(sha256sum docs/governance/D002J_PREREGISTRATION.yaml | awk "{print \$1}")" = "f3dc65b7e64b96eafe6f23ca8bdd0e05dc9bf95b12c2658b227bd0340f7975a0"'
