# Diff-bound commit acceptor for the D-002J-P1B source-registry
# provenance repair PR.
#
# D-002J-P1B is the repair gate following the merged P1A audit
# (sha 4b64faf67f4c1bec48a66d20eeddbdf6931e762d) which landed as
# `SOURCE_REGISTRY_REJECTED`. P1B is registry repair only: adds one
# new source (PHILLY_FED_RTDSM) to satisfy the information_constraint
# mechanism-family floor (>= 2 verified/partial), repairs 5 listed
# broken URL pins (ECB_CBD, ICAP_MOVE, BIS_QR_NETWORK, FED_TIMELINE,
# BOE_LDI_REVIEW) via HEAD-verified canonical URLs, and incidentally
# repairs FDIC_SVB_POSTMORTEM (legacy path 404; repinned to FDIC OIG
# agency root). The decision flips from SOURCE_REGISTRY_REJECTED to
# SOURCE_REGISTRY_PARTIALLY_VERIFIED.

id: x10r-d002j-p1b-source-registry-provenance-repair
status: ACTIVE
claim_type: governance
promise: >-
  After this PR lands, artifacts/d002j/data_registry/source_registry_v1.json
  carries 26 sources (P1A 25 + 1 new PHILLY_FED_RTDSM), pr_lineage
  D-002J-P1B, with 5 listed URLs repaired plus 1 incidental
  FDIC_SVB_POSTMORTEM repair.
  artifacts/d002j/data_registry/source_provenance_audit_v1.json declares
  audit_decision SOURCE_REGISTRY_PARTIALLY_VERIFIED.
  The six locked governance shas remain byte-exact. P1A
  SOURCE_REGISTRY_REJECTED verdict remains banked verbatim in
  docs/research/D002J_SOURCE_DOWNGRADE_LOG.md. No source-code, prereg,
  ledger, ingestion, or canonical-run change.

