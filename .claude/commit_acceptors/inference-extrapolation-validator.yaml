# Diff-bound commit acceptor for the Inference Extrapolation Validator (IEV).
#
# Codifies the contract this PR ships: a fail-closed module that produces
# canonical, SHA-256-sealed JSON artifacts certifying whether a hypothesis
# *survived* (EVIDENCE / VERIFIED_EVIDENCE) or was *killed* (KILLED /
# FALSIFIED_OR_REJECTED) under a risk-tiered battery of required tests,
# null models, witness review, purpose-drift gate, external-falsification
# probe, and STN-hyperdirect ACC-conflict ceiling.
#
# The IEV is a *certificate format and gate*, not a test runner. Truth of
# the underlying numbers (hypothesis_score, null_model_results, drift_score)
# is supplied by the caller; the IEV enforces only structural consistency,
# risk-tier coverage, internal arithmetic (hypothesis_score > max null),
# SHA integrity, and fail-closed semantics. Claim boundary is documented
# in `artifacts/inference_extrapolation_validator/CLAIM_BOUNDARY.md`.

id: inference-extrapolation-validator
status: ACTIVE
# claim_type=refactor: this PR refactors an in-flight Codex-generated
# draft into engineering-grade form (compress sales/handoff theater,
# enforce mypy --strict, kill time-bombed fixtures, complete the
# acceptor schema, regenerate the secrets baseline). The shipped
# artifact is itself a fail-closed governance gate; the act of
# *landing* it under repo policy is a refactor of the draft.
claim_type: refactor
promise: >-
  After this PR lands, artifacts/inference_extrapolation_validator/ ships a
  self-contained CLI (generate / verify) that emits a canonical-JSON,
  SHA-256-sealed artifact with bounded epistemic semantics. EVIDENCE is
  reachable only when (a) result == survived AND test_passed == true,
  (b) risk-tier-required tests + null models are all present and keyed
  consistently, (c) hypothesis_score strictly exceeds every null model
  result, (d) for high risk, witness.status == approved with structured
  reviewer_id / review_timestamp_utc (<=30d fresh) / review_hash, (e)
  purpose.alignment_score >= 0.7 AND purpose.drift_check <= 0.3, (f)
  external_falsification.drift_score <= 0.5, (g) STN-hyperdirect ACC
  conflict score does not exceed 0.8 (hard ceiling, stochastic-noise
  exempt) or the adaptive threshold, (h) api_version == "1.0", and (i)
  artifact.sha256 matches recomputed sha256 over canonical JSON minus the
  sha256 field. Any single violation flips the artifact to KILLED /
  FALSIFIED_OR_REJECTED and exits non-zero (2 = contract violation,
  3 = parse failure).
diff_scope:
  changed_files:
    - path: ".claude/commit_acceptors/inference-extrapolation-validator.yaml"
    - path: ".github/workflows/iev-module-gate.yml"
    - path: "Makefile"
    - path: "artifacts/inference_extrapolation_validator/CHANGELOG.md"
    - path: "artifacts/inference_extrapolation_validator/CLAIM_BOUNDARY.md"
    - path: "artifacts/inference_extrapolation_validator/INVARIANTS.yaml"
    - path: "artifacts/inference_extrapolation_validator/PURPOSE.md"
    - path: "artifacts/inference_extrapolation_validator/README.md"
    - path: "artifacts/inference_extrapolation_validator/docs/ROLLBACK_DOCTRINE.md"
    - path: "artifacts/inference_extrapolation_validator/docs/THREAT_MODEL.md"
    - path: "artifacts/inference_extrapolation_validator/falsifier.py"
    - path: "artifacts/inference_extrapolation_validator/generate_artifact.py"
    - path: "artifacts/inference_extrapolation_validator/purpose_contract.json"
    - path: "artifacts/inference_extrapolation_validator/release/RELEASE_MANIFEST.json"
    - path: "artifacts/inference_extrapolation_validator/schema/artifact.schema.json"
    - path: "artifacts/inference_extrapolation_validator/schema/spec.schema.json"
    - path: "artifacts/inference_extrapolation_validator/scripts/brutal_e2e_proof.sh"
    - path: "artifacts/inference_extrapolation_validator/scripts/final_handoff_gate.sh"
    - path: "artifacts/inference_extrapolation_validator/spec.json"
    - path: "artifacts/inference_extrapolation_validator/state_diagram.md"
    - path: "artifacts/inference_extrapolation_validator/test_generate_artifact.py"
    - path: "go.work.sum"
  forbidden_paths:
    - "core/"
    - "runtime/"
    - "trading/"
    - "research/"
    - "geosync/"
required_python_symbols:
  - "artifacts/inference_extrapolation_validator/generate_artifact.py::build_parser"
  - "artifacts/inference_extrapolation_validator/generate_artifact.py::build_artifact"
  - "artifacts/inference_extrapolation_validator/generate_artifact.py::validate_contract"
  - "artifacts/inference_extrapolation_validator/generate_artifact.py::compute_acc_conflict_score"
  - "artifacts/inference_extrapolation_validator/generate_artifact.py::stn_hyperdirect_gate"
  - "artifacts/inference_extrapolation_validator/generate_artifact.py::compute_artifact_sha256"
  - "artifacts/inference_extrapolation_validator/generate_artifact.py::verify_artifact_sha256"
  - "artifacts/inference_extrapolation_validator/generate_artifact.py::canonical_json_bytes"
  - "artifacts/inference_extrapolation_validator/generate_artifact.py::RISK_REQUIRED_TESTS"
  - "artifacts/inference_extrapolation_validator/generate_artifact.py::RISK_REQUIRED_NULL_MODELS"
  - "artifacts/inference_extrapolation_validator/falsifier.py::_build_base"
  - "artifacts/inference_extrapolation_validator/falsifier.py::run_expect"
  - "artifacts/inference_extrapolation_validator/test_generate_artifact.py::TestIEV"
expected_signal: >-
  `python -m unittest artifacts/inference_extrapolation_validator/test_generate_artifact.py -v`
  reports 27 tests, 0 failures, 0 errors. `python artifacts/inference_extrapolation_validator/falsifier.py`
  prints `FALSIFIER PASS`. `bash artifacts/inference_extrapolation_validator/scripts/brutal_e2e_proof.sh`
  prints `BRUTAL_E2E_PROOF PASS`. `mypy --strict`, `ruff check`, and
  `black --check` over the three Python files in the module are clean.
measurement_command: >-
  bash -c '
    .venv/bin/mypy --strict
      artifacts/inference_extrapolation_validator/generate_artifact.py
      artifacts/inference_extrapolation_validator/falsifier.py
      artifacts/inference_extrapolation_validator/test_generate_artifact.py
    && .venv/bin/ruff check artifacts/inference_extrapolation_validator/
    && .venv/bin/black --check artifacts/inference_extrapolation_validator/
    && .venv/bin/python -m unittest
      artifacts/inference_extrapolation_validator/test_generate_artifact.py -v
    && .venv/bin/python artifacts/inference_extrapolation_validator/falsifier.py
    && bash artifacts/inference_extrapolation_validator/scripts/brutal_e2e_proof.sh
  ' 2>&1 | tee tmp/inference_extrapolation_validator.log
signal_artifact: "tmp/inference_extrapolation_validator.log"
falsifier:
  command: >-
    bash -c '
      .venv/bin/python artifacts/inference_extrapolation_validator/falsifier.py
        >/tmp/_iev_falsifier.log 2>&1
      && ! grep -q "FALSIFIER PASS" /tmp/_iev_falsifier.log
    '
  description: >-
    Probes the IEV CLI's adversarial battery: known-good survives,
    missing required test fails, missing high-risk witness review hash
    fails, sha-256 corruption fails verify, test_passed=false+survived
    contradiction fails, missing required null model fails, valid killed
    mode succeeds. Falsifier succeeds (exit 0) only when the FALSIFIER
    PASS line is missing — meaning at least one adversarial scenario
    silently passed where it should have failed-closed.
rollback_command: >-
  bash -c '
    rm -rf artifacts/inference_extrapolation_validator/
    && rm -f
      .claude/commit_acceptors/inference-extrapolation-validator.yaml
      .github/workflows/iev-module-gate.yml
    && git checkout HEAD~1 -- Makefile .github/detect-secrets.baseline go.work.sum
  '
rollback_verification_command: >-
  bash -c '
    ! test -d artifacts/inference_extrapolation_validator/
    && ! test -f .github/workflows/iev-module-gate.yml
    && ! test -f .claude/commit_acceptors/inference-extrapolation-validator.yaml
  '
memory_update_type: append
ledger_path: ".claude/commit_acceptors/inference-extrapolation-validator.yaml"
report_path: "tmp/inference_extrapolation_validator.log"
evidence: []
claim_boundary: >-
  The IEV certifies STRUCTURAL CONSISTENCY of an extrapolation claim
  (schema, risk-tier coverage, internal arithmetic, witness rules, SHA
  integrity), not the truth of caller-supplied numerics (hypothesis_score,
  null_model_results, drift_score, prompt_hash, requirements_lock_sha256).
  Truth of those upstream inputs is an external obligation.
