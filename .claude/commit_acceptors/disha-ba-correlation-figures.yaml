    - path: "figures/disha_ba_correlation/model_comparison_full.csv"
    - path: "figures/disha_ba_correlation/model_comparison_summary.csv"
    - path: "figures/disha_ba_correlation/reporter_status_summary.csv"
    - path: "figures/disha_ba_correlation/risk_concentration_article_grade.csv"
    - path: "figures/disha_ba_correlation/repro_capsule/MANIFEST.json"
    - path: "figures/disha_ba_correlation/repro_capsule/COMMANDS.sh"
    - path: "figures/disha_ba_correlation/repro_capsule/ENVIRONMENT.txt"
    - path: "figures/disha_ba_correlation/repro_capsule/INPUT_DATASET_MANIFEST_COPY.json"
    - path: "figures/disha_ba_correlation/repro_capsule/OUTPUT_SHA256SUMS.txt"
    - path: "figures/disha_ba_correlation/repro_capsule/QUALITY_GATES.txt"
    - path: "figures/disha_ba_correlation/repro_capsule/CLAIM_BOUNDARY.md"
  forbidden_paths:
    - "trading/"
    - "execution/"
    - "forecast/"
    - "policy/"
    - "core/"
    - "runtime/"
    - "application/"
    - "research/systemic_risk/protocol_x9r.py"

required_python_symbols:
  - "tools/build_disha_ba_correlation_figures.py::build_article_artifact"
  - "tools/build_disha_ba_correlation_figures.py::compute_ba_comparison"
  - "tools/build_disha_ba_correlation_figures.py::build_correlation_matrix"
  - "tools/build_disha_ba_correlation_figures.py::compute_risk_concentration"
  - "tools/build_disha_ba_correlation_figures.py::main"

expected_signal: >-
  ``pytest tests/research/systemic_risk/test_disha_ba_correlation_figures.py -q``
  reports 24 passed; full ``tests/research/systemic_risk/`` suite reports
  607 passed (583 prior + 24 new) with zero regressions.

measurement_command: >-
  bash -c '
    mypy --strict tools/build_disha_ba_correlation_figures.py
    && python -m pytest tests/research/systemic_risk/test_disha_ba_correlation_figures.py -q
  '

signal_artifact: "tmp/disha_ba_correlation.log"

falsifier:
  command: >-
    bash -c '
      python -c "
      from tools.build_disha_ba_correlation_figures import (
          build_article_artifact, compute_ba_comparison,
          build_correlation_matrix, compute_risk_concentration,
      )
      assert callable(build_article_artifact)
      assert callable(compute_ba_comparison)
      assert callable(build_correlation_matrix)
      assert callable(compute_risk_concentration)
      " 2>/dev/null
      && exit 1
      || exit 0
    '
  description: >-
    Probes that the public BA + correlation API symbols are exposed
    at the documented names. Falsifier inverts: it succeeds (exit 0)
    only when the import or assertion fails, which would mean the
    artefact rolled back.

rollback_command: >-
  bash -c '
    git rm -f
      tools/build_disha_ba_correlation_figures.py
      tests/research/systemic_risk/test_disha_ba_correlation_figures.py
      .claude/commit_acceptors/disha-ba-correlation-figures.yaml
      DISHA_BA_CORRELATION_FINAL_REPORT.md
    && rm -rf figures/disha_ba_correlation/
  '

rollback_verification_command: >-
  bash -c '
    python -c "
    try:
        from tools.build_disha_ba_correlation_figures import build_article_artifact
    except ImportError:
        pass
    else:
        raise SystemExit(1)
    "
  '

memory_update_type: append
ledger_path: ".claude/commit_acceptors/disha-ba-correlation-figures.yaml"
report_path: "tmp/disha_ba_correlation.log"
evidence: []
