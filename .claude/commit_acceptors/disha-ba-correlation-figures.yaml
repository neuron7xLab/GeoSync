# Diff-bound commit acceptor for the Disha BA + Pearson-correlation
# article artefact.
#
# This PR adds a clean, honest, reproducible Barabási-Albert-style
# topology comparison + Pearson correlation analysis on BIS LBS
# country-level banking-system exposure data, for use as a macro
# network illustration in Disha's article. Explicitly orthogonal
# to the X-9R Kuramoto pipeline (no Kuramoto used), and explicitly
# does NOT make bank-level or causal contagion claims.

id: disha-ba-correlation-figures
status: ACTIVE
claim_type: documentation
promise: >-
  After this PR lands, ``tools/build_disha_ba_correlation_figures.py``
  produces an article-grade artefact with BA-style topology comparison,
  Pearson correlation heatmaps (levels + log-changes), risk concentration
  ranking, article summary and reproducibility notes from a BIS LBS
  ``dataset_dir``. The accompanying test module verifies all 16 expected
  output files, the BA fit pipeline on a synthetic 4-country fixture,
  Pearson correlation invariants, constant-node handling, and the
  forbidden-wording self-check.

diff_scope:
  changed_files:
    - path: ".claude/commit_acceptors/disha-ba-correlation-figures.yaml"
    - path: "tools/build_disha_ba_correlation_figures.py"
    - path: "tests/research/systemic_risk/test_disha_ba_correlation_figures.py"
    - path: "DISHA_BA_CORRELATION_FINAL_REPORT.md"
    - path: "figures/disha_ba_correlation/DISHA_ARTICLE_SUMMARY.md"
    - path: "figures/disha_ba_correlation/REPRODUCIBILITY.md"
    - path: "figures/disha_ba_correlation/ba_fit_summary.csv"
    - path: "figures/disha_ba_correlation/data_quality_summary.csv"
    - path: "figures/disha_ba_correlation/risk_concentration_summary.csv"
    - path: "figures/disha_ba_correlation/top_correlated_pairs_changes.csv"
    - path: "figures/disha_ba_correlation/top_correlated_pairs_levels.csv"
    - path: "figures/disha_ba_correlation/network_normal.png"
    - path: "figures/disha_ba_correlation/network_lehman.png"
    - path: "figures/disha_ba_correlation/correlation_levels_normal.png"
    - path: "figures/disha_ba_correlation/correlation_levels_lehman.png"
    - path: "figures/disha_ba_correlation/correlation_levels_delta.png"
    - path: "figures/disha_ba_correlation/correlation_changes_normal.png"
    - path: "figures/disha_ba_correlation/correlation_changes_lehman.png"
    - path: "figures/disha_ba_correlation/correlation_changes_delta.png"
    - path: "figures/disha_ba_correlation/risk_concentration_bar.png"
    - path: "figures/disha_ba_correlation/AUDIT_RESPONSE.md"
