# Diff-bound commit acceptor for the D-002H Gate G final CI lock PR.
#
# Gate G is term 7 (TERMINAL) of the 7-gate canonical-run authorisation
# conjunction A AND B AND C AND D AND E AND F AND G. PASS of Gate G
# emits the TERMINAL state CANONICAL_RUN_AUTHORIZED with
# canonical_run_authorized_final = True. Gate G is the AUTHORISATION
# terminal - it does NOT execute the D-002H canonical sweep. The sweep
# itself is a SEPARATE downstream PR.
#
# Pure declaration + read-only verification. Emits a machine-readable
# artifact at
# artifacts/d002h/authorization/d002h_canonical_run_final_lock.json
# (schema D002H-GATE-G-v1) and a human-readable report at
# docs/governance/D002H_GATE_G_CI_LOCK_REPORT.md. Phase 0 GitHub Actions
# check-runs query for each prior gate sha is recorded inline in the
# artifact as ci_verdict='ALL_REQUIRED_PASS'. The 6 prior-gate anchors
# A..F are verified ancestors of origin/main via
# git merge-base --is-ancestor.
#
# Strict scope (per the operating law):
#   * NO canonical run. NO sweep. NO results. NO sweep PR.
#   * NO new mechanism family. NO new verdict literal. NO new salt.
#   * NO D-002G prereg edit. NO D-002H prereg edit. NO locked-file edit.
#   * NO D002C_CLAIM_LEDGER.yaml mutation (sha pinned byte-exact at
#     f96ba9b5a2057d2e0bff84afc28578ab316cff73f6dc6673fb0d6d543b8bd6dd).
#   * NO substrate code edit. NO mechanism code edit.
#   * NO modification of prior gate artifacts (A..F).
#   * Gate G PASS = canonical_run_authorized_final True; the canonical
#     sweep itself remains a SEPARATE downstream PR.

