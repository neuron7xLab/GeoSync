# Diff-bound commit acceptor for the D-002J-P6 null-model-hierarchy PR.
#
# D-002J-P6 pre-registers a null-model HIERARCHY: exactly 10 null
# families, each a FALSIFIER targeting ONE named false explanation (NOT
# decorative rigor). Each null declares preserved/destroyed structure
# (numerically verified in code), an applicability domain, a
# deterministic seed policy, an admission test and a rejection test.
# Phase-coupling P6->P5: every P5 substrate
# (funding_liquidity_rollover, cross_exposure_contagion_proxy,
# volatility_credit_spread_regime) binds >=2 applicable nulls; no null
# lists a non-existent substrate. N7 (configuration_model) and N8
# (sparse_maximum_entropy_reconstruction) are topology-conditioned and
# carry the forward-declared H_I2 conditional (D-002I H_I2 UNKNOWN; if
# later SUPPORTED these require fresh admissibility justification before
# canonical use at P8). N10 (vintage_leakage_trap_null) has INVERTED
# pass semantics (pass = signal disappears when leakage removed; P3/PC5
# bridge). P6 does NOT run power (P7), run canonically (P8), execute
# nulls against real substrate data at scale, edit the D-002J prereg, or
# rewrite any P1..P5 artifact.
#
# P6 is the SINGLE phase explicitly allowed to add source files under
# research/systemic_risk/nulls/d002j/; every other path under
# research/systemic_risk/ is forbidden.

id: x10r-d002j-p6-null-hierarchy
status: ACTIVE
claim_type: governance
promise: >-
  After this PR lands, research/systemic_risk/nulls/d002j/ holds
  __init__.py + null_base.py + null_families.py exposing 10 null classes
  N1..N10 each with apply(signal_array, seed, params) -> NullInstance
  (numpy-only, no wall-clock, no real-data reads, same seed =>
  bit-identical nulled_array). NullInstance records
  preserved_invariants_checked and destroyed_structure_checked as
  in-code numeric boolean maps; .admitted is True only if every
  preserve AND destroy check passed.
  null_hierarchy_manifest_v1.json (schema
  D002J-NULL-HIERARCHY-MANIFEST-v1) declares EXACTLY 10 null families,
  each with a non-empty target_false_explanation, preserves, destroys,
  applicable_substrates, non_applicable_substrates +
  non_applicable_reason, seed_policy, admission_test, rejection_test,
  expected_failure_mode, h_i2_conditional, implementation_path; N7 and
  N8 carry h_i2_conditional=true + h_i2_note; N10 carries
  inverted_pass_semantics=true. null_hierarchy_summary_v1.json (schema
  D002J-NULL-HIERARCHY-SUMMARY-v1) records counts_by_class, the
  substrate->null applicability matrix, h_i2_conditional_count=2, and
  decision NULL_HIERARCHY_READY with no_canonical_run=true and
  no_real_data_null_execution=true. Every P5 substrate has >=2
  applicable nulls and no null references a non-existent substrate.
  docs/research/D002J_NULL_MODEL_CONTRACTS.md documents the null-as-
  falsifier philosophy, the 10 nulls, the substrate->null matrix, the
  H_I2 conditional, the anti-decorative rule, and the >=2-nulls proof
  table. The D-002J-P6 capsule is added under schema
  D002J-VERDICT-CAPSULE-v1 with parent=['D002J-P5'] and
  allowed_next=['D002J-P7'] and forbidden_next=['D002J-P8','D002J-P9'].
  The DAG verdict regenerates to 9 nodes acyclic (was 8),
  D002J_LINEAGE_MAP.md re-renders byte-deterministically,
  D002G_CANONICAL_RUN_BLOCKERS.md appends a P6 section, and the
  verdict_dag_integrity EXPECTED_NODE_IDS widens to include D002J-P6.
  The locked governance shas remain byte-exact. No real data, no
  canonical run authorised, no real-data null execution, no D-002J
  prereg edit, no D-002H rescue claim.

