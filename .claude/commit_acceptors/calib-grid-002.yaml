    bash -c '
      python -m pytest
      "tests/research/calibration/test_grid_kuramoto.py::test_cg002_verdict_is_negative_and_localized"
      "tests/research/calibration/test_grid_kuramoto.py::test_cg002_preregistration_matches_code"
      "tests/research/calibration/test_grid_kuramoto.py::test_cg002_does_not_touch_frozen_calib_grid_001_gates"
      "tests/unit/core/test_kuramoto_integral_estimator.py::test_differential_paths_bit_identical_after_integral_added"
      -q >/tmp/_calib_002_rails.log 2>&1
      && ! grep -q "4 passed" /tmp/_calib_002_rails.log
    '
  description: >-
    Probes four load-bearing CALIB-GRID-002 rails: the integral form
    lands a NEGATIVE that is sha-pinned and localized (noiseless PASS /
    noisy FAIL / front-gate REFUSE); the cg002.py constants + gate
