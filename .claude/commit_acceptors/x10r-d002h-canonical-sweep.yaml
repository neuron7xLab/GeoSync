# Diff-bound commit acceptor for the D-002H canonical-sweep execution PR.
#
# This PR is the AUTHORISED EXECUTION downstream of the closed 7-gate
# authorisation conjunction A AND B AND C AND D AND E AND F AND G (Gate G
# terminal at PR #689, sha 4686455e...) and the R2-B inapplicability
# clarification (PR #690, sha ee12a9e6...). It produces the SCIENTIFIC
# VERDICT on the ricci_flow substrate -- whatever the data says. A
# truthful FAIL is preserved as a negative artifact; the only failure
# mode of this PR would be a forced PASS, which is forbidden.
#
# NO source-code edit. NO substrate / mechanism / acceptance-rule edit.
# NO D-002C ledger touch. NO prior-gate artifact edit. NO D-002H prereg
# edit. NO R2-B note edit. The PR adds: the canonical-sweep script, the
# artifact tree under artifacts/d002h/canonical/results/<RUN_ID>/, the
# top-level verdict capsule, the report doc, and the artifact-contract
# tests.

