  scope='ricci_flow substrate only', grid byte-exact from D-002H prereg,
  n_cells_total=18, null_mechanisms_used=[M1_INDEPENDENT_SEED,
  M3_TOPOLOGY_CONDITIONED] (NOT M6), acceptance_conjunction='R1 AND R2 AND
  R3 AND NULL_AUDIT (R2-B INAPPLICABLE...)', bonferroni_n_cells=216,
  tier_string in {SYNTHETIC_GATE6_CERTIFIED_D002H_REDESIGN,
  MARGINAL_PASS_SYNTHETIC_D002H, D002H_REDESIGN_INSUFFICIENT_AT_TESTED_BUDGET,
  REFUSED_NULL_AUDIT_FAIL_D002H}, aggregate_verdict in {PASS, FAIL,
  MARGINAL_PASS, REFUSED}, d002c_ledger_touched=false,
  d002c_ledger_sha_at_run=f96ba9b5a2057d2e0bff84afc28578ab316cff73f6dc6673fb0d6d543b8bd6dd.

  artifacts/d002h/canonical/results/d002h_ricci_flow_canonical_v1_2026-05-14/
  carries sweep_capsule_v1.json (per-cell payloads for both M1 and M3
  null cohorts), null_audit_capsule.json (post-sweep permutation null
  audit), and verdict.json (per-cell breakdown).

  scripts/x10r_d002h_canonical_sweep.py is the canonical sweep entry
  point; it verifies governance anchor sha256 byte-exact at the merged
  anchor, executes the locked 18-cell ricci_flow grid under M1 and M3
  null mechanisms with 20 seeds and 16 bootstrap resamples per cell, runs
  the post-sweep null audit (n_shuffles=100, rng_seed=42), derives the
  per-cell verdict via the 4-term conjunction R1 AND R2 AND R3 AND
  NULL_AUDIT, applies anti-overclaim guards (MARGINAL_PASS,
  SINGLE_PATH_PASS, NULL_AUDIT_FAIL), and emits the top-level verdict.

  tests/systemic_risk/test_d002h_canonical_run_artifact.py carries the
  10+ artifact-contract tests pinning schema, grid, mechanisms, R2-B
  inapplicability, per-cell count, tier-string enum, verdict
  consistency, D-002C ledger preservation, and anti-overclaim guards.

  docs/governance/D002H_CANONICAL_RUN_REPORT.md records the report with
  8 numbered sections: anchor + governance posture, grid, mechanism +
  acceptance, runtime, per-cell verdict table reference, aggregate
  verdict, claim boundary verbatim, forbidden interpretations.

  D-002G acceptance rules byte-exact 875b1e3eb031b8e5333dc8b455454f0a30419ead1ebe787aa01d5882e7d6ad31.
  D-002H prereg byte-exact 44b18b5a40ce9d188a9c3bd49339621f81a65a15f97a683247902450dd54acec.
  D-002C claim ledger byte-exact f96ba9b5a2057d2e0bff84afc28578ab316cff73f6dc6673fb0d6d543b8bd6dd.

  Pure execution: NO source code edit (substrate / mechanism /
  acceptance rules unchanged), NO ledger touch, NO prior-gate artifact
  edit, NO retroactive grid edit. Whatever the data verdict is, that IS
  the result.

