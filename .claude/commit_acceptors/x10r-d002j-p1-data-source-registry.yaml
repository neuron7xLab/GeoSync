# Diff-bound commit acceptor for the D-002J-P1 data source registry v1 PR.
#
# D-002J-P1 lands the financial data source registry v1 on top of the
# D-002J prereg lineage (PR #694, branch
# `docs/x10r-d002j-financial-benchmark-prereg`). P1 ships a
# machine-readable JSON registry of 25 publicly-known sources, a JSON
# summary breakdown, a crisis-window coverage matrix (§10), a
# mechanism-coverage matrix (§11), 8 filled source cards, and a §9
# selection rationale. P1 is registry-only: NO ingestion, NO real-bank
# validation, NO canonical-run authorisation, NO edit of any locked
# governance file.
#
# Pure governance: NO source-code edit, NO mechanism change, NO
# canonical sweep run, NO D-002C ledger touch, NO D-002G or D-002H or
# D-002I or D-002J prereg edit, NO research/systemic_risk/*.py edit,
# NO scripts/x10r_d002*.py edit. D-002J-P1 does NOT claim D-002H
# REFUSED was wrong (the verdict was truthful) and does NOT
# retroactively flip that verdict.

id: x10r-d002j-p1-data-source-registry
status: ACTIVE
claim_type: governance
promise: >-
  After this PR lands,
  artifacts/d002j/data_registry/source_registry_v1.json exists with
  schema_version D002J-SOURCE-REGISTRY-v1, total_sources 25, sources
  list of 25 entries each carrying the full §6 schema (22 required
  keys); artifacts/d002j/data_registry/source_registry_summary_v1.json
  exists with schema_version D002J-SOURCE-REGISTRY-SUMMARY-v1,
  decision DATA_REGISTRY_READY, usable_now_count 23, candidate_count
  2, rejected_count 0, by_source_class banking 4 repo 4
  macro_financial 5 market_structure 4 crisis_window 5
  literature_support 3, by_crisis_window CW1 20 CW2 15 CW3 16 CW4 18
  CW5 11 CW6 15, locked_anchors carrying the four byte-exact
  governance sha pins, canonical_run_authorized false,
  benchmark_only true, no_ingest_in_this_pr true.

  docs/research/D002J_DATA_SOURCE_MATRIX.md gains the §10
  crisis-window coverage matrix (all 6 windows CW1..CW6) and the §11
  mechanism-coverage matrix (7 mechanism families), preserving the
  original scaffold sections.

  docs/research/D002J_DATA_SOURCE_CARD.md exists with the card
  template plus 8 filled cards (BIS_CBS, FRED, OFR_REPO_DATA,
  NYFED_SOFR, OFR_FSI, FDIC_CALL_REPORTS, BOE_LDI_REVIEW,
  LIT_INTERBANK_CONTAGION).

  docs/research/D002J_SOURCE_SELECTION_RATIONALE.md exists with
  selection methodology + §9 selection matrix listing every one of
  the 25 source_ids with why_include and why_not_enough_alone
  boundary clauses.

  tests/systemic_risk/test_d002j_data_source_registry.py carries 23
  tests covering files-exist, per-entry schema, source_id uniqueness,
  count parity, floors per source_class, status taxonomy, usable
  floor, crisis-window coverage parity, mechanistic-relevance
  vocabulary, license boundary, URL well-formedness, coverage window
  strings, forbidden_use clauses, summary parity, decision taxonomy,
  READY-conjunction, no canonical-run authorisation, locked
  governance sha byte-exact, forbidden-claim parity with D-002J
  prereg, doc-card parity, rationale parity, and BLOCKERS.md P1
  lineage section.

  docs/governance/D002G_CANONICAL_RUN_BLOCKERS.md gains an
  append-only D-002J-P1 data source registry v1 landed section
  naming the registry decision DATA_REGISTRY_READY, counts, scope
  boundary, the four locked governance sha pins (D-002G prereg,
  D-002G acceptance rules, D-002H prereg, D-002C claim ledger), and
  the next legal PR tag D-002J-P2.

  D-002G prereg byte-exact
  1ab91f09370e4705a8b0849467bc1f56df2e58d58d5623d3b6d905cbd110bb04.
  D-002G acceptance rules byte-exact
  875b1e3eb031b8e5333dc8b455454f0a30419ead1ebe787aa01d5882e7d6ad31.
  D-002H prereg byte-exact
  44b18b5a40ce9d188a9c3bd49339621f81a65a15f97a683247902450dd54acec.
  D-002C claim ledger byte-exact
  eb0b7151d76e5409e6dc9bb4a023551de5e0704673d5ac9f726319ef84a32387.

  Pure registry: NO source-code edit, NO data ingestion, NO
  mechanism change, NO canonical sweep run, NO prior-gate or
  prior-prereg artifact edit. D-002J-P1 is registry, not validation.
  D-002H REFUSED remains the truthful canonical verdict; D-002J-P1
  does NOT retroactively flip it. D-002J-P1 does NOT pre-empt
  D-002I investigation outcomes.

