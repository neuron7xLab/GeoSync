  inherited_failure_axis effect_too_small, is_rescue false, a non-empty
  no_rescue_boundary, primary_mechanism funding_liquidity_rollover,
  primary_windows exactly [CW3_US_REPO_SPIKE_2019,
  CW4_COVID_DASH_FOR_CASH_2020, CW5_UK_GILT_LDI_2022], six observable
  families, the ONE locked primary_metric
  pre_post_standardized_mean_shift, six secondary_metrics marked
  exploratory_only, a matched_placebo_policy with
  locked_before_scoring true and a deterministic pre-registered
  selection algorithm, a power_gate_policy with
  must_run_before_any_scoring true / power_target 0.8 / a bonferroni
  alpha_policy whose denominator_rule is "n_windows *
  n_primary_metrics" (narrow BY DESIGN, NOT relaxed),
  canonical_run_authorized false, benchmark_only true,
  requires_power_first_approval true, eight forbidden_claims (incl.
  "D-002K rescues D-002J", "D-002K reverses D-002J-P7 REFUSED",
  "relaxed alpha is justified by D-002J refusal"), four allowed_claims,
  three stop_conditions, prereg_lock.locked_at_merge true.

  docs/research/D002K_DESIGN_RATIONALE.md carries the SS0-SS7 rationale
  (why not a D-002J resurrection, narrowing strategy, mechanism /
  window choice, matched-placebo discipline, power-first-before-
  scoring, forbidden interpretations + no-rescue boundary, lineage
  relationship, and the render_lineage extension judgment call).

  artifacts/d002k/prereg/d002k_failure_axis_inheritance_v1.json
  (schema D002K-FAILURE-AXIS-INHERITANCE-v1) pins parent_lineage
  D-002J, parent_refusal_pr 705, parent_refusal_merge_sha
  c5c4158..., inherited_failure_axis effect_too_small,
  d002j_p7_n_min_distribution {min:150,median:235,max:417},
  d002j_bonferroni_denominator 102, the d002k_design_response
  narrowing rationale, is_rescue false, canonical_run_authorized false.

  artifacts/d002k/prereg/d002k_primary_metric_contract_v1.json
  (schema D002K-PRIMARY-METRIC-CONTRACT-v1) pins the ONE primary
  metric exact definition, input observable family, computation
  steps, decision-threshold semantics (value deferred to power gate),
  secondary metrics exploratory_only, locked_before_any_run true.

  artifacts/governance/verdicts/d002k_p0_verdict_v1.json (schema
  D002J-VERDICT-CAPSULE-v1, node_id D002K-P0, parent_nodes
  ["D002J-P7"], decision D002K_PREREG_LOCKED, status TERMINAL_PASS,
  allowed_next_nodes ["D002K-P1"], forbidden_next_nodes ["D002J-P8"],
  failure_retention null).

  artifacts/governance/verdicts/d002j_verdict_dag_v1.json regenerates
  to 11 nodes (was 10) acyclic, D002K-P0 appended after D002J-P7,
  next_legal_nodes_from_main_head ["D002K-P1"],
  rejected_nodes_retained ["D002J-P1A","D002J-P7"],
  canonical_run_authorized_anywhere false, lineage_transitions
  ["D002J-P7"] {status TERMINAL_REFUSED, successor_lineage D-002K,
  successor_root D002K-P0, is_rescue false}, locked governance shas
  byte-exact.

  docs/research/D002J_LINEAGE_MAP.md re-renders byte-deterministically
  spanning the connected D-002J / D-002K lineages.

  docs/governance/D002G_CANONICAL_RUN_BLOCKERS.md gains an append-only
  D-002K-P0 section recording the fresh-prereg decision, the
  no-rescue boundary, and canonical_run_authorized false.

  tests/systemic_risk/test_d002k_preregistration.py carries >=18
  guard tests; tests/governance/test_verdict_dag_integrity.py widens
  EXPECTED_NODE_IDS to include D002K-P0 and asserts D002J-P7 stays
  TERMINAL_REFUSED retained; tools/governance/verdict_dag.py and
  tools/governance/render_lineage.py widen the capsule glob to
  d002[jk]_p*_verdict_v1.json and emit lineage_transitions.

  D-002J prereg byte-exact
  f3dc65b7e64b96eafe6f23ca8bdd0e05dc9bf95b12c2658b227bd0340f7975a0;
  all artifacts/d002j/** byte-exact frozen. Pure pre-registration:
  zero data, zero scoring, zero model run. D-002J REFUSED remains the
  truthful terminal verdict.

