# Diff-bound commit acceptor for the D-002K-P0 pre-registration PR.
#
# D-002K opens a FRESH pre-registered lineage AFTER the D-002J-P7
# POWER_GATE_REFUSED_UNDERPOWERED terminal verdict (PR #705, merge sha
# c5c4158bed639014ec35ab8f53ec70d98be660a2). D-002K inherits the
# effect_too_small refusal axis as a documented PARENT FAILURE and is
# explicitly designed against it by narrowing SCOPE (3 windows x 1
# mechanism x 1 primary metric), NOT by loosening the STATISTICS at a
# fixed hypothesis count. D-002K is NOT a D-002J rescue, mutation, or
# P8. D-002J remains terminally REFUSED and byte-exact frozen.
#
# Pure pre-registration: zero data, zero scoring, zero model run. NO
# source-code edit, NO mechanism change, NO canonical run, NO D-002C
# ledger touch, NO D-002G/H/I/J prereg edit, NO D-002J artifact edit.
# D-002K does NOT claim the D-002J-P7 REFUSED verdict was wrong.

id: x10r-d002k-p0-prereg-funding-liquidity
status: ACTIVE
claim_type: governance
