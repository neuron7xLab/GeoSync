falsifier:
  command: >-
    bash -c 'set -e;
    PYTHONPATH=. python -m pytest tests/systemic_risk/test_d002h_preregistration.py -q || exit 1;
    test -f docs/governance/D002H_PREREGISTRATION.yaml || exit 2;
    test -f docs/governance/D002H_SCOPE_RATIONALE.md || exit 3;
    test -f docs/governance/D002H_CLAIM_BOUNDARY.md || exit 4;
    test -f docs/governance/D002H_CANONICAL_RUN_AUTHORIZATION_GATES.md || exit 5;
    test -f artifacts/d002h/prereg/d002h_preregistration_lock.json || exit 6;
    python -c "import yaml;
    d=yaml.safe_load(open(\"docs/governance/D002H_PREREGISTRATION.yaml\"));
    assert d[\"study_id\"]==\"D-002H\";
    assert d[\"substrate_scope\"][\"included\"]==[\"ricci_flow\"];
    assert set(d[\"substrate_scope\"][\"excluded\"])=={\"block_structured\",\"temporal_coupling\"};
    assert d[\"canonical_run_authorized\"] is False;
    assert d[\"requires_explicit_authorization_artifact\"] is True;
    assert d[\"parent_merge_sha\"]==\"8cf5364a3f3b605d8b134bccbfe5170098e0e197\";
    assert \"cross-substrate robustness\" in d[\"forbidden_claims\"];
    assert \"general topology robustness\" in d[\"forbidden_claims\"];
    assert \"D-002G rescue\" in d[\"forbidden_claims\"];
    assert d[\"lineage_type\"]==\"fresh_preregistration\";
    assert d[\"prereg_lock\"][\"edit_policy\"]==\"fresh_pre_registration_only\"" || exit 7;
    grep -q "D-002G ↔ D-002H lineage transition" docs/governance/D002G_CANONICAL_RUN_BLOCKERS.md || exit 8;
    test "$(sha256sum docs/governance/D002C_CLAIM_LEDGER.yaml | awk "{print \$1}")" = "f96ba9b5a2057d2e0bff84afc28578ab316cff73f6dc6673fb0d6d543b8bd6dd" || exit 9;
    test "$(sha256sum research/systemic_risk/d002c_substrates.py | awk "{print \$1}")" = "4b2e5d65c104a5be5a207951cd3c4ae099f31ce83b3f2c0766a160d8c9e80eca" || exit 10;
    test "$(sha256sum research/systemic_risk/d002g_null_mechanisms.py | awk "{print \$1}")" = "c7e275191454e1e961d5a079a21b6e1dbfcbc1661d48ddf14d0d0c39a426f257" || exit 11;
    if grep -rE "D-002G rescued|D-002C rescued|D-002G validated|D-002G PASS|cross-substrate robustness|general topology robustness|M4 inside D-002G|M4 will fix|canonical run authorised|canonical run authorized" docs/governance/D002H_PREREGISTRATION.yaml docs/governance/D002H_SCOPE_RATIONALE.md docs/governance/D002H_CLAIM_BOUNDARY.md docs/governance/D002H_CANONICAL_RUN_AUTHORIZATION_GATES.md | grep -vE "forbidden|NOT|never|cannot|does not|do not|out of scope|out-of-scope|requires|❌|must (not|pass)|MUST NOT|when authorised|when authorized|after.+(authorisation|authorization)|until.+(authorisation|authorization)|^[^:]+:  - \"|attempt|reject|REJECT|deny|denied|prohibited|disallowed|impossible"; then
      echo "forbidden promotional phrase leaked outside denial context"; exit 12;
    fi'
  description: >-
    Probes the D-002H pre-registration artifact:
    (a) the 12 prereg tests all pass;
    (b) all 5 new docs/artifacts exist on disk;
    (c) the yaml carries study_id D-002H, scope_included=[ricci_flow],
        scope_excluded={block_structured,temporal_coupling},
        canonical_run_authorized=false, requires_explicit_authorization
        =true, parent_merge_sha=8cf5364a, forbidden_claims contains the
        three canonical phrases, lineage_type=fresh_preregistration,
        edit_policy=fresh_pre_registration_only;
    (d) BLOCKERS.md carries the new lineage-transition section;
    (e) D002C_CLAIM_LEDGER.yaml is byte-exact unchanged;
    (f) d002c_substrates.py is byte-exact unchanged at the parent
        closure base sha;
    (g) d002g_null_mechanisms.py is byte-exact unchanged;
    (h) no forbidden D-002G rescue / cross-substrate / M4-in-D002G /
        canonical-run-authorised phrase leaks outside denial context.
    If any of these regress, the D-002H prereg contract is broken.
