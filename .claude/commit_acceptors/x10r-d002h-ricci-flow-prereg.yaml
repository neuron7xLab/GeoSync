  assert d[\"lineage_type\"]==\"fresh_preregistration\";
  assert d[\"substrate_scope\"][\"included\"]==[\"ricci_flow\"];
  assert \"block_structured\" in d[\"substrate_scope\"][\"excluded\"];
  assert \"temporal_coupling\" in d[\"substrate_scope\"][\"excluded\"];
