# Diff-bound commit acceptor for the D-002H ricci_flow-only scope
# pre-registration PR.
#
# Opens a fresh pre-registered lineage after D-002G structural closure
# (PR #682 merge 8cf5364a3f3b605d8b134bccbfe5170098e0e197). D-002H is
# scoped to ricci_flow substrate only; block_structured and
# temporal_coupling are explicitly excluded per the closure finding
# (research/systemic_risk/d002c_substrates.py:401 — BlockStructuredSubstrate
# discards its seed by construction; TemporalKtSubstrate inherits via
# delegation at lines 481-483).
#
# Strict scope:
#   * NO D-002G scientific PASS claim.
#   * NO D-002G rescue claim. NO D-002C rescue claim.
#   * NO canonical D-002H run authorisation (this PR PASSES Gate A only).
#   * NO canonical sweep execution.
#   * NO D002C_CLAIM_LEDGER.yaml mutation (sha pinned byte-exact).
#   * NO D-002G prereg edit. NO M4 inside D-002G.
#   * NO substrate code edit. NO mechanism code edit.
#   * NO cross-substrate / general-topology robustness claim.
#
# The 7-gate conjunction (A..G) is the canonical-run authorisation
# contract. THIS PR passes Gate A only; Gates B..G live in separate
# downstream artifacts.

id: x10r-d002h-ricci-flow-prereg
status: ACTIVE
claim_type: documentation
promise: >-
  After this PR lands, docs/governance/D002H_PREREGISTRATION.yaml
  carries the schema_version "D002H-PREREGISTRATION-v1" with study_id
  "D-002H", lineage_type "fresh_preregistration", parent_merge_sha
  pinned to the D-002G structural-closure merge sha
  (8cf5364a3f3b605d8b134bccbfe5170098e0e197), substrate_scope.included
  == [ricci_flow], substrate_scope.excluded == [block_structured,
  temporal_coupling], canonical_run_authorized == false,
  requires_explicit_authorization_artifact == true, prereg_lock with
  edit_policy "fresh_pre_registration_only".

  docs/governance/D002H_SCOPE_RATIONALE.md carries the 8-section
  rationale; docs/governance/D002H_CLAIM_BOUNDARY.md carries the
  verbatim claim-boundary paragraph plus 5 forbidden interpretations;
  docs/governance/D002H_CANONICAL_RUN_AUTHORIZATION_GATES.md enumerates
  exactly the 7 gates A..G with the explicit conjunction rule;
  artifacts/d002h/prereg/d002h_preregistration_lock.json carries the
  schema_version "D002H-PREREGISTRATION-LOCK-v1" payload.

  docs/governance/D002G_CANONICAL_RUN_BLOCKERS.md gains an append-only
  "D-002G ↔ D-002H lineage transition" section after §B2 referencing
  the D-002H prereg + gates docs.

  tests/systemic_risk/test_d002h_preregistration.py adds 12 tests
  pinning the D-002H prereg invariants:
    test_d002h_prereg_exists,
    test_d002h_scope_is_ricci_flow_only,
    test_d002h_excludes_block_structured,
    test_d002h_excludes_temporal_coupling,
    test_d002h_forbids_cross_substrate_claims,
    test_d002h_forbids_d002g_rescue_claim,
    test_d002h_forbids_canonical_run_without_authorization,
    test_d002h_preserves_d002c_ledger,
    test_d002h_parent_closure_sha_pinned,
    test_d002h_requires_fresh_lineage,
    test_d002h_claim_boundary_verbatim_present,
    test_d002h_no_substrate_code_touch.

  Strict scope: prereg + rationale + claim-boundary + gates + lock
  json + tests + acceptor + BLOCKERS.md append-only update. NO
  substrate / mechanism / D-002G prereg / D-002C ledger mutation. NO
  canonical D-002H run authorisation. THIS PR passes Gate A only.

