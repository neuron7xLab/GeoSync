# Diff-bound acceptor for the detect-secrets version-floor pin.
#
# Surgical change to constraints/security.txt to add a `>=1.5.42` floor
# on the detect-secrets package, eliminating a v1.5.0 hook bug that
# causes the secrets-supply-chain gate to fail on byte-identical
# baselines (exit=3 with empty on-disk diff).

id: detect-secrets-version-floor
status: ACTIVE
claim_type: security
promise: >-
  constraints/security.txt declares `detect-secrets>=1.5.42`. The
  CI step `pr-gate.yml::secrets-supply-chain :: Ensure security
  tooling` resolves detect-secrets through this constraints file
  (`pip install -c constraints/security.txt detect-secrets`), so any
  fresh-runner install picks up the post-1.5.0 fix instead of falling
  back to the buggy 1.5.0 release. Floor (>=) is used rather than an
  exact pin (==) because this is tooling, not a runtime dependency,
  and the CVE surface for detect-secrets is empty — the goal is to
  exclude one specific buggy version, not freeze the toolchain.
diff_scope:
  changed_files:
    - path: ".claude/commit_acceptors/detect-secrets-version-floor.yaml"
    - path: "constraints/security.txt"
  forbidden_paths:
    - "trading/"
    - "execution/"
    - "forecast/"
    - "policy/"
required_python_symbols: []
expected_signal: >-
  CI workflow `pr-gate.yml :: secrets-supply-chain` step
  "Detect-secrets using baseline" exits 0 on a byte-identical
  baseline run (no spurious "baseline updated" exit=3). Verified
  on this very PR: run-with-1.5.0 fails with that message; pin
  to >=1.5.42 makes the install resolve to a fixed release.
measurement_command: >-
  bash -c '.venv/bin/detect-secrets-hook --baseline .github/detect-secrets.baseline --exclude-files "^(INVENTORY\\.json|\\.github/detect-secrets\\.baseline)\$" $(git diff --name-only --diff-filter=ACMR origin/main..HEAD | tr "\\n" " "); test \$? -eq 0'
signal_artifact: "tmp/detect_secrets_version_floor.log"
falsifier:
  command: >-
    bash -c 'python3 -m venv /tmp/ds150 && /tmp/ds150/bin/pip install detect-secrets==1.5.0 >/dev/null && cp .github/detect-secrets.baseline /tmp/baseline.snap && /tmp/ds150/bin/detect-secrets-hook --baseline .github/detect-secrets.baseline --exclude-files "^(INVENTORY\\.json|\\.github/detect-secrets\\.baseline)\$" artifacts/rolling_es_proximity_oos.json; rc=$?; diff /tmp/baseline.snap .github/detect-secrets.baseline; echo "rc=$rc diff_clean=$?"'  # pragma: allowlist secret
  description: >-
    Probe demonstrates that detect-secrets 1.5.0 exits non-zero
    while the on-disk baseline is byte-identical to the pre-run
    snapshot. If the floor in constraints is silently downgraded
    or removed, this falsifier reproduces the failure mode that
    motivated the pin.
rollback_command: >-
  git checkout HEAD~1 --
  constraints/security.txt
  .claude/commit_acceptors/detect-secrets-version-floor.yaml
rollback_verification_command: >-
  git diff --exit-code constraints/security.txt
memory_update_type: append
ledger_path: ".claude/commit_acceptors/detect-secrets-version-floor.yaml"
report_path: "constraints/security.txt"
evidence: []
