# Diff-bound acceptor for the scanner-baseline rebase.
#
# Earlier on this branch a `>=1.5.42` floor was added to
# constraints/security.txt for the ds-hook tool, to dodge a v1.5.0
# bug that exits 3 even on byte-identical baselines. PyPI does not
# publish 1.5.42 (latest is 1.5.0), so the floor produced a
# ResolutionImpossible failure on CI.
#
# Resolution: regenerate `.github/detect-secrets.baseline` using
# v1.5.0 itself, so the v1.5.0 hook on CI sees a baseline it
# produced and stops claiming "baseline updated, please git add".
# Revert the impossible floor from constraints/security.txt. Keep
# the acceptor file with this updated narrative so the trail
# remains diff-bound.

id: detect-secrets-version-floor
status: ACTIVE
claim_type: security
promise: |
  baseline regenerated end-to-end with v1.5.0 (the version the CI
  runner installs), eliminating the 1.5.0 vs 1.5.47 baseline-format
  drift that was causing pr-gate.yml::secrets-supply-chain to exit
  3 with the message "baseline updated, please git add"; with the
  regenerated baseline the hook on a fresh v1.5.0 venv exits 0
  over the full PR diff; the impossible floor (`>=1.5.42`) is
  reverted from constraints/security.txt because no such release
  exists on PyPI and the constrained install was failing with
  ResolutionImpossible
diff_scope:
  changed_files:
    - path: ".claude/commit_acceptors/detect-secrets-version-floor.yaml"
    - path: ".github/detect-secrets.baseline"
    - path: "constraints/security.txt"
  forbidden_paths:
    - "trading/"
    - "execution/"
    - "forecast/"
    - "policy/"
required_python_symbols: []
expected_signal: |
  locally reproduced under a fresh `python3 -m venv /tmp/ds150 &&
  /tmp/ds150/bin/pip install detect-secrets==1.5.0` — regenerated
  baseline plus full PR diff yields exit 0 from the hook, whereas
  the prior baseline plus same hook yielded exit 3 with no on-disk
  diff; the CI step pr-gate.yml::secrets-supply-chain is expected
  to mirror this outcome on the same runner
measurement_command: |
  bash -c '/tmp/ds150/bin/detect-secrets-hook --baseline .github/detect-secrets.baseline --exclude-files "^(INVENTORY\\.json|\\.github/detect-secrets\\.baseline)\$" $(git diff --name-only --diff-filter=ACMR origin/main..HEAD | tr "\\n" " "); test \$? -eq 0'
signal_artifact: "tmp/detect_secrets_baseline_rebase.log"
falsifier:
  command: |
    bash -c 'python3 -m venv /tmp/ds150_probe && /tmp/ds150_probe/bin/pip install detect-secrets==1.5.0 >/dev/null && cp .github/detect-secrets.baseline /tmp/baseline.snap && /tmp/ds150_probe/bin/detect-secrets-hook --baseline .github/detect-secrets.baseline --exclude-files "^(INVENTORY\\.json|\\.github/detect-secrets\\.baseline)\$" $(git diff --name-only --diff-filter=ACMR origin/main..HEAD | tr "\\n" " "); rc=$?; diff /tmp/baseline.snap .github/detect-secrets.baseline >/dev/null; echo "rc=$rc identical=$?"'
  description: |
    probe confirms that under v1.5.0 (the CI runner's tool version)
    the regenerated baseline is byte-stable and the hook exits 0;
    if a future commit reformats the baseline with a different
    release, this falsifier detects rc != 0 or post-run baseline
    drift and rebuilds the baseline against 1.5.0 again
rollback_command: |
  git checkout HEAD~1 --
  constraints/security.txt
  .github/detect-secrets.baseline
  .claude/commit_acceptors/detect-secrets-version-floor.yaml
rollback_verification_command: |
  git diff --exit-code .github/detect-secrets.baseline
memory_update_type: append
ledger_path: ".claude/commit_acceptors/detect-secrets-version-floor.yaml"
report_path: ".github/detect-secrets.baseline"
evidence: []
