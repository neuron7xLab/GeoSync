# Diff-bound commit acceptor for the D-002H R2-B scope-clarification PR.
#
# Pre-flight readiness check identified that R2-B (FPR under M6 placebo
# coupling) is inherited from D-002G acceptance rules but M6 is excluded
# from D-002H's null_mechanisms_allowed (which is [M1, M3] only). The
# 7-gate authorisation chain A..G did NOT explicitly resolve this scope
# drift. This PR resolves it as inherited-but-inapplicable, scoping the
# D-002H canonical-run acceptance verdict to a 4-term conjunction
# (R1 AND R2 AND R3 AND NULL_AUDIT) under D-002H scope only.
#
# Pure documentation + tests. NO source-code edit. NO canonical sweep
# execution. NO authorisation re-claim (Gate G already authorised the
# canonical sweep scoped to ricci_flow). NO D-002G acceptance rules
# edit. NO D-002H prereg edit. NO D002C ledger touch. NO prior gate
# artifact (A..G) edit.
#
# R2-B is dropped because the substrate AND mechanism conjunction it
# requires (any AND M6) is empty under D-002H scope, NOT because the
# rule has been weakened. Future M3-based R2-B analogue would be a
# fresh D-002J pre-registration.

id: x10r-d002h-r2b-scope-clarification
status: ACTIVE
claim_type: governance
