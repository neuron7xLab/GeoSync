  the 4-term conjunction R1 AND R2 AND R3 AND NULL_AUDIT, a Section 5
  verdict-applicability table with exactly 4 APPLICABLE rule rows
  (R1, R2, R3, NULL_AUDIT) and exactly 1 bold INAPPLICABLE row (R2-B),
  a Section 7 future-evolution clause naming D-002J + fresh
  pre-registration, a Section 8 forbidden-interpretation block with
  at least 4 forbidden lines, a Section 9 verbatim claim-boundary
  block, and a Section 10 cryptographic-anchor table.

  tests/systemic_risk/test_d002h_r2b_inapplicability.py carries the
  10 required-by-brief tests with exact names: test_r2b_note_exists,
  test_r2b_inapplicability_block_present,
  test_r2b_verdict_table_lists_4_applicable_rules,
