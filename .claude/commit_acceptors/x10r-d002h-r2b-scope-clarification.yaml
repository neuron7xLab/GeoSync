  test_r2b_future_evolution_requires_fresh_prereg,
  test_r2b_forbidden_interpretations_present,
  test_r2b_no_canonical_sweep_authorisation_claim.

  docs/governance/D002G_CANONICAL_RUN_BLOCKERS.md gains an append-only
  D-002H R2-B scope-clarification section.

  D-002G acceptance rules byte-exact 875b1e3eb031b8e5333dc8b455454f0a30419ead1ebe787aa01d5882e7d6ad31.
  D-002H prereg byte-exact 44b18b5a40ce9d188a9c3bd49339621f81a65a15f97a683247902450dd54acec.
  D-002C claim ledger byte-exact f96ba9b5a2057d2e0bff84afc28578ab316cff73f6dc6673fb0d6d543b8bd6dd.

  Pure scope clarification: NO new source code, NO new acceptance
  rule, NO canonical sweep run, NO prior-gate artifact edit. R2-B
  is dropped because the substrate AND mechanism conjunction it
  requires (any AND M6) is empty under D-002H scope, NOT because
  the rule has been weakened.

