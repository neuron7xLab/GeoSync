  - "tests.systemic_risk.test_d002j_crisis_window_registry.test_blockers_append_only_p2_section"
  - "tests.systemic_risk.test_d002j_crisis_window_registry.test_no_unresolved_merge_markers"
expected_signal: >-
  PYTHONPATH=. python -m pytest
  tests/systemic_risk/test_d002j_crisis_window_registry.py -q passes
  all 16 P2 guard cases; two crisis-window JSON artifacts validate
  with pinned schema_version strings (D002J-CRISIS-WINDOW-REGISTRY-v1
  / D002J-CRISIS-WINDOW-SUMMARY-v1); decision
  CRISIS_WINDOW_REGISTRY_READY emitted; six locked governance shas
  all byte-exact.
measurement_command: >-
  bash -c 'set -e;
  PYTHONPATH=. python -m pytest tests/systemic_risk/test_d002j_crisis_window_registry.py -q;
  test -f artifacts/d002j/crisis_windows/crisis_window_registry_v1.json;
  test -f artifacts/d002j/crisis_windows/crisis_window_summary_v1.json;
  python -m json.tool artifacts/d002j/crisis_windows/crisis_window_registry_v1.json > /dev/null;
  python -m json.tool artifacts/d002j/crisis_windows/crisis_window_summary_v1.json > /dev/null;
  grep -q "CRISIS_WINDOW_REGISTRY_READY" artifacts/d002j/crisis_windows/crisis_window_summary_v1.json;
  grep -q "D002J-CRISIS-WINDOW-REGISTRY-v1" artifacts/d002j/crisis_windows/crisis_window_registry_v1.json;
  grep -q "D-002J-P2" docs/governance/D002G_CANONICAL_RUN_BLOCKERS.md;
  test ! -d artifacts/d002j/ingestion;
  test "$(sha256sum docs/governance/D002J_PREREGISTRATION.yaml | awk "{print \$1}")" = "f3dc65b7e64b96eafe6f23ca8bdd0e05dc9bf95b12c2658b227bd0340f7975a0"'
signal_artifact: "artifacts/d002j/crisis_windows/crisis_window_summary_v1.json"
falsifier:
  command: >-
    bash -c 'set -e;
    PYTHONPATH=. python -m pytest tests/systemic_risk/test_d002j_crisis_window_registry.py -q || exit 1;
    grep -q "CRISIS_WINDOW_REGISTRY_READY" artifacts/d002j/crisis_windows/crisis_window_summary_v1.json || exit 2;
    grep -q "D002J-CRISIS-WINDOW-REGISTRY-v1" artifacts/d002j/crisis_windows/crisis_window_registry_v1.json || exit 3;
    grep -q "D-002J-P2" docs/governance/D002G_CANONICAL_RUN_BLOCKERS.md || exit 4;
    test ! -d artifacts/d002j/ingestion || exit 5;
    test "$(sha256sum docs/governance/D002J_PREREGISTRATION.yaml | awk "{print \$1}")" = "f3dc65b7e64b96eafe6f23ca8bdd0e05dc9bf95b12c2658b227bd0340f7975a0" || exit 6'
  description: >-
    Probes D-002J-P2 crisis window registry: 16 tests pass; summary
    JSON declares CRISIS_WINDOW_REGISTRY_READY; registry JSON declares
    schema D002J-CRISIS-WINDOW-REGISTRY-v1; BLOCKERS appended with
    D-002J-P2 section; artifacts/d002j/ingestion/ does NOT exist
    (P3 boundary); D-002J prereg sha byte-exact UNCHANGED.
rollback_command: >-
  bash -c 'git checkout HEAD -- docs/research/D002J_CRISIS_WINDOW_REGISTRY.md docs/research/D002J_CRISIS_WINDOW_SELECTION_RATIONALE.md docs/governance/D002G_CANONICAL_RUN_BLOCKERS.md tests/systemic_risk/test_d002j_crisis_window_registry.py && rm -rf artifacts/d002j/crisis_windows/ && rm -f .claude/commit_acceptors/x10r-d002j-p2-crisis-window-registry.yaml'
rollback_verification_command: >-
  bash -c 'test ! -f .claude/commit_acceptors/x10r-d002j-p2-crisis-window-registry.yaml && test ! -d artifacts/d002j/crisis_windows'
memory_update_type: append
ledger_path: ".claude/commit_acceptors/x10r-d002j-p2-crisis-window-registry.yaml"
report_path: "docs/research/D002J_CRISIS_WINDOW_REGISTRY.md"
evidence: []
