# Diff-bound commit acceptor for the D-002J-P2 crisis window registry
# v1 PR.
#
# D-002J-P2 is the W2 implementation gate following the merged P1B
# repair (sha 5102b008ee9fb89545f22ebafc8289aa40c0571c) which landed
# as `SOURCE_REGISTRY_PARTIALLY_VERIFIED`. P2 is registry-only: it
# assembles the 6 locked crisis windows (CW1..CW6) on top of P1B-
# surviving sources (audit_status VERIFIED or PARTIAL). P2 does NOT
# ingest, does NOT model, does NOT execute any null, does NOT
# authorise any canonical run, does NOT claim crisis prediction,
# does NOT claim bank-level validation, does NOT overclaim cross-
# asset/interbank causal inference.

id: x10r-d002j-p2-crisis-window-registry
status: ACTIVE
claim_type: governance
promise: >-
  After this PR lands,
  artifacts/d002j/crisis_windows/crisis_window_registry_v1.json
  carries 6 windows (CW1_GFC_2007_2009, CW2_EUROZONE_2011_2012,
  CW3_US_REPO_SPIKE_2019, CW4_COVID_DASH_FOR_CASH_2020,
  CW5_UK_GILT_LDI_2022, CW6_REGIONAL_BANKING_2023) under schema
  D002J-CRISIS-WINDOW-REGISTRY-v1; every source_id referenced is a
  P1B-surviving source (audit_status VERIFIED or PARTIAL); each
  window carries the 18 required fields including pre/post event
  buffers, mechanism family mapping, observable signature, exclusion
  notes, lookahead risk, data availability status, and claim
  boundary. artifacts/d002j/crisis_windows/crisis_window_summary_v1.json
  declares decision CRISIS_WINDOW_REGISTRY_READY under schema
  D002J-CRISIS-WINDOW-SUMMARY-v1. The six locked governance shas
  remain byte-exact. P1B audit verdict remains banked verbatim.
  No source-code, prereg, ledger, ingestion, or canonical-run change.

diff_scope:
  changed_files:
    - path: "artifacts/d002j/crisis_windows/crisis_window_registry_v1.json"
    - path: "artifacts/d002j/crisis_windows/crisis_window_summary_v1.json"
    - path: "docs/research/D002J_CRISIS_WINDOW_REGISTRY.md"
    - path: "docs/research/D002J_CRISIS_WINDOW_SELECTION_RATIONALE.md"
    - path: "docs/governance/D002G_CANONICAL_RUN_BLOCKERS.md"
    - path: "tests/systemic_risk/test_d002j_crisis_window_registry.py"
    - path: ".claude/commit_acceptors/x10r-d002j-p2-crisis-window-registry.yaml"
    - path: ".github/detect-secrets.baseline"
  forbidden_paths:
    - "docs/governance/D002C_CLAIM_LEDGER.yaml"
    - "docs/governance/D002C_PREREGISTRATION.yaml"
    - "docs/governance/D002G_ACCEPTANCE_RULES.md"
    - "docs/governance/D002G_PREREGISTRATION.yaml"
    - "docs/governance/D002H_PREREGISTRATION.yaml"
    - "docs/governance/D002I_PREREGISTRATION.yaml"
    - "docs/governance/D002J_PREREGISTRATION.yaml"
    - "artifacts/d002c/"
    - "artifacts/d002g/"
    - "artifacts/d002h/"
    - "artifacts/d002i/"
    - "artifacts/d002j/prereg/"
    - "artifacts/d002j/data_registry/"
    - "artifacts/d002j/ingestion/"
    - "research/systemic_risk/"
    - "scripts/x10r_d002c_attempt_2_null_audit.py"
    - "scripts/x10r_d002g_gate_d_scan.py"
    - "scripts/x10r_d002h_gate_d_scan.py"
    - "scripts/x10r_d002h_canonical_sweep.py"
required_python_symbols:
  - "tests.systemic_risk.test_d002j_crisis_window_registry.test_p2_only_uses_p1b_verified_or_partial_sources"
  - "tests.systemic_risk.test_d002j_crisis_window_registry.test_no_p2_source_id_missing_from_p1b_registry"
  - "tests.systemic_risk.test_d002j_crisis_window_registry.test_no_p2_source_id_from_downgraded_or_rejected_sources"
  - "tests.systemic_risk.test_d002j_crisis_window_registry.test_each_window_has_minimum_three_p1b_surviving_sources"
  - "tests.systemic_risk.test_d002j_crisis_window_registry.test_each_window_has_expected_observable_signature"
  - "tests.systemic_risk.test_d002j_crisis_window_registry.test_each_window_has_mechanism_family_mapping"
  - "tests.systemic_risk.test_d002j_crisis_window_registry.test_each_window_has_valid_date_bounds"
  - "tests.systemic_risk.test_d002j_crisis_window_registry.test_no_prediction_claim"
  - "tests.systemic_risk.test_d002j_crisis_window_registry.test_no_bank_level_validation_claim"
  - "tests.systemic_risk.test_d002j_crisis_window_registry.test_no_cross_asset_interbank_overclaim"
  - "tests.systemic_risk.test_d002j_crisis_window_registry.test_no_ingestion"
