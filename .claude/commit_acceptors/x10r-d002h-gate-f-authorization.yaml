# Diff-bound commit acceptor for the D-002H Gate F canonical-run
# authorisation artifact PR.
#
# Pure declaration + ancestor verification. Emits a machine-readable
# artifact at artifacts/d002h/authorization/d002h_canonical_run_authorisation.json
# (schema D002H-CANONICAL-RUN-AUTHORISATION-v1) and a human-readable
# report at docs/governance/D002H_GATE_F_AUTHORIZATION_REPORT.md. The
# 5 prior-gate anchor shas are verified ancestors of origin/main via
# git merge-base --is-ancestor (one probe per gate at PR time + inside
# the test suite).
#
# Strict scope (per the operating law):
#   * NO canonical run. NO sweep. NO results. NO sweep PR.
#   * NO new mechanism family. NO new verdict literal. NO new salt.
#   * NO D-002G prereg edit. NO D-002H prereg edit. NO locked-file edit.
#   * NO D002C_CLAIM_LEDGER.yaml mutation (sha pinned byte-exact at
#     f96ba9b5a2057d2e0bff84afc28578ab316cff73f6dc6673fb0d6d543b8bd6dd).
#   * NO substrate code edit. NO mechanism code edit.
#   * NO claim "Gate F PASS -> canonical run authorised"; the 7-gate
#     conjunction A AND B AND C AND D AND E AND F AND G is the contract.
#     Gate F is INTERMEDIATE authorisation; canonical_run_authorized_final
#     is False; Gate G + a separate sweep PR are still required.

