# Diff-bound commit acceptor for the Data Reality Firewall (pillar 3).
#
# Adds the third pillar of the Canonical Seven — an eight-gate
# fail-closed ingress contract that every empirical panel must pass
# before any downstream metric is produced. Pure-function, no I/O,
# mypy --strict / ruff / black clean.
#
# Eight orthogonal gates:
#   G1 SCHEMA_TYPE   — keys are date, values ndarray[float64].
#   G2 SHAPE         — every matrix is (N,N) with N == len(node_labels).
#   G3 FINITE        — no NaN, no Inf.
#   G4 SIGN          — entries >= 0.
#   G5 DIAGONAL      — diagonal == 0 (no self-loops).
#   G6 SPARSITY      — at least one non-zero entry per snapshot.
#   G7 MONOTONIC_TIME— dates strictly increasing in iteration order.
#   G8 PROVENANCE    — source_id / schema_version / capture_timestamp_utc /
#                      payload_sha256 (64-hex) per snapshot.
#
# DataFirewallReport.passed_all is the contract surface consumed by
# death_conditions.trigger_data_proxy_invalid (Tier-action STOP on fail).
#
# Locally verified:
#   * pytest tests/research/systemic_risk/test_data_firewall.py: 34/34 pass
#   * mypy --strict on data_firewall.py + test file: 0 errors
#   * ruff + black on changed files: clean

id: data-reality-firewall
status: ACTIVE
claim_type: governance
promise: >-
  After this PR lands, ``research.systemic_risk`` exposes
  ``run_data_firewall`` and 8 individual gate-checks. The orchestrator
  returns a frozen ``DataFirewallReport`` whose ``passed_all`` field is
  the disjunction-free conjunction of all eight gates and is wired
  into the existing ``trigger_data_proxy_invalid`` path of
  ``DeathConditionsRegistry``.

diff_scope:
  changed_files:
    - path: ".claude/commit_acceptors/data-reality-firewall.yaml"
    - path: "research/systemic_risk/__init__.py"
    - path: "research/systemic_risk/data_firewall.py"
    - path: "tests/research/systemic_risk/test_data_firewall.py"
  forbidden_paths:
    - "trading/"
    - "execution/"
    - "forecast/"
    - "policy/"
    - "core/"
    - "runtime/"
    - "application/"

required_python_symbols:
  - "research/systemic_risk/data_firewall.py::run_data_firewall"
  - "research/systemic_risk/data_firewall.py::DataFirewallReport"
  - "research/systemic_risk/data_firewall.py::Provenance"
  - "research/systemic_risk/data_firewall.py::FIREWALL_GATES"
  - "tests/research/systemic_risk/test_data_firewall.py::TestRunDataFirewall"

expected_signal: >-
  ``pytest tests/research/systemic_risk/test_data_firewall.py -q`` reports
  34 passed; before this PR the same command fails with
  ModuleNotFoundError on ``research.systemic_risk.data_firewall``.

measurement_command: >-
  bash -c '
    mypy --strict
      research/systemic_risk/data_firewall.py
      tests/research/systemic_risk/test_data_firewall.py
    && python -m pytest tests/research/systemic_risk/test_data_firewall.py -q
  '

signal_artifact: "tmp/data_reality_firewall.log"

falsifier:
  command: >-
    bash -c '
      python -c "from research.systemic_risk import run_data_firewall, FIREWALL_GATES; assert len(FIREWALL_GATES) == 8" 2>/dev/null
      && exit 1
      || exit 0
    '
  description: >-
    Probes that the firewall orchestrator and 8-gate roster are exposed
    on the public package surface. The falsifier inverts: it succeeds
    (exit 0) only when the import or the gate-count assertion fails,
    which would mean the firewall layer rolled back.

rollback_command: >-
  bash -c '
    git rm -f
      research/systemic_risk/data_firewall.py
      tests/research/systemic_risk/test_data_firewall.py
      .claude/commit_acceptors/data-reality-firewall.yaml
    && git checkout HEAD~1 -- research/systemic_risk/__init__.py
  '

rollback_verification_command: >-
  bash -c '
    python -c "
    try:
        from research.systemic_risk import run_data_firewall
    except ImportError:
        pass
    else:
        raise SystemExit(1)
    "
  '

memory_update_type: append
ledger_path: ".claude/commit_acceptors/data-reality-firewall.yaml"
report_path: "tmp/data_reality_firewall.log"
evidence: []
