# Diff-bound commit acceptor for D-002 — Gate 6 sensitivity
# surface / MDE map.
#
# What lands:
#   * research/reconstruction/sensitivity_surface.py
#       SensitivityCell / SensitivitySurface dataclasses +
#       mix_substrate_with_null + compute_sensitivity_surface.
#   * tests/reconstruction/test_gate6_sensitivity_surface.py
#       12 tests pinning mixing-helper edge cases, surface shape,
#       round-trip, cell lookup, power monotonicity (slow), FPR
#       bound (slow).
#   * X10R_GATE6_SENSITIVITY_SURFACE.md
#       Empirical MDE map + reproduction recipe + explicit
#       "What this PR does NOT do" section.
#
# Strict scope:
#   No real data. Synthetic only. No Gate 6 real-data verdict.
#   No bank-level claim. Only adds an MDE-mapping module that
#   measures the existing Gate 6 helper's discriminative
#   capacity across (N × λ) regimes via lambda-mixing of a
#   core-periphery substrate with its topology-randomised null.

id: x10r-gate6-sensitivity-surface
status: ACTIVE
claim_type: chore
promise: >-
  After this PR lands, research/reconstruction/sensitivity_
  surface.py exposes the missing MDE-mapping surface flagged by
  D-002 (P0). compute_sensitivity_surface walks an (N × λ)
  grid, lambda-mixing a core-periphery substrate with its
  topology-randomised null at each λ to control true precursor
  strength. For each cell we record n_pass / power / signed-
  direction histogram / median ΔR / median CI width. The
  surface exposes fpr_estimate (= average power at λ=0) and
  mde_lambda_per_n (= smallest λ where power ≥ 0.80 per N).
  Closes the ambiguity the X-10R-1 epic surfaced (the E2E
  pipeline returned NO_SIGNAL on N=25; without an MDE map we
  cannot tell "no signal" from "instrument blind"). Report at
  X10R_GATE6_SENSITIVITY_SURFACE.md pins the empirical MDE
  finding. NO real-data verdict, NO bank-level claim, NO
  source-side change to the existing Gate 6 helper.
diff_scope:
  changed_files:
    - path: ".claude/commit_acceptors/x10r-gate6-sensitivity-surface.yaml"
    - path: "research/reconstruction/sensitivity_surface.py"
    - path: "tests/reconstruction/test_gate6_sensitivity_surface.py"
    - path: "X10R_GATE6_SENSITIVITY_SURFACE.md"
  forbidden_paths:
    - "trading/"
    - "execution/"
    - "forecast/"
    - "policy/"
    - "core/physics/"
    - "core/kuramoto/"
    - "research/reconstruction/kuramoto_on_reconstruction.py"  # NO source change
    - "research/reconstruction/allocator/"  # D-002 is reconstruction-side
    - "application/governance/claim_ledger.py"
    - "application/governance/commit_acceptor.py"
required_python_symbols:
  - "research/reconstruction/sensitivity_surface.py::SensitivityCell"
  - "research/reconstruction/sensitivity_surface.py::SensitivitySurface"
  - "research/reconstruction/sensitivity_surface.py::compute_sensitivity_surface"
  - "research/reconstruction/sensitivity_surface.py::mix_substrate_with_null"
expected_signal: >-
  Local: `pytest tests/reconstruction/test_gate6_sensitivity_surface.py -m "not slow" -q`
  reports "10 passed"; with "-m slow" reports "2 passed";
  `mypy --strict --follow-imports=silent` clean on the new files;
  `ruff check` and `black --check` both pass on those paths.
measurement_command: >-
  bash -c 'mypy --strict --follow-imports=silent
  research/reconstruction/sensitivity_surface.py
  tests/reconstruction/test_gate6_sensitivity_surface.py
  && ruff check research/reconstruction/sensitivity_surface.py tests/reconstruction/test_gate6_sensitivity_surface.py
  && black --check research/reconstruction/sensitivity_surface.py tests/reconstruction/test_gate6_sensitivity_surface.py
  && pytest tests/reconstruction/test_gate6_sensitivity_surface.py -m "not slow" -q'
signal_artifact: "tmp/x10r_gate6_sensitivity_surface.json"
falsifier:
  command: >-
    bash -c 'python -c "
    from research.reconstruction.sensitivity_surface import (
        compute_sensitivity_surface,
    )
    s = compute_sensitivity_surface(
        n_grid=(100,), lambda_grid=(0.0, 1.0),
        n_seeds=8, n_bootstrap=8,
    )
    one = s.cell(n=100, lambda_mix=1.0)
    zero = s.cell(n=100, lambda_mix=0.0)
    assert one is not None and zero is not None
    assert one.power > zero.power, (
        f\"Gate 6 instrument blind at N=100: power(λ=1)={one.power:.2f} \"
        f\"≤ power(λ=0)={zero.power:.2f}\"
    )
    "'
  description: >-
    Probes the D-002 invariant empirically: at N=100 the canonical
    CP substrate has a strong precursor — power(λ=1) > power(λ=0).
    If the falsifier exits non-zero, Gate 6 is regimes-blind in
    the most-favourable cell, which would invalidate every other
    cell of the surface.
rollback_command: >-
  bash -c 'git checkout HEAD~1 --
  && rm -f research/reconstruction/sensitivity_surface.py
  tests/reconstruction/test_gate6_sensitivity_surface.py
  X10R_GATE6_SENSITIVITY_SURFACE.md
  .claude/commit_acceptors/x10r-gate6-sensitivity-surface.yaml'
rollback_verification_command: >-
  bash -c 'test ! -f research/reconstruction/sensitivity_surface.py
  && test ! -f tests/reconstruction/test_gate6_sensitivity_surface.py
  && test ! -f X10R_GATE6_SENSITIVITY_SURFACE.md
  && test ! -f .claude/commit_acceptors/x10r-gate6-sensitivity-surface.yaml'
memory_update_type: append
ledger_path: ".claude/commit_acceptors/x10r-gate6-sensitivity-surface.yaml"
report_path: "tmp/x10r_gate6_sensitivity_surface.json"
evidence: []
