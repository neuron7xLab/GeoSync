# Diff-bound commit acceptor for the D-002H Gate D forbidden-claim
# scanner PR.
#
# Pure test scaffolding + scan report. Emits a machine-readable artifact
# at artifacts/d002h/scans/d002h_forbidden_claim_scan.json (schema
# D002H-GATE-D-v1) and a human-readable report at
# docs/governance/D002H_GATE_D_FORBIDDEN_CLAIM_SCAN.md. The scanner
# itself lives at scripts/x10r_d002h_gate_d_scan.py and is exercised by
# tests/systemic_risk/test_d002h_gate_d_forbidden_claims.py (10 tests).
#
# Strict scope (per the operating law):
#   * NO canonical run. NO sweep. NO results.
#   * NO new mechanism family. NO new verdict literal. NO new salt.
#   * NO D-002G prereg edit. NO D-002H prereg edit. NO locked-file edit.
#   * NO D002C_CLAIM_LEDGER.yaml mutation (sha pinned byte-exact at
#     f96ba9b5a2057d2e0bff84afc28578ab316cff73f6dc6673fb0d6d543b8bd6dd).
#   * NO substrate code edit. NO mechanism code edit.
#   * NO claim "Gate D PASS -> canonical run authorised"; the 7-gate
#     conjunction A AND B AND C AND D AND E AND F AND G is the contract.

id: x10r-d002h-gate-d-forbidden-claim-scan
status: ACTIVE
claim_type: governance
promise: >-
  After this PR lands,
  artifacts/d002h/scans/d002h_forbidden_claim_scan.json carries
  schema_version "D002H-GATE-D-v1" with study_id "D-002H", gate "D",
  gate_d_verdict "PASS", n_leaks == 0, canonical_run_authorized ==
  false, downstream_gates_remaining == ["E","F","G"], and a
  reproducible scanned/exempt enumeration produced by
  scripts/x10r_d002h_gate_d_scan.py. The artifact embeds the
  forbidden_claims list verbatim from the D-002H prereg (sha256
  44b18b5a40ce9d188a9c3bd49339621f81a65a15f97a683247902450dd54acec).

  docs/governance/D002H_GATE_D_FORBIDDEN_CLAIM_SCAN.md carries the
  8-section report (scope, forbidden-phrases table, exempt-files table,
  scanner method, verdict, claim boundary verbatim, forbidden
  interpretations, reproduce); the report is exempt from the scan by
  design.

  tests/systemic_risk/test_d002h_gate_d_forbidden_claims.py carries 10
  fast JSON / sha / scan-invariant tests with the exact names required
  by the Gate D brief: test_gate_d_artifact_exists,
  test_gate_d_scans_all_d002h_docs,
  test_gate_d_no_cross_substrate_robustness_claim,
  test_gate_d_no_d002g_rescue_claim,
  test_gate_d_no_d002c_rescue_claim,
  test_gate_d_no_scientific_pass_claim,
  test_gate_d_no_canonical_run_authorisation_claim,
  test_gate_d_no_m4_inside_d002g_claim,
  test_gate_d_block_structured_excluded,
  test_gate_d_temporal_coupling_excluded.

  docs/governance/D002G_CANONICAL_RUN_BLOCKERS.md gains an append-only
  "D-002H Gate D" section after the Gate C section.

  Gate D is pure declaration + scan: NO canonical run, NO sweep, NO
  results. NO new mechanism. NO new verdict literal. NO substrate /
  mechanism / locked governance edit. NO D-002C ledger mutation. NO
  D-002H prereg edit. NO canonical D-002H run authorisation - this PR
  addresses Gate D alone; Gates E, F, G remain open and the 7-gate
  conjunction is the contract.

