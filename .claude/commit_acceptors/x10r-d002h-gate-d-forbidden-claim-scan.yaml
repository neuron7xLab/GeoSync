expected_signal: >-
  `PYTHONPATH=. python -m pytest tests/systemic_risk/test_d002h_gate_d_forbidden_claims.py
  -q` passes all 10 tests; the scanner CLI
  `PYTHONPATH=. python scripts/x10r_d002h_gate_d_scan.py` exits 0 with
  "Gate D PASS: scanned=N exempt=M leaks=0"; the artifact JSON parses
  and satisfies the schema / verdict / counters asserts; the D-002C
  claim ledger sha256 stays byte-exact at
  f96ba9b5a2057d2e0bff84afc28578ab316cff73f6dc6673fb0d6d543b8bd6dd;
  the D-002H prereg sha256 stays byte-exact at
  44b18b5a40ce9d188a9c3bd49339621f81a65a15f97a683247902450dd54acec;
  BLOCKERS.md gains the "D-002H Gate D - forbidden-claim scanner"
  append-only section after the Gate C section.
measurement_command: >-
  bash -c 'set -e;
  PYTHONPATH=. python -m pytest tests/systemic_risk/test_d002h_gate_d_forbidden_claims.py -q;
  PYTHONPATH=. python scripts/x10r_d002h_gate_d_scan.py;
  python -c "import json;
  d=json.load(open(\"artifacts/d002h/scans/d002h_forbidden_claim_scan.json\"));
  assert d[\"schema_version\"]==\"D002H-GATE-D-v1\";
  assert d[\"study_id\"]==\"D-002H\";
  assert d[\"gate\"]==\"D\";
  assert d[\"gate_d_verdict\"]==\"PASS\";
  assert d[\"n_leaks\"]==0;
  assert d[\"canonical_run_authorized\"] is False;
  assert d[\"downstream_gates_remaining\"]==[\"E\",\"F\",\"G\"];
  assert isinstance(d[\"scanned_files\"], list) and len(d[\"scanned_files\"])>0;
  assert isinstance(d[\"exempt_files\"], list) and len(d[\"exempt_files\"])>0;
  assert d[\"files_with_leaks\"]==[];
  assert d[\"leaks\"]==[]";
  grep -q "D-002H Gate D" docs/governance/D002G_CANONICAL_RUN_BLOCKERS.md;
  grep -q "D002H-GATE-D-v1" docs/governance/D002H_GATE_D_FORBIDDEN_CLAIM_SCAN.md;
  test ! -d artifacts/d002h/canonical/results;
  test ! -d artifacts/d002h/authorization;
  test "$(sha256sum docs/governance/D002C_CLAIM_LEDGER.yaml | awk "{print \$1}")" = "f96ba9b5a2057d2e0bff84afc28578ab316cff73f6dc6673fb0d6d543b8bd6dd";
  test "$(sha256sum docs/governance/D002H_PREREGISTRATION.yaml | awk "{print \$1}")" = "44b18b5a40ce9d188a9c3bd49339621f81a65a15f97a683247902450dd54acec";
  test "$(sha256sum docs/governance/D002H_CANONICAL_RUN_AUTHORIZATION_GATES.md | awk "{print \$1}")" = "75becc5c0d57eab9505ab00fe36e35ce1513126f8415d510f1c65dd7643bc0e6";
  test "$(sha256sum research/systemic_risk/d002c_substrates.py | awk "{print \$1}")" = "4b2e5d65c104a5be5a207951cd3c4ae099f31ce83b3f2c0766a160d8c9e80eca";
  test "$(sha256sum research/systemic_risk/d002g_null_mechanisms.py | awk "{print \$1}")" = "c7e275191454e1e961d5a079a21b6e1dbfcbc1661d48ddf14d0d0c39a426f257"'
signal_artifact: "artifacts/d002h/scans/d002h_forbidden_claim_scan.json"
falsifier:
  command: >-
    bash -c 'set -e;
    PYTHONPATH=. python -m pytest tests/systemic_risk/test_d002h_gate_d_forbidden_claims.py -q || exit 1;
    test -f artifacts/d002h/scans/d002h_forbidden_claim_scan.json || exit 2;
    test -f docs/governance/D002H_GATE_D_FORBIDDEN_CLAIM_SCAN.md || exit 3;
    test -f tests/systemic_risk/test_d002h_gate_d_forbidden_claims.py || exit 4;
    test -f scripts/x10r_d002h_gate_d_scan.py || exit 5;
    PYTHONPATH=. python scripts/x10r_d002h_gate_d_scan.py || exit 6;
    python -c "import json;
    d=json.load(open(\"artifacts/d002h/scans/d002h_forbidden_claim_scan.json\"));
    assert d[\"schema_version\"]==\"D002H-GATE-D-v1\";
    assert d[\"gate_d_verdict\"]==\"PASS\";
    assert d[\"n_leaks\"]==0;
    assert d[\"canonical_run_authorized\"] is False;
    assert d[\"downstream_gates_remaining\"]==[\"E\",\"F\",\"G\"];
    assert d[\"leaks\"]==[];
    assert \"results\" not in d;
    assert \"sweep\" not in d" || exit 7;
    grep -q "D-002H Gate D" docs/governance/D002G_CANONICAL_RUN_BLOCKERS.md || exit 8;
    test "$(sha256sum docs/governance/D002C_CLAIM_LEDGER.yaml | awk "{print \$1}")" = "f96ba9b5a2057d2e0bff84afc28578ab316cff73f6dc6673fb0d6d543b8bd6dd" || exit 9;
    test "$(sha256sum docs/governance/D002H_PREREGISTRATION.yaml | awk "{print \$1}")" = "44b18b5a40ce9d188a9c3bd49339621f81a65a15f97a683247902450dd54acec" || exit 10;
    test "$(sha256sum research/systemic_risk/d002c_substrates.py | awk "{print \$1}")" = "4b2e5d65c104a5be5a207951cd3c4ae099f31ce83b3f2c0766a160d8c9e80eca" || exit 11;
    test "$(sha256sum research/systemic_risk/d002g_null_mechanisms.py | awk "{print \$1}")" = "c7e275191454e1e961d5a079a21b6e1dbfcbc1661d48ddf14d0d0c39a426f257" || exit 12;
    test ! -d artifacts/d002h/canonical/results || exit 13;
    test ! -d artifacts/d002h/authorization || exit 14;
    if grep -rE "canonical run authorised|canonical run authorized|Gate D authorises|D-002G rescued|D-002C rescued|cross-substrate robustness|general topology robustness|scientific PASS achieved|sweep complete|sweep result" docs/governance/D002H_GATE_D_FORBIDDEN_CLAIM_SCAN.md | grep -vE "forbidden|NOT|never|cannot|does not|do not|out of scope|MUST NOT|alone does NOT|alone is one term|prohibited|disallowed|requires|impossible|deny|denied|reject|REJECT|attempt|FAIL|after explicit authorisation|after.*all.*7.*gates|will pin|excluded|blocked|BLOCKED"; then
      echo "forbidden promotional phrase leaked outside denial context"; exit 15;
    fi'
  description: >-
    Probes the D-002H Gate D scanner artifact: 10 Gate D tests pass; 4
    new files exist on disk (scanner + test + report + JSON artifact);
    scanner CLI exits 0 PASS; artifact JSON has the locked schema_version
    D002H-GATE-D-v1, gate_d_verdict PASS, n_leaks 0,
    canonical_run_authorized False, downstream_gates_remaining
    [E,F,G], empty leaks list, no ``results`` or ``sweep`` field;
    BLOCKERS.md carries the new Gate D append-only section; D-002C
    claim ledger byte-exact at the anchor sha; D-002H prereg sha
    byte-exact at PR #683 anchor; D002H_CANONICAL_RUN_AUTHORIZATION_GATES
    sha byte-exact; substrate + mechanism module shas byte-exact
    unchanged; no artifacts/d002h/canonical/results/ directory exists;
    no artifacts/d002h/authorization/ directory exists; no forbidden
    promotional phrase leaks outside denial context inside the report.
    Regression on any -> Gate D contract broken.
rollback_command: >-
  bash -c 'rm -f
  tests/systemic_risk/test_d002h_gate_d_forbidden_claims.py
  scripts/x10r_d002h_gate_d_scan.py
  docs/governance/D002H_GATE_D_FORBIDDEN_CLAIM_SCAN.md
  artifacts/d002h/scans/d002h_forbidden_claim_scan.json
