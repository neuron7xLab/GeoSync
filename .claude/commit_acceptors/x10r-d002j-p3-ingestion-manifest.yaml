# Diff-bound commit acceptor for the D-002J-P3 ingestion manifest PR.
#
# D-002J-P3 is the first PR shipping under the P2.5 verdict-DAG contract.
# P3 defines WHAT may be ingested by WHICH adapter from WHICH P1B-audit-
# surviving source for WHICH P2 crisis window, under WHAT license/access
# boundary, with WHAT anti-lookahead constraints. P3 ships the CONTRACT,
# not the pipeline: no bytes ingested, no fetching executed, no modelling,
# no null execution, no canonical run authorisation, no D-002J prereg
# edit, no source-code change under research/systemic_risk/. The vintage-
# aware test (test_revisable_sources_require_vintage_adapter) makes
# point-in-time discipline EXECUTABLE for the first time in the lineage.

id: x10r-d002j-p3-ingestion-manifest
status: ACTIVE
claim_type: governance
promise: >-
  After this PR lands, artifacts/d002j/ingestion/ contains three
  contract-only JSON artifacts (ingestion_manifest_v1.json under schema
  D002J-INGESTION-MANIFEST-v1 with 18 adapters across 5 classes;
  adapter_registry_v1.json under schema D002J-ADAPTER-REGISTRY-v1;
  source_hash_manifest_v1.json under schema D002J-SOURCE-HASH-MANIFEST-v1
  with all expected_sha256_at_pin_time fields null at P3 emit time) plus
  two markdown contract documents (D002J_INGESTION_BOUNDARY.md and
  D002J_POINT_IN_TIME_DISCIPLINE.md). Every adapter source_id is a member
  of the P1B-surviving (VERIFIED or PARTIAL) source set; every adapter
  window_id is declared in the P2 crisis window registry; both parent
  registries are sha256-pinned in the manifest. The vintage-aware
  test enforces that every P1B source whose mechanistic_relevance
  contains real_time_information_constraint or
  vintage_anti_leakage_baseline is bound by at least one adapter with
  vintage_required=true, a non-null vintage_field, and the
  vintage_release_date <= decision_date lookahead invariant. The DAG
  verdict is regenerated to 6 nodes (was 5), the D-002J-P3 capsule is
  added under schema D002J-VERDICT-CAPSULE-v1 with parent=['D002J-P2']
  and allowed_next=['D002J-P4'] and forbidden_next covering P5..P9.
  docs/research/D002J_LINEAGE_MAP.md is re-rendered byte-deterministically.
  docs/governance/D002G_CANONICAL_RUN_BLOCKERS.md appends a P3 section.
  The six locked governance shas remain byte-exact. No data ingested,
  no canonical run authorised, no D-002H rescue claim.

