  bash -c 'set -e;
  PYTHONPATH=. python -m pytest tests/systemic_risk/test_d002j_ingestion_manifest.py -q;
  PYTHONPATH=. python -m pytest tests/governance/test_verdict_dag_integrity.py -q;
  PYTHONPATH=. python -m tools.governance.verdict_dag check -v;
  PYTHONPATH=. python -m tools.governance.render_lineage --out /tmp/_d002j_p3_lm1.md;
  PYTHONPATH=. python -m tools.governance.render_lineage --out /tmp/_d002j_p3_lm2.md;
  diff /tmp/_d002j_p3_lm1.md /tmp/_d002j_p3_lm2.md;
  test -f artifacts/d002j/ingestion/ingestion_manifest_v1.json;
  test -f artifacts/d002j/ingestion/adapter_registry_v1.json;
  test -f artifacts/d002j/ingestion/source_hash_manifest_v1.json;
  test -f artifacts/governance/verdicts/d002j_p3_verdict_v1.json;
  python -m json.tool artifacts/d002j/ingestion/ingestion_manifest_v1.json > /dev/null;
  grep -q "D002J-INGESTION-MANIFEST-v1" artifacts/d002j/ingestion/ingestion_manifest_v1.json;
  grep -q "INGESTION_MANIFEST_READY" artifacts/governance/verdicts/d002j_p3_verdict_v1.json;
