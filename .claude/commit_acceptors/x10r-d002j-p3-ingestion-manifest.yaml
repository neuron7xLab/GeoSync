  PYTHONPATH=. python -m pytest tests/systemic_risk/test_d002j_ingestion_manifest.py
  -q passes all 27 P3 guard tests; the ingestion_manifest_v1.json declares
  18 adapters across all 5 adapter classes with 3 vintage-aware and 1
  forecast adapter, every adapter source_id is P1B-surviving and every
  window_id is in the P2 registry, both parent shas (P1B registry and P2
