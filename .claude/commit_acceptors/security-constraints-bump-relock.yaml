# Diff-bound acceptor for the consolidated security-constraint bump +
# sanctioned lock regeneration that CLOSES the systemic Dependabot
# blocker on PRs #717/#718/#720/#723/#741.
#
# Root cause (proven, fixed structurally in #775 via drift class D8):
# Dependabot's /constraints pip ecosystem bumps a pin in
# constraints/security.txt but structurally CANNOT regenerate the
# pip-compiled requirements*.lock artifacts (they are
# `pip-compile --constraint=constraints/security.txt` outputs). The
# bumped constraint `==NEW` then contradicts the stale lock `==OLD`,
# so `pip install -c constraints/security.txt -r requirements.lock`
# aborts with ResolutionImpossible BEFORE any gate runs. This patch
# does what Dependabot cannot: applies the 4 bumps to
# constraints/security.txt AND regenerates all three locks via the
# sanctioned pip-compile pipeline recorded in each lock's own header,
# landing them as ONE correctly-locked change. No scanner is
# weakened; secret detection is untouched; no lock hand-edited.

id: security-constraints-bump-relock
status: ACTIVE
claim_type: security
promise: >-
  constraints/security.txt is bumped for four security-critical
  packages — cryptography 46.0.7 -> 48.0.0, requests 2.33.0 ->
  2.34.2, pydantic-settings 2.12.0 -> 2.14.1, certifi 2025.11.12 ->
  2026.4.22 — and requirements.lock, requirements-dev.lock and
  requirements-scan.lock are regenerated against the new constraint
  via the sanctioned pip-compile pipeline (the exact command recorded
  in each lock file's own autogenerated header), NOT hand-edited. The
  resulting tree has ZERO drift-class-D8 findings from
  tools/deps/validate_dependency_truth.py (constraint pins ==
  lock pins for all four packages across all three locks), so
  `pip install -c constraints/security.txt -r requirements.lock`
  resolves cleanly and the new fail-closed `constraints-lock-sync`
  pr-gate job passes. Each lock's package SET is unchanged versus
  origin/main (only version pins move); the sole additional pin
  movement is fastapi 0.128.0 -> 0.136.1 in requirements-scan.lock,
  a pre-existing staleness below the constraint's own
  `fastapi>=0.136.1` floor that the sanctioned regeneration
  self-corrects. No secret-detection coverage is reduced and no
  existing check is weakened, skipped, or overridden.
diff_scope:
  changed_files:
    - path: ".claude/commit_acceptors/security-constraints-bump-relock.yaml"
    - path: "constraints/security.txt"
    - path: "requirements.lock"
    - path: "requirements-dev.lock"
    - path: "requirements-scan.lock"
  forbidden_paths:
    - "trading/"
    - "execution/"
    - "forecast/"
    - "policy/"
    - "RIP/"
required_python_symbols: []
expected_signal: >-
  tools/deps/validate_dependency_truth.py reports zero D8 drifts on
  the post-bump tree; tests/deps/test_validate_dependency_truth.py
  passes in full (23 tests, including the live-tree D8 regression
  guard); the four target pins are identical between
  constraints/security.txt and all three requirements*.lock files;
  the new constraints-lock-sync pr-gate job is GREEN end-to-end.
measurement_command: >-
  python tools/deps/validate_dependency_truth.py
signal_artifact: "tmp/constraints_bump_relock_d8.log"
falsifier:
  command: >-
    python -m pytest tests/deps/test_validate_dependency_truth.py
    -v -k "d8 or shipping or live"
  description: >-
    Probe filters to the D8 forcing-function and live-tree regression
    tests. If the consolidated bump left ANY constraint/lock pin
    divergence (i.e. the relock was incomplete or hand-faked), the
    live-tree no-D8-divergence guard fails.
rollback_command: >-
  git checkout HEAD~1 -- constraints/security.txt requirements.lock
  requirements-dev.lock requirements-scan.lock
  .claude/commit_acceptors/security-constraints-bump-relock.yaml
rollback_verification_command: >-
  git diff --exit-code constraints/security.txt requirements.lock
memory_update_type: append
ledger_path: ".claude/commit_acceptors/security-constraints-bump-relock.yaml"
report_path: ".claude/commit_acceptors/security-constraints-bump-relock.yaml"
evidence: []
