expected_signal: >-
  PYTHONPATH=. python -m pytest
  tests/systemic_risk/test_d002j_power_first_gate.py -q passes all 26 P7
  guard tests; the power report declares exactly 102 canonical cells
  (Bonferroni denominator = 0.05/102 alpha), every per-cell substrate is
  a P5 substrate, every per-cell null is a P6 null whose
  applicable_substrates includes the substrate, every per-cell window is
  a P2 registry window declared by the substrate, every effect-size
  prior is sourced from a P4 control with a non-empty rationale and never
  inflates the P4 magnitude; n_min is computed for every cell with
  power_target=0.8; the runtime budget carries a measured
  per_sim_seconds; the false-negative risk is a quantified probability;
  the verbatim refusal_rule forbids loosening alpha / inflating the
  effect prior / shrinking the grid; the decision
  (POWER_GATE_REFUSED_UNDERPOWERED) is consistent with
  canonical_run_authorized=false and the underpowered_cells list; the
  D-002I median n_min~=93 anchor is referenced; the D-002J prereg sha is
  byte-exact UNCHANGED; the P7 capsule parses via
  tools.governance.verdict_dag with parent=['D002J-P6'],
  status=TERMINAL_REFUSED, allowed_next=[]; the DAG verdict regenerates
  to 10 nodes acyclic, no orphans,
  next_legal_nodes_from_main_head=[] (lineage halts at P7),
  canonical_run_authorized_anywhere=false; render_lineage is
  byte-identical on repeat runs; the locked governance shas byte-exact.
