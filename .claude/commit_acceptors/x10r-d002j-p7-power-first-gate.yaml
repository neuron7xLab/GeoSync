# Diff-bound commit acceptor for the D-002J-P7 power-first-gate PR.
#
# D-002J-P7 is the power-DESIGN gate D-002H lacked. It computes, per
# (P5-substrate x applicable-P6-null x P5-declared-P2-window x P5-metric)
# canonical cell: an honest effect-size prior sourced ONLY from the P4
# positive-control ground-truth magnitudes (no invented effect sizes), the
# minimum detectable effect at the Bonferroni-corrected alpha, n_min for
# power>=0.8, a runtime budget grounded by a MEASURED per-sim probe of one
# P5 substrate simulate call, the false-negative risk at a feasible budget
# cap, and a fail-closed refusal rule. It emits
# canonical_run_authorized=true IFF power>=0.8 is achievable within the
# stated feasible budget for every canonical cell; otherwise
# POWER_GATE_REFUSED_UNDERPOWERED. A truthful refusal is a scientific WIN
# (same canon as D-002H REFUSED, D-002J-P1A REJECTED). P7 does NOT execute
# a canonical run (P8), promote a claim (P9), fit real data, edit the
# D-002J prereg, or rewrite any P1..P6 artifact. P7 adds tooling under
# tools/systemic_risk/ ONLY -- it adds NO files under research/.
#
# Phase-coupling P7->{P5,P6,P2,P4}: the cell grid is a subset of
# {P5 substrates} x {P6 nulls} x {P2 windows} and every effect-size prior
# is sourced from a P4 positive control.

id: x10r-d002j-p7-power-first-gate
status: ACTIVE
claim_type: governance
promise: >-
  After this PR lands, tools/systemic_risk/ holds __init__.py +
  design_d002j_power_grid.py exposing effect_size_prior,
  bonferroni_denominator, enumerate_cells, mde, n_min, power_at,
  measure_per_sim_seconds, runtime_estimate, power_gate_decision,
  run_power_design, build_report, build_summary (pure numpy/scipy, no
  real data, no canonical run). power_report_v1.json (schema
  D002J-POWER-REPORT-v1) carries parent shas, the per-substrate
  effect_size_assumption {value, source_pc_id, rationale} sourced ONLY
  from P4 controls, an alpha_policy {family: bonferroni, denominator,
  derivation}, a per_cell list (substrate/null/window/metric/
  assumed_effect/mde/n_min/power_at_n_min), n_seeds/n_bootstrap/
  n_shuffles candidates, power_target=0.8,
  minimum_detectable_effect_global, a runtime_budget with a MEASURED
  per_sim_seconds, a quantified false_negative_risk, the
  underpowered_cells list, feasible_cap_n_seeds with a justification
  anchored to the D-002I median n_min~=93, the verbatim refusal_rule,
  canonical_run_authorized, and decision in {POWER_GATE_PASS,
  POWER_GATE_REFUSED_UNDERPOWERED, POWER_GATE_INVALID}.
  power_summary_v1.json (schema D002J-POWER-SUMMARY-v1) records n_cells,
  n_underpowered, the n_min distribution {min,median,p90,max}, the
  decision and canonical_run_authorized. The D-002J-P7 capsule is added
  under schema D002J-VERDICT-CAPSULE-v1 with parent=['D002J-P6']; on a
  PASS status=TERMINAL_PASS allowed_next=['D002J-P8']; on a REFUSED
  status=TERMINAL_REFUSED allowed_next=[] with a non-empty
  failure_retention recording the refused axis. The DAG verdict
  regenerates to 10 nodes acyclic (was 9), D002J_LINEAGE_MAP.md
  re-renders byte-deterministically, D002G_CANONICAL_RUN_BLOCKERS.md
  appends a P7 section recording the decision + canonical_run_authorized
  + (if REFUSED) the exact axis, and verdict_dag_integrity
  EXPECTED_NODE_IDS widens to include D002J-P7. The locked governance
  shas remain byte-exact. No real data, no canonical run authorised, no
  D-002J prereg edit, no D-002H rescue claim.

