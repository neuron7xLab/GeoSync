# Diff-bound commit acceptor for the D-002H Gate B eligibility
# reverification PR.
#
# Reuses the verifiers from research/systemic_risk/d002g_null_mechanisms.py
# (sha-pinned at the D-002G M3 merge cced6e60) to evaluate
# ricci_flow M1/M3 eligibility on the locked D-002H canonical grid
# {N=50,100,200} × λ ∈ {0.0, 0.05, 0.10, 0.20, 0.40, 1.0}. Emits a
# machine-readable verdict artifact at
# artifacts/d002h/eligibility/d002h_ricci_eligibility.json (schema
# D002H-GATE-B-v1).
#
# Strict scope (per the operating law):
#   * NO new mechanism family. NO new verdict literal. NO new salt.
#   * NO new tolerance constant — reuses M3 tolerances verbatim.
#   * NO D-002G prereg edit. NO D-002H prereg edit. NO locked-file edit.
#   * NO D002C_CLAIM_LEDGER.yaml mutation (sha pinned byte-exact).
#   * NO substrate code edit. NO mechanism code edit.
#   * NO canonical run start. NO canonical-run artifact.
#   * NO claim "Gate B PASS → canonical run authorised"; the 7-gate
#     conjunction A ∧ B ∧ C ∧ D ∧ E ∧ F ∧ G is the contract.

id: x10r-d002h-gate-b-eligibility
status: ACTIVE
claim_type: governance
promise: >-
  After this PR lands,
  artifacts/d002h/eligibility/d002h_ricci_eligibility.json carries the
  schema_version "D002H-GATE-B-v1" with study_id "D-002H", gate "B",
  substrate_scope == ["ricci_flow"], grid.N == [50, 100, 200],
  grid.lambda_values == [0.0, 0.05, 0.10, 0.20, 0.40, 1.0],
  grid.base_seed == 42, grid.null_seed_M3 == 12345, n_cells_evaluated
  == 18, gate_b_verdict == "PASS", canonical_run_authorized == false,
  downstream_gates_remaining == ["C","D","E","F","G"],
  d002c_ledger_touched == false, substrate_code_edited == false,
  mechanism_code_edited == false. Every λ=0 cell carries
  m3_status "N/A_M3_REQUIRES_LAMBDA_GT_ZERO" per the M3 module's
  contract; every λ>0 cell carries m1_status starting with
  "ELIGIBLE_M1" AND m3_status starting with "ELIGIBLE_M3" with the
  marginal match report inside the locked M3 tolerances.

  docs/governance/D002H_GATE_B_REPORT.md carries the 9-section report
  (scope, prereg anchor, method, 18-cell verdict matrix, Gate B verdict,
  claim boundary, forbidden interpretations, reproduce command, next
  gate); scripts/x10r_d002h_gate_b_eligibility.py is the compute
  script invoked via `PYTHONPATH=. python
  scripts/x10r_d002h_gate_b_eligibility.py`;
  tests/systemic_risk/test_d002h_gate_b_eligibility.py carries 10
  fast schema/invariant tests pinning the artifact contract and the
  D-002C ledger sha; docs/governance/D002G_CANONICAL_RUN_BLOCKERS.md
  gains an append-only "D-002H Gate B" section after the lineage
  transition section.

  Reuses the verifiers from research/systemic_risk/d002g_null_mechanisms.py
  (verify_m3_eligibility imported + invoked; M1 admissibility encoded
  inside _realize_m1 reused via realize_null). NO new mechanism. NO
  new verdict literal. NO new salt. NO substrate / mechanism / locked
  governance edit. NO D-002C ledger mutation. NO canonical D-002H run
  authorisation — this PR addresses Gate B alone; Gates C..G remain
  open and the 7-gate conjunction is the contract.

diff_scope:
  changed_files:
    - path: ".claude/commit_acceptors/x10r-d002h-gate-b-eligibility.yaml"
    - path: "scripts/x10r_d002h_gate_b_eligibility.py"
    - path: "tests/systemic_risk/test_d002h_gate_b_eligibility.py"
    - path: "docs/governance/D002H_GATE_B_REPORT.md"
    - path: "artifacts/d002h/eligibility/d002h_ricci_eligibility.json"
    - path: "docs/governance/D002G_CANONICAL_RUN_BLOCKERS.md"
  forbidden_paths:
    # D-002C locked governance + claim ledger
    - "docs/governance/D002C_CLAIM_LEDGER.yaml"
    - "docs/governance/D002C_PREREGISTRATION.yaml"
    - "docs/governance/D002C_CANONICAL_RUN_REPORT.md"
    - "docs/governance/D002C_ATTEMPT_2_NULL_AUDIT_FALSIFICATION_REPORT.md"
