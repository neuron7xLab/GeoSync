expected_signal: >-
  `PYTHONPATH=. python scripts/x10r_d002h_gate_b_eligibility.py` exits
  0; `PYTHONPATH=. python -m pytest
  tests/systemic_risk/test_d002h_gate_b_eligibility.py -q` passes all
  10 tests; the artifact JSON parses and satisfies the schema/invariant
  asserts; the D-002C claim ledger sha256 stays byte-exact at
  f96ba9b5a2057d2e0bff84afc28578ab316cff73f6dc6673fb0d6d543b8bd6dd;
  the substrate file sha256 stays byte-exact at
  4b2e5d65c104a5be5a207951cd3c4ae099f31ce83b3f2c0766a160d8c9e80eca;
  the mechanism module sha256 stays byte-exact at
  c7e275191454e1e961d5a079a21b6e1dbfcbc1661d48ddf14d0d0c39a426f257;
  the D-002H prereg sha256 stays byte-exact at
  44b18b5a40ce9d188a9c3bd49339621f81a65a15f97a683247902450dd54acec;
  BLOCKERS.md gains the "D-002H Gate B — ricci_flow M1/M3 eligibility
  reverification" append-only section.
measurement_command: >-
  bash -c 'set -e;
  PYTHONPATH=. python -m pytest tests/systemic_risk/test_d002h_gate_b_eligibility.py -q;
  python -c "import json;
  d=json.load(open(\"artifacts/d002h/eligibility/d002h_ricci_eligibility.json\"));
  assert d[\"schema_version\"]==\"D002H-GATE-B-v1\";
  assert d[\"study_id\"]==\"D-002H\";
  assert d[\"gate\"]==\"B\";
  assert d[\"substrate_scope\"]==[\"ricci_flow\"];
  assert d[\"grid\"][\"N\"]==[50,100,200];
  assert d[\"grid\"][\"lambda_values\"]==[0.0, 0.05, 0.10, 0.20, 0.40, 1.0];
  assert d[\"grid\"][\"base_seed\"]==42;
  assert d[\"grid\"][\"null_seed_M3\"]==12345;
  assert d[\"n_cells_evaluated\"]==18;
  assert d[\"gate_b_verdict\"] in {\"PASS\",\"FAIL\"};
  assert d[\"canonical_run_authorized\"] is False;
  assert set(d[\"downstream_gates_remaining\"])=={\"C\",\"D\",\"E\",\"F\",\"G\"};
  assert d[\"d002c_ledger_touched\"] is False;
  assert d[\"substrate_code_edited\"] is False;
  assert d[\"mechanism_code_edited\"] is False;
  lambda_zero=[c for c in d[\"cells\"] if c[\"lambda_value\"]==0.0];
  assert len(lambda_zero)==3;
  assert all(c[\"m3_status\"]==\"N/A_M3_REQUIRES_LAMBDA_GT_ZERO\" for c in lambda_zero);
  lambda_pos=[c for c in d[\"cells\"] if c[\"lambda_value\"]>0.0];
  assert len(lambda_pos)==15;
  assert all(c[\"m1_status\"].startswith(\"ELIGIBLE_M1\") for c in lambda_pos);
  assert all(c[\"m3_status\"].startswith(\"ELIGIBLE_M3\") for c in lambda_pos)";
  grep -q "Gate B PASS certifies that ricci_flow is M1- and M3-eligible" docs/governance/D002H_GATE_B_REPORT.md;
  grep -q "D-002H Gate B — ricci_flow M1/M3 eligibility reverification" docs/governance/D002G_CANONICAL_RUN_BLOCKERS.md;
  test "$(sha256sum docs/governance/D002C_CLAIM_LEDGER.yaml | awk "{print \$1}")" = "f96ba9b5a2057d2e0bff84afc28578ab316cff73f6dc6673fb0d6d543b8bd6dd";
  test "$(sha256sum research/systemic_risk/d002c_substrates.py | awk "{print \$1}")" = "4b2e5d65c104a5be5a207951cd3c4ae099f31ce83b3f2c0766a160d8c9e80eca";
  test "$(sha256sum research/systemic_risk/d002g_null_mechanisms.py | awk "{print \$1}")" = "c7e275191454e1e961d5a079a21b6e1dbfcbc1661d48ddf14d0d0c39a426f257";
  test "$(sha256sum docs/governance/D002H_PREREGISTRATION.yaml | awk "{print \$1}")" = "44b18b5a40ce9d188a9c3bd49339621f81a65a15f97a683247902450dd54acec";
  test "$(sha256sum docs/governance/D002H_CANONICAL_RUN_AUTHORIZATION_GATES.md | awk "{print \$1}")" = "75becc5c0d57eab9505ab00fe36e35ce1513126f8415d510f1c65dd7643bc0e6"'
signal_artifact: "artifacts/d002h/eligibility/d002h_ricci_eligibility.json"
falsifier:
  command: >-
    bash -c 'set -e;
    PYTHONPATH=. python -m pytest tests/systemic_risk/test_d002h_gate_b_eligibility.py -q || exit 1;
    test -f artifacts/d002h/eligibility/d002h_ricci_eligibility.json || exit 2;
    test -f docs/governance/D002H_GATE_B_REPORT.md || exit 3;
    test -f scripts/x10r_d002h_gate_b_eligibility.py || exit 4;
    python -c "import json;
    d=json.load(open(\"artifacts/d002h/eligibility/d002h_ricci_eligibility.json\"));
    assert d[\"schema_version\"]==\"D002H-GATE-B-v1\";
    assert d[\"substrate_scope\"]==[\"ricci_flow\"];
    assert d[\"n_cells_evaluated\"]==18;
    assert d[\"canonical_run_authorized\"] is False;
    assert set(d[\"downstream_gates_remaining\"])=={\"C\",\"D\",\"E\",\"F\",\"G\"};
    lambda_zero=[c for c in d[\"cells\"] if c[\"lambda_value\"]==0.0];
    assert len(lambda_zero)==3 and all(c[\"m3_status\"]==\"N/A_M3_REQUIRES_LAMBDA_GT_ZERO\" for c in lambda_zero);
    lambda_pos=[c for c in d[\"cells\"] if c[\"lambda_value\"]>0.0];
    assert len(lambda_pos)==15 and all(c[\"m1_status\"].startswith(\"ELIGIBLE_M1\") for c in lambda_pos);
    assert all(c[\"m3_status\"].startswith(\"ELIGIBLE_M3\") for c in lambda_pos);
    assert d[\"gate_b_verdict\"]==\"PASS\"" || exit 5;
    grep -q "D-002H Gate B — ricci_flow M1/M3 eligibility reverification" docs/governance/D002G_CANONICAL_RUN_BLOCKERS.md || exit 6;
    test "$(sha256sum docs/governance/D002C_CLAIM_LEDGER.yaml | awk "{print \$1}")" = "f96ba9b5a2057d2e0bff84afc28578ab316cff73f6dc6673fb0d6d543b8bd6dd" || exit 7;
    test "$(sha256sum research/systemic_risk/d002c_substrates.py | awk "{print \$1}")" = "4b2e5d65c104a5be5a207951cd3c4ae099f31ce83b3f2c0766a160d8c9e80eca" || exit 8;
    test "$(sha256sum research/systemic_risk/d002g_null_mechanisms.py | awk "{print \$1}")" = "c7e275191454e1e961d5a079a21b6e1dbfcbc1661d48ddf14d0d0c39a426f257" || exit 9;
    test "$(sha256sum docs/governance/D002H_PREREGISTRATION.yaml | awk "{print \$1}")" = "44b18b5a40ce9d188a9c3bd49339621f81a65a15f97a683247902450dd54acec" || exit 10;
    if grep -rE "Gate B authorises canonical run|canonical run authorised|canonical run authorized|D-002G rescued|D-002C rescued|cross-substrate robustness|general topology robustness|scientific PASS achieved|VALIDATED_REAL_BANK_LEVEL_RESULT|TESTED_POSITIVE_REAL|BANK_LEVEL_PRECURSOR_CONFIRMED" docs/governance/D002H_GATE_B_REPORT.md scripts/x10r_d002h_gate_b_eligibility.py tests/systemic_risk/test_d002h_gate_b_eligibility.py | grep -vE "❌|forbidden|NOT|never|cannot|does not|do not|out of scope|MUST NOT|alone does NOT|alone is one term|prohibited|disallowed|requires|impossible|deny|denied|reject|REJECT|attempt|FAIL"; then
      echo "forbidden promotional phrase leaked outside denial context"; exit 11;
    fi'
  description: >-
    Probes the D-002H Gate B verdict artifact:
    (a) the 10 Gate B tests pass;
    (b) all 3 new files exist on disk (artifact + report + script);
    (c) artifact JSON has the locked schema_version D002H-GATE-B-v1,
        substrate_scope=[ricci_flow], n_cells_evaluated=18,
        canonical_run_authorized=False, downstream gates {C,D,E,F,G};
        3 λ=0 cells with m3_status=N/A_M3_REQUIRES_LAMBDA_GT_ZERO;
        15 λ>0 cells with m1_status starting ELIGIBLE_M1 AND
        m3_status starting ELIGIBLE_M3; gate_b_verdict=PASS;
    (d) BLOCKERS.md carries the new Gate B append-only section;
    (e) D-002C claim ledger byte-exact at the anchor sha;
    (f) substrate + mechanism module shas byte-exact unchanged;
    (g) D-002H prereg sha byte-exact unchanged at PR #683 anchor;
    (h) no forbidden phrase leaks outside denial context.
    Regression on any → Gate B contract broken.
