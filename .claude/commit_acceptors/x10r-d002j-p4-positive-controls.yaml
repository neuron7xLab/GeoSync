# Diff-bound commit acceptor for the D-002J-P4 planted-positive-controls PR.
#
# D-002J-P4 builds SYNTHETIC positive controls with KNOWN ground truth
# before any real-data interpretation. Each of the six control families
# (PC1 liquidity shock, PC2 contagion cascade, PC3 balance-sheet
# impairment, PC4 volatility regime switch, PC5 information-delay /
# vintage-leakage trap, PC6 official-response event shock) has a paired
# NEGATIVE SIBLING the pipeline MUST score below pass_threshold. PC5 is
# INVERTED: pass = the pipeline catches the planted lookahead violation
# under the P3 point-in-time contract. P4 SYNTHESISES + SCORES; it does
# NOT interpret real data, NOT ingest, NOT implement the P5 substrate,
# NOT execute a P6 null, NOT authorise any P8 canonical run, NOT edit
# the D-002J prereg, NOT promote any real-world performance claim.
#
# P4 is the SINGLE phase explicitly allowed to add one source file
# under research/systemic_risk/ (d002j_positive_controls.py); every
# other path under research/systemic_risk/ is forbidden.

id: x10r-d002j-p4-positive-controls
status: ACTIVE
claim_type: governance
promise: >-
  After this PR lands, research/systemic_risk/d002j_positive_controls.py
  implements six PositiveControlFamily subclasses (PC1..PC6) each with a
  deterministic generate(seed, params) -> ControlInstance (numpy-only,
  no wall-clock, no real-data reads) and a score(arr) observable.
  artifacts/d002j/positive_controls/positive_control_manifest_v1.json
  (schema D002J-POSITIVE-CONTROL-MANIFEST-v1) declares all 6 control
  families with negative siblings, numeric pass/fail thresholds,
  expected_observable_signature, ground_truth_fields,
  mapped_p5_substrate_candidates, mapped_p2_window_class, and
  forbidden_claim_boundary; positive_control_summary_v1.json (schema
  D002J-POSITIVE-CONTROL-SUMMARY-v1) records counts by class + by
  mapped_p5 + decision POSITIVE_CONTROLS_READY with
  canonical_run_authorized=false. docs/research/
  D002J_POSITIVE_CONTROL_PROTOCOL.md documents §0 why, §1 the six
  families, §2 negative-sibling discipline, §3 PC5 inverted-pass rule,
  §4 forbidden claims, §5 P5 substrate mapping, §6 P2 window mapping.
  Over an 8-seed battery every family scores
  min(signal) >= pass_threshold AND max(null) < pass_threshold (PC5
  inverted: leakage caught == 1.0, point-in-time null == 0.0); no
  threshold loosened to fit a leaking null. The D-002J-P4 capsule is
  added under schema D002J-VERDICT-CAPSULE-v1 with
  parent=['D002J-P3'] and allowed_next=['D002J-P5'] and forbidden_next
  covering P6..P9. The DAG verdict regenerates to 7 nodes acyclic
  (was 6), D002J_LINEAGE_MAP.md re-renders byte-deterministically,
  D002G_CANONICAL_RUN_BLOCKERS.md appends a P4 section. The six locked
  governance shas remain byte-exact. No real data, no canonical run
  authorised, no D-002H rescue claim, no real-world performance claim.

