# all artifacts/d002j/**, artifacts/d002k/prereg/**, and
# artifacts/d002k/observables/**.

id: x10r-d002k-p2-matched-placebo-windows
status: ACTIVE
claim_type: governance
promise: >-
  After this PR lands, the D-002K-P2 matched-placebo registry carries
  exactly n_placebo_per_crisis (K-P0 lock) deterministically selected
  NON-crisis placebo windows for each of CW3/CW4/CW5, with: zero
  overlap against the buffered envelope of any of the six D-002J
  registered crisis windows; exact trading-day calendar-length match
  to each parent crisis; the five K-P0 match_on covariates carried per
  placebo; seed-locked bit-identical reproducibility (selector run
  twice -> identical); and point-in-time consistency vs the K-P1
  release-boundary rule (no look-ahead). Selection is algorithm-only
  with no manual-override field.

  tests/systemic_risk/test_d002k_matched_placebo.py carries 24 guard
  tests fail-closing the suite on any placebo overlap with a
  registered window, any calendar-length mismatch, any determinism
  break, any K-P0 n_placebo_per_crisis / match_on drift, any
  hand-picked override, any D-002J / K-P0 / K-P1 artifact drift, and
  any systemic-risk / bank-level claim.

  DAG regenerated to 13 nodes (D002K-P2 appended after D002K-P1,
  next_legal=[D002K-P3]); D002J-P1A + D002J-P7 stay
  TERMINAL_REJECTED/REFUSED retained; canonical_run_authorized
  anywhere stays false.

  Frozen byte-exact: D-002K-P0 prereg
  2cd923810bf64547cd86ecb403bfd3f12a799cb16c3d10ebc07bc05865fee43f;
  D-002J prereg
  f3dc65b7e64b96eafe6f23ca8bdd0e05dc9bf95b12c2658b227bd0340f7975a0;
  D-002J P2 crisis registry
  41f281d9e97fbf49725f0eb1a1bb7b45865c14cdc5c525ea96231ef0aa651e8f;
  all artifacts/d002j/**, artifacts/d002k/prereg/**, and
  artifacts/d002k/observables/**.

  D-002J remains the truthful terminal REFUSED verdict. D-002K-P2
  does NOT rescue, reopen, or amend D-002J. No ingestion, no scoring,
  no canonical sweep. Next legal PR: feat(x10r,D-002K-P3) high-SNR
  event metrics.

