# Diff-bound commit acceptor for D-002K-P2: matched placebo window
# registry.
#
# D-002K-P2 produces a deterministic, seed-locked registry of matched
# NON-crisis placebo windows: n_placebo_per_crisis (from the K-P0
# matched_placebo_policy lock) matched placebos for each of the three
# D-002K crisis windows (CW3/CW4/CW5), dates pulled read-only from the
# FROZEN D-002J P2 crisis-window registry. The selection algorithm is
# deterministic, pre-registered, and seed-locked BEFORE any scoring.
# NO ingestion, NO scoring, NO model run, NO canonical sweep. The
# crisis-vs-placebo contrast is PREDEFINED, never hand-selected.
# D-002J stays terminally REFUSED.
#
# Frozen byte-exact: D-002K-P0 prereg
# (2cd923810bf64547cd86ecb403bfd3f12a799cb16c3d10ebc07bc05865fee43f),
# D-002J prereg
# (f3dc65b7e64b96eafe6f23ca8bdd0e05dc9bf95b12c2658b227bd0340f7975a0),
# D-002J P2 crisis registry
