# Diff-bound commit acceptor for the D-002J-P5 financial-mechanistic
# substrate-candidates PR.
#
# D-002J-P5 pre-registers EXACTLY THREE mechanism-bearing generative
# substrate candidates on top of the P4-validated positive controls:
# funding_liquidity_rollover (funding/liquidity, PC1),
# cross_exposure_contagion_proxy (contagion, PC2),
# volatility_credit_spread_regime (market/info, PC4). Each binds >=2
# P1B-surviving (VERIFIED/PARTIAL) sources, >=1 P2 crisis window, >=1
# P3 adapter, >=1 P4 positive control, and forward-declares >=2 P6 null
# families; the three collectively cover 6/6 P2 windows (>=4 floor). No
# substrate requires real interbank transaction microdata (Brunetti
# e-MID scope guard). P5 does NOT implement nulls (P6), compute power
# (P7), run canonically (P8), fit real data, or edit the D-002J prereg.
#
# P5 is the SINGLE phase explicitly allowed to add source files under
# research/systemic_risk/substrates/d002j/; every other path under
# research/systemic_risk/ is forbidden.

id: x10r-d002j-p5-substrate-candidates
status: ACTIVE
claim_type: governance
promise: >-
  After this PR lands, research/systemic_risk/substrates/d002j/ holds
  __init__.py + substrate_base.py + three substrate modules
  (funding_liquidity_rollover.py, cross_exposure_contagion_proxy.py,
  volatility_credit_spread_regime.py) each exposing a class with a
  deterministic simulate(seed, params) -> SubstrateInstance (numpy-only,
  no wall-clock, no real-data reads). substrate_candidate_manifest_v1.json
  (schema D002J-SUBSTRATE-CANDIDATE-MANIFEST-v1) declares EXACTLY 3
  substrates, each with input_observables, >=2 P1B-surviving source_ids,
  >=1 P3 adapter id, >=1 P2 crisis window, >=1 P4 positive-control
  analogue, interpretable_parameters, >=2 required_null_families,
  non_identifiability_boundary, power_feasibility_path, and
  forbidden_claims; substrate_summary_v1.json (schema
  D002J-SUBSTRATE-SUMMARY-v1) records counts by mechanism_family, the
  crisis-window coverage matrix (6/6), positive-control coverage, and
  decision SUBSTRATE_CANDIDATES_READY with canonical_run_authorized=false.
  docs/research/D002J_FINANCIAL_SUBSTRATE_DESIGN_SPACE.md documents the
  7 surveyed families, the operator-locked selection criterion, the 3
  admitted substrates, the Brunetti e-MID cross-asset/interbank scope
  guard, the forbidden-claims aggregate, and the substrate x
  {sources,windows,PC,nulls} mapping. The D-002J-P5 capsule is added
  under schema D002J-VERDICT-CAPSULE-v1 with parent=['D002J-P4'] and
  allowed_next=['D002J-P6'] and forbidden_next=['D002J-P7','D002J-P8',
  'D002J-P9']. The DAG verdict regenerates to 8 nodes acyclic (was 7),
  D002J_LINEAGE_MAP.md re-renders byte-deterministically,
  D002G_CANONICAL_RUN_BLOCKERS.md appends a P5 section, and the
  verdict_dag_integrity EXPECTED_NODE_IDS widens to include D002J-P5.
  The locked governance shas remain byte-exact. No real data, no
  canonical run authorised, no D-002H rescue claim, no real-world
  performance claim.

