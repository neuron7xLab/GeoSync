# Diff-bound commit acceptor for the D-002J-P1A source-registry
# provenance audit PR.
#
# D-002J-P1A is the first verification gate of the D-002J Frontier
# Benchmark Program. P1A audits the 25 sources committed by PR #695
# in artifacts/d002j/data_registry/source_registry_v1.json against
# ten verification dimensions (provider, official URL, documentation,
# access method, license boundary, coverage, frequency, variables,
# crisis-window relevance, mechanistic relevance). P1A is audit-only:
# NO ingestion, NO analysis, NO canonical run, NO source-code edit,
# NO prereg edit, NO ledger edit.
#
# Pure governance: NO research/systemic_risk/*.py edit, NO
# scripts/x10r_d002*.py edit, NO D-002C/D-002G/D-002H/D-002I/D-002J
# governance file edit (BLOCKERS.md only). The audit DOWNGRADES five
# sources whose URL pins are stale (ECB_CBD, ICAP_MOVE, BIS_QR_NETWORK,
# FED_TIMELINE, BOE_LDI_REVIEW) and marks seven PARTIAL. The decision
# is SOURCE_REGISTRY_REJECTED because the information_constraint
# mechanism family carries only one source (ALFRED, PARTIAL) and the
# ≥2 verified/partial-per-family floor is not satisfied. Rejection
# is a valid scientific outcome.

id: x10r-d002j-p1a-source-provenance-audit
status: ACTIVE
claim_type: governance
