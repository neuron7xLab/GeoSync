    bash -c 'set -e;
    python -c "from research.systemic_risk.d002g_null_mechanisms import realize_null, verify_m2_eligibility, M2EligibilityVerdict, M2NotEligibleError, M2TopologyMutationError, M2_PLACEBO_SALT" || exit 1;
