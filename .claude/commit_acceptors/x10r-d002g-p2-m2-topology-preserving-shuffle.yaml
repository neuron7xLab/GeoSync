    grep -q "INELIGIBLE_M2_DEGENERATE_SHUFFLE_POOL" docs/governance/D002G_M2_TOPOLOGY_PRESERVING_NULL.md || exit 6;
    grep -q "B1.M2 — Mitigation status" docs/governance/D002G_CANONICAL_RUN_BLOCKERS.md || exit 7;
