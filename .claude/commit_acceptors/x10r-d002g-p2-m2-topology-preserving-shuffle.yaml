  description: >-
    Probes the D-002G-P2/M2 implementation:
    (a) every M2 symbol imports cleanly;
    (b) M2EligibilityVerdict round-trips through the dataclass;
    (c) M2_PLACEBO_SALT is locked at 211 and produces an RNG seed
