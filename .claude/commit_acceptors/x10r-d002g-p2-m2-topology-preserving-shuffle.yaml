    python -c "from research.systemic_risk.d002g_null_mechanisms import M2_PLACEBO_SALT, deterministic_mix; assert M2_PLACEBO_SALT == 211; assert deterministic_mix(0, 211) != deterministic_mix(0, 99)" || exit 3;
