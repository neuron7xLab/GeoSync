# Diff-bound commit acceptor for D-002K-P4: power-first gate before the
# event-conditioned benchmark run (power DESIGN only; NO scoring, NO
# model run, NO canonical run).
#
# D-002K-P4 is the truth point of D-002K. It computes, honestly, whether
# the K-P0/P1/P2/P3-locked 3-hypothesis event-conditioned design can
# reach power >= 0.8 for a conservative funding-liquidity effect at the
# K-P0-locked Bonferroni alpha (0.05/(3 windows x 1 primary metric) =
# 0.016667). The honest computation: at the conservative literature
# lower-edge prior (Cohen's d = 0.80, NOT inflated) the
# crisis-vs-matched-placebo-reference contrast reaches power 0.0481 at
# the feasible event-conditioned sample (crisis-side n1 = 1 per window
# because CW3/CW4/CW5 are unique unrepeatable historical events;
# reference arm n2 = 5 K-P2 matched placebos) -- far below the K-P0
# power target 0.8. Decision: POWER_GATE_REFUSED_UNDERPOWERED,
# TERMINAL_REFUSED, canonical_run_authorized = false. Forward motion is
# a fresh D-002L pre-registration; NOT P5, NOT a D-002J resurrection.
#
# Anti-laundering spine: the Bonferroni denominator 3 is the legitimate
# consequence of FEWER pre-registered hypotheses (K-P0 lock), NOT a
# relaxation of D-002J-P7's alpha = 0.05/102 = 4.9e-4 at a fixed
# hypothesis count. Narrowing scope is not relaxing statistics. D-002K
# does not un-refuse D-002J: D-002J-P7 stays TERMINAL_REFUSED and
# retained.
#
# Frozen byte-exact: D-002K-P0 primary-metric contract
# (7effc088810ba5933850618312fcad369fdac0386b4a3cab6f14455feeb5a569),
# D-002K-P1 observable contract
# (952739cbfe4aa16a54eb5684be4bbd653e820eaf92113418e379a3bf8a2a71c3),
# D-002K-P2 placebo registry
# (435d41df868859f25811236fa4675d01f202682c693d06208922c263ace09413),
# D-002K-P3 metric contract
# (9c2ce60b6fbcb52e969d71e2137d8345c35f2f71ff9dcc1d64b9ad759d2480ce),
# D-002K prereg
# (2cd923810bf64547cd86ecb403bfd3f12a799cb16c3d10ebc07bc05865fee43f),
# D-002J prereg
# (f3dc65b7e64b96eafe6f23ca8bdd0e05dc9bf95b12c2658b227bd0340f7975a0),
# all artifacts/d002j/**, artifacts/d002k/{prereg,observables,placebo,metrics}/**.

id: x10r-d002k-p4-power-gate
status: ACTIVE
claim_type: governance
promise: >-
  After this PR lands, the D-002K-P4 power design carries the
  K-P0-locked Bonferroni alpha_per = 0.05/3 = 0.016667 (denominator =
  n_windows(3) x n_primary_metrics(1)), the conservative honestly-
  sourced funding-liquidity effect prior (Cohen's d = 0.80, NOT
  inflated, provenance documented), the design-transparency n_min, the
  event-conditioned feasible-n cap (crisis-side n1 = 1 per window;
  reference arm n2 = 5 K-P2 placebos) with its justification and
  D-002J-P7 anchor reference, and an explicit comparison_to_d002j_p7
  recording that the smaller Bonferroni denominator derives from the
  K-P0-locked pre-registered hypothesis count and is NOT a relaxation
  of D-002J-P7's alpha at a fixed hypothesis count
  (narrowing_is_scope_not_alpha_relaxation = true). The honest decision
  is POWER_GATE_REFUSED_UNDERPOWERED (power 0.0481 << 0.8 at the
  feasible sample); canonical_run_authorized = false; the P4 verdict is
  TERMINAL_REFUSED with empty allowed_next_nodes, D002K-P5 forbidden,
  and failure_retention pointing forward to a fresh D-002L
  pre-registration.

  tests/systemic_risk/test_d002k_power_gate.py carries 24 guard tests
  fail-closing the suite on any alpha relaxation at fixed scope, any
  effect-prior inflation, any scope shrink below the K-P0 3-cell lock,
  any primary-metric swap, any data scoring / model run / canonical
  run, any determinism break, any D-002J / K-P0 / K-P1 / K-P2 / K-P3
  artifact drift, any un-refusal of D-002J-P7, and any systemic-risk /
  bank-level claim. Tests 17/18 are conditional on the actual decision
  and implement both the PASS and REFUSED branches honestly.

  DAG regenerated to 15 nodes (D002K-P4 appended after D002K-P3, topo
  tail D002K-P4); P4 honestly REFUSED so next_legal is empty and
  D002K-P4 joins D002J-P1A + D002J-P7 in rejected_nodes_retained;
  canonical_run_authorized_anywhere stays false. Lineage map
  regenerated deterministically.

  Frozen byte-exact: D-002K-P0 primary-metric contract
  7effc088810ba5933850618312fcad369fdac0386b4a3cab6f14455feeb5a569;
  D-002K-P1 observable contract
  952739cbfe4aa16a54eb5684be4bbd653e820eaf92113418e379a3bf8a2a71c3;
  D-002K-P2 placebo registry
  435d41df868859f25811236fa4675d01f202682c693d06208922c263ace09413;
  D-002K-P3 metric contract
  9c2ce60b6fbcb52e969d71e2137d8345c35f2f71ff9dcc1d64b9ad759d2480ce;
  D-002K prereg
  2cd923810bf64547cd86ecb403bfd3f12a799cb16c3d10ebc07bc05865fee43f;
  D-002J prereg
  f3dc65b7e64b96eafe6f23ca8bdd0e05dc9bf95b12c2658b227bd0340f7975a0;
  all artifacts/d002j/**, artifacts/d002k/{prereg,observables,placebo,metrics}/**.

  D-002J remains the truthful terminal REFUSED verdict. D-002K-P4 does
  NOT rescue, reopen, or amend D-002J. No scoring, no model run, no
  canonical sweep. The honest POWER_GATE_REFUSED_UNDERPOWERED is a
  retained truthful negative, not a failure to fix. Next legal PR:
  fresh D-002L pre-registration (NOT D-002K-P5).

