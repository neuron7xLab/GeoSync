# Diff-bound commit acceptor for D-002K-P1: source & observable
# contract for funding-liquidity.
#
# D-002K-P1 binds the six D-002K-P0-locked observable families to
# P1B-audit-surviving funding-liquidity sources, the three D-002K
# crisis windows (CW3/CW4/CW5), point-in-time release/vintage
# boundaries, and the single P0-locked primary metric
# pre_post_standardized_mean_shift. NO ingestion, NO scoring, NO
# model run, NO canonical sweep. Narrow by design against the
# inherited effect_too_small axis; D-002J stays terminally REFUSED.
#
# Frozen byte-exact: D-002K-P0 prereg
# (2cd923810bf64547cd86ecb403bfd3f12a799cb16c3d10ebc07bc05865fee43f),
# D-002J prereg
# (f3dc65b7e64b96eafe6f23ca8bdd0e05dc9bf95b12c2658b227bd0340f7975a0),
# all artifacts/d002j/** and artifacts/d002k/prereg/**.

id: x10r-d002k-p1-source-observable-contract
status: ACTIVE
claim_type: governance
promise: >-
  After this PR lands, the D-002K-P1 source & observable contract
  binds all six D-002K-P0-locked observable families (level_shift,
  spread_widening, volatility_burst, recovery_time,
  transition_steepness, stress_persistence) to P1B-audit-surviving
  funding-liquidity sources x {CW3,CW4,CW5}, with point-in-time
  vintage discipline (>=1 vintage_required observable) and the single
  P0-locked primary metric pre_post_standardized_mean_shift. VIX is
  bound as a control_covariate, never a funding-liquidity observable.
  No contagion / balance-sheet / cross-asset source is bound.

  tests/systemic_risk/test_d002k_source_observable_contract.py carries
  23 guard tests fail-closing the suite on any source not
  P1B-surviving, any window outside {CW3,CW4,CW5}, any missing P0
  family, any lost vintage invariant, any contagion/balance-sheet
  binding, any control/observable mislabel, any D-002K-P0 prereg or
  D-002J artifact drift, and any systemic-risk / bank-level claim.

  DAG regenerated to 12 nodes (D002K-P1 appended after D002K-P0,
  next_legal=[D002K-P2]); D002J-P1A + D002J-P7 stay
  TERMINAL_REJECTED/REFUSED retained; canonical_run_authorized
  anywhere stays false.

  Frozen byte-exact: D-002K-P0 prereg
  2cd923810bf64547cd86ecb403bfd3f12a799cb16c3d10ebc07bc05865fee43f;
  D-002J prereg
  f3dc65b7e64b96eafe6f23ca8bdd0e05dc9bf95b12c2658b227bd0340f7975a0;
  all artifacts/d002j/** and artifacts/d002k/prereg/**.

  D-002J remains the truthful terminal REFUSED verdict. D-002K-P1
  does NOT rescue, reopen, or amend D-002J. No ingestion, no scoring,
  no canonical sweep. Next legal PR: feat(x10r,D-002K-P2) matched
  placebo windows.

