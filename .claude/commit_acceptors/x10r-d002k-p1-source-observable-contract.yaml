  bash -c 'set -e;
  PYTHONPATH=. python -m pytest tests/systemic_risk/test_d002k_source_observable_contract.py -q;
  test "$(sha256sum docs/governance/D002K_PREREGISTRATION.yaml | awk "{print \$1}")" = "2cd923810bf64547cd86ecb403bfd3f12a799cb16c3d10ebc07bc05865fee43f";
  test "$(sha256sum docs/governance/D002J_PREREGISTRATION.yaml | awk "{print \$1}")" = "f3dc65b7e64b96eafe6f23ca8bdd0e05dc9bf95b12c2658b227bd0340f7975a0";
  test -z "$(git diff --stat origin/main -- artifacts/d002j/ docs/governance/D002J_PREREGISTRATION.yaml docs/governance/D002K_PREREGISTRATION.yaml artifacts/d002k/prereg/)"'
