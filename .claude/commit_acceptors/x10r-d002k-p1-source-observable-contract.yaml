    bash -c 'set -e;
    PYTHONPATH=. python -m pytest tests/systemic_risk/test_d002k_source_observable_contract.py -q || exit 1;
    test -f artifacts/d002k/observables/source_observable_contract_v1.json || exit 2;
    test -f artifacts/d002k/observables/source_observable_summary_v1.json || exit 3;
    test -f artifacts/governance/verdicts/d002k_p1_verdict_v1.json || exit 4;
    test "$(sha256sum docs/governance/D002K_PREREGISTRATION.yaml | awk "{print \$1}")" = "2cd923810bf64547cd86ecb403bfd3f12a799cb16c3d10ebc07bc05865fee43f" || exit 5;
    test "$(sha256sum docs/governance/D002J_PREREGISTRATION.yaml | awk "{print \$1}")" = "f3dc65b7e64b96eafe6f23ca8bdd0e05dc9bf95b12c2658b227bd0340f7975a0" || exit 6;
    python3 -c "import json,sys; d=json.load(open(\"artifacts/governance/verdicts/d002j_verdict_dag_v1.json\")); sys.exit(0 if d[\"nodes_count\"]==12 and d[\"next_legal_nodes_from_main_head\"]==[\"D002K-P2\"] and d[\"rejected_nodes_retained\"]==[\"D002J-P1A\",\"D002J-P7\"] and d[\"canonical_run_authorized_anywhere\"] is False else 7)" || exit 7'
  description: >-
    Probes the D-002K-P1 source/observable contract: the 23-test
    guard module passes; contract / summary / P1 verdict artifacts
    exist; D-002K-P0 + D-002J preregs sha256 byte-exact at their
    frozen anchors; the regenerated verdict DAG has 12 nodes,
    next_legal=[D002K-P2], D002J-P1A+P7 retained rejected, and
    canonical_run_authorized_anywhere false. Regression on any ->
    contract broken or a frozen governance artifact silently mutated.
