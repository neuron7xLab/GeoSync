# Diff-bound commit acceptor for the D-002I pre-registration PR.
#
# D-002I opens a fresh pre-registered lineage AFTER the D-002H canonical
# sweep delivered the REFUSED verdict (PR #691, merge sha 250d8069). The
# null audit aggregated FAIL across 42 / 54 audited cells on ricci_flow
# under M1 union M3 null mechanisms. D-002I locks 4 falsifiable
# hypotheses (H_I1 M1 offset, H_I2 M3 tolerance, H_I3 signal magnitude,
# H_I4 Bonferroni denominator) BEFORE any investigation runs. Each
# hypothesis is tested in a separate downstream PR (D-002I-P1/H1..H4)
# under a pre-committed protocol.
#
# Pure pre-registration: NO source-code edit, NO mechanism change, NO
# canonical sweep run, NO D-002C ledger touch, NO D-002G or D-002H
# prereg edit, NO prior gate artifact edit. D-002I does NOT claim
# D-002H REFUSED was wrong (the verdict was truthful) and does NOT
# rewrite that verdict.

