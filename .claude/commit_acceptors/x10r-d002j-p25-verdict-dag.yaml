measurement_command: >-
  bash -c 'set -e;
  PYTHONPATH=. python -m pytest tests/governance/test_verdict_dag_integrity.py -q;
  PYTHONPATH=. python -m tools.governance.verdict_dag check -v;
  PYTHONPATH=. python -m tools.governance.render_lineage --out /tmp/_d002j_lm1.md;
  PYTHONPATH=. python -m tools.governance.render_lineage --out /tmp/_d002j_lm2.md;
  diff /tmp/_d002j_lm1.md /tmp/_d002j_lm2.md;
  test -f artifacts/governance/verdicts/d002j_verdict_dag_v1.json;
  python -m json.tool artifacts/governance/verdicts/d002j_verdict_dag_v1.json > /dev/null;
  grep -q "D002J-VERDICT-DAG-v1" artifacts/governance/verdicts/d002j_verdict_dag_v1.json;
  grep -q "VERDICT_DAG_BOOTSTRAPPED" artifacts/governance/verdicts/d002j_verdict_dag_v1.json;
  grep -q "D002J-P2.5" docs/governance/D002G_CANONICAL_RUN_BLOCKERS.md;
  test "$(sha256sum docs/governance/D002J_PREREGISTRATION.yaml | awk "{print \$1}")" = "f3dc65b7e64b96eafe6f23ca8bdd0e05dc9bf95b12c2658b227bd0340f7975a0"'
