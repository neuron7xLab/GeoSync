# Diff-bound commit acceptor for the D-002J-P2.5 verdict DAG
# bootstrap PR.
#
# D-002J-P2.5 is the governance self-anchor: it backfills five per-
# phase verdict capsules (P0..P2) under a canonical capsule schema,
# adds the DAG-about-the-DAG verdict (the recursive self-anchor with
# self_verdict.node_id = D002J-P2.5), ships a deterministic lineage
# renderer, and locks the topological invariants with a 16-test
# integrity guard. P2.5 is governance infrastructure only: it does
# NOT ingest data, does NOT model anything, does NOT execute any
# null, does NOT authorise any canonical run, does NOT mutate any
# existing P0/P1/P1A/P1B/P2 artifact, does NOT touch any locked
# governance file (D-002C ledger / D-002G prereg+rules /
# D-002H prereg / D-002I prereg / D-002J prereg).

id: x10r-d002j-p25-verdict-dag
status: ACTIVE
claim_type: chore
promise: >-
  After this PR lands,
  artifacts/governance/verdicts/ contains five
  D002J-VERDICT-CAPSULE-v1 JSON capsules (P0, P1, P1A, P1B, P2) plus
  the DAG-about-the-DAG verdict d002j_verdict_dag_v1.json under schema
  D002J-VERDICT-DAG-v1 whose dag_self_verdict.node_id is "D002J-P2.5".
  tools/governance/verdict_dag.py exposes
  load_capsule / load_dag / check_acyclic / topological_order /
  detect_orphans / emit_dag_verdict; tools/governance/render_lineage.py
  re-renders docs/research/D002J_LINEAGE_MAP.md byte-deterministically
  from the on-disk capsules. tests/governance/test_verdict_dag_integrity.py
  ships 16 named guards covering acyclicity, the topological order
  P0->P1->P1A->P1B->P2, P1A retention as TERMINAL_REJECTED, P1B's
  P1A parent edge, P2's P1B-not-P1A parent edge, canonical-run-not-
  authorized-anywhere, dag_self_verdict presence, no orphans,
  load_capsule round-trip, render idempotence, locked-sha byte-exact,
  and the merge-marker scan. The six locked governance shas remain
  byte-exact. No source-code, prereg, ledger, ingestion, or canonical-
  run change.

