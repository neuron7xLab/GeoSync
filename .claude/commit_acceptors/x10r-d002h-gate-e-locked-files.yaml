measurement_command: >-
  bash -c 'set -e;
  PYTHONPATH=. python -m pytest tests/systemic_risk/test_d002h_gate_e_locked_files.py -q;
  python -c "import json;
  d=json.load(open(\"artifacts/d002h/locks/d002h_locked_file_pins.json\"));
  assert d[\"schema_version\"]==\"D002H-GATE-E-v1\";
  assert d[\"study_id\"]==\"D-002H\";
  assert d[\"gate\"]==\"E\";
  assert d[\"gate_e_verdict\"]==\"PASS\";
  assert d[\"n_pinned_files\"]==16;
  assert len(d[\"pinned_files\"])==16;
  assert d[\"canonical_run_authorized\"] is False;
  assert d[\"downstream_gates_remaining\"]==[\"F\",\"G\"];
  assert d[\"anchor_main_sha\"]==\"077073ee801c434840d64f911e7b1f39ce2ac0fa\";
  assert set(d[\"prior_gate_anchors\"].keys())=={\"gate_a\",\"gate_b\",\"gate_c\",\"gate_d\"}";
  grep -q "D-002H Gate E" docs/governance/D002G_CANONICAL_RUN_BLOCKERS.md;
  grep -q "D002H-GATE-E-v1" docs/governance/D002H_GATE_E_LOCKED_FILE_REPORT.md;
  test ! -d artifacts/d002h/canonical/results;
  test ! -d artifacts/d002h/authorization;
  test "$(sha256sum docs/governance/D002C_CLAIM_LEDGER.yaml | awk "{print \$1}")" = "f96ba9b5a2057d2e0bff84afc28578ab316cff73f6dc6673fb0d6d543b8bd6dd";
  test "$(sha256sum docs/governance/D002H_PREREGISTRATION.yaml | awk "{print \$1}")" = "44b18b5a40ce9d188a9c3bd49339621f81a65a15f97a683247902450dd54acec";
