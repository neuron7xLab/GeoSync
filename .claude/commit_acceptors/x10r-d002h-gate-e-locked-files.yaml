# Diff-bound commit acceptor for the D-002H Gate E locked-ledger
# verification PR.
#
# Pure declaration + byte-exact verification. Emits a machine-readable
# artifact at artifacts/d002h/locks/d002h_locked_file_pins.json
# (schema D002H-GATE-E-v1) and a human-readable report at
# docs/governance/D002H_GATE_E_LOCKED_FILE_REPORT.md. The 16 pinned
# sha256 values were computed from a clean checkout of the Gate D
# merge anchor (077073ee801c434840d64f911e7b1f39ce2ac0fa) and the
# tests verify byte-exact equality with the on-disk bytes.
#
# Strict scope (per the operating law):
#   * NO canonical run. NO sweep. NO results.
#   * NO new mechanism family. NO new verdict literal. NO new salt.
#   * NO D-002G prereg edit. NO D-002H prereg edit. NO locked-file edit.
#   * NO D002C_CLAIM_LEDGER.yaml mutation (sha pinned byte-exact at
#     f96ba9b5a2057d2e0bff84afc28578ab316cff73f6dc6673fb0d6d543b8bd6dd).
#   * NO substrate code edit. NO mechanism code edit.
#   * NO claim "Gate E PASS -> canonical run authorised"; the 7-gate
#     conjunction A AND B AND C AND D AND E AND F AND G is the contract.

id: x10r-d002h-gate-e-locked-files
status: ACTIVE
claim_type: governance
promise: >-
  After this PR lands,
  artifacts/d002h/locks/d002h_locked_file_pins.json carries
  schema_version "D002H-GATE-E-v1" with study_id "D-002H", gate "E",
  gate_e_verdict "PASS", n_pinned_files == 16,
  canonical_run_authorized == false, downstream_gates_remaining ==
  ["F","G"], and the 16 pinned sha256 values for the locked D-002C +
  D-002G + D-002H governance docs + source-code modules (D-002C
  substrates + D-002G null mechanisms). The artifact also records
  prior_gate_anchors for Gates A, B, C, D.

  docs/governance/D002H_GATE_E_LOCKED_FILE_REPORT.md carries the
  8-section report (scope, pinned-file table, anchor commit,
  drift-detection method, verdict, claim boundary verbatim, forbidden
  interpretations, reproduce).

  tests/systemic_risk/test_d002h_gate_e_locked_files.py carries 10
  fast JSON / sha-byte-exact tests with the exact names required by
  the Gate E brief: test_gate_e_artifact_exists,
  test_gate_e_pinned_count_is_16,
  test_gate_e_all_pinned_shas_byte_exact,
  test_gate_e_d002c_ledger_pinned,
  test_gate_e_d002h_prereg_pinned,
  test_gate_e_substrate_code_pinned,
  test_gate_e_mechanism_code_pinned,
  test_gate_e_no_drift_in_any_pin,
  test_gate_e_prior_gate_anchors_recorded,
  test_gate_e_gate_e_verdict_is_pass.

  docs/governance/D002G_CANONICAL_RUN_BLOCKERS.md gains an append-only
  "D-002H Gate E" section after the Gate D section.

  Gate E is pure declaration + read-only sha verification: NO
  canonical run, NO sweep, NO results. NO new mechanism. NO new
  verdict literal. NO substrate / mechanism / locked governance edit.
  NO D-002C ledger mutation. NO D-002H prereg edit. NO canonical
  D-002H run authorisation - this PR addresses Gate E alone; Gates F,
  G remain open and the 7-gate conjunction is the contract.

