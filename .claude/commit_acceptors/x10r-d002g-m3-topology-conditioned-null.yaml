# Diff-bound commit acceptor for the D-002G-M3 PR.
#
# Lands the M3 topology-conditioned independent-realisation null
# admissibility infrastructure pre-registered at the merge commit of
# PR #680 (sha 0f4433e04c7a594fc80c964eeec337a8b1128038), salt 523.
#
# Honest scientific outcome on the prereg substrate set: M3 is
# ELIGIBLE for ricci_flow (which was already M1/M2-eligible) and
# INELIGIBLE_M3_NON_PRECURSOR_SPECIFIC for block_structured and
# temporal_coupling. The two blocked substrates have seed-deterministic
# precursor lifts by construction; the locked M3 admissibility ladder
# refuses them fail-closed at criterion 3. B1 stays OPEN, upgraded
# from OPEN_REQUIRES_M3 to OPEN_REQUIRES_M4.
#
# Strict scope:
#   * NO canonical D-002G run.
#   * NO D-002G PASS claim.
#   * NO D-002C ledger update (sha pinned).
#   * NO M3 pre-reg edit (sha pinned at #680 merge anchor).
#   * NO B2 closure.
#   * NO M4 pre-registration in THIS PR (M4 PR owns its own pre-reg).
#   * NO removal / weakening of any P1 / P2 / P3 verdict / test / invariant.

id: x10r-d002g-m3-topology-conditioned-null
status: ACTIVE
claim_type: governance
promise: >-
  After this PR lands, research/systemic_risk/d002g_null_mechanisms.py
  carries the M3 verifier (verify_m3_eligibility) + realiser
  (realize_m3_null) + matched-density generator
  (topology_matched_resample) + marginal-set extractor
  (extract_m3_topology_summary) + 9 verdict literals
  (ELIGIBLE_M3 + 8 INELIGIBLE / INDETERMINATE families) + M3
  dataclasses (M3TopologySummary, M3MarginalMatchReport,
  M3EligibilityVerdict) + exceptions (M3NotEligibleError,
  M3GeneratorDivergentError) + locked salt
  (M3_TOPOLOGY_CONDITIONED_SALT=523, distinct from prior 99/211/313/419)
  + pre-declared tolerance band (tol_marginal=0.05,
  tol_non_degenerate=1e-3, tol_density=0.02, tol_spectral_radius=0.05,
  tol_degree_wasserstein=0.05) + multi-arg helper
  deterministic_mix_multi.

  realize_null dispatch gains an "M3_TOPOLOGY_CONDITIONED" strategy
  branch; the prior strategy Literal is extended without removing
  any entry.

  tests/systemic_risk/ gains 5 new M3 test files (verdicts,
  invariants, negative controls, traps, no_promotion) totalling
  39 tests, all green. docs/governance/ gains
  D002G_M3_IMPLEMENTATION_REPORT.md and D002G_M3_ELIGIBILITY_MATRIX.md.
  D002G_CANONICAL_RUN_BLOCKERS.md gains a §B1.M3 subsection recording
  the OPEN_REQUIRES_M3 → OPEN_REQUIRES_M4 upgrade.
  artifacts/d002g/m3/m3_null_domain_verdicts.json is the
  machine-readable verdict matrix; scripts/x10r_d002g_m3_eligibility_matrix.py
  regenerates it deterministically.

  Strict scope: M3 admissibility infrastructure + tests + docs only.
  This PR does NOT establish D-002G scientific PASS, does NOT
  authorise a canonical run, does NOT touch the D-002C ledger, does
  NOT touch the M3 pre-reg (touching = fresh M4), does NOT close
  B1 (block_structured and temporal_coupling remain INELIGIBLE
  across M1/M2/M3), does NOT close B2. The empirical decision state
  is M3_INELIGIBLE_M4_REQUIRED; next PR is the M4 pre-registration.

