  PYTHONPATH=. python -m pytest tests/governance/test_no_unresolved_merge_markers.py -v;
  ! grep -nE "^(<<<<<<<|=======|>>>>>>>|\|\|\|\|\|\|\|)" docs/governance/D002G_CANONICAL_RUN_BLOCKERS.md;
  test "$(sha256sum docs/governance/D002C_CLAIM_LEDGER.yaml | awk "{print \$1}")" = "eb0b7151d76e5409e6dc9bb4a023551de5e0704673d5ac9f726319ef84a32387";
