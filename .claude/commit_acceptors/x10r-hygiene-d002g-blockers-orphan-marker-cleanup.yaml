    test -f .claude/commit_acceptors/x10r-hygiene-d002g-blockers-orphan-marker-cleanup.yaml || exit 3;
    if grep -nE "^(<<<<<<<|=======|>>>>>>>|\|\|\|\|\|\|\|)" docs/governance/D002G_CANONICAL_RUN_BLOCKERS.md; then exit 4; fi;
    test "$(sha256sum docs/governance/D002C_CLAIM_LEDGER.yaml | awk "{print \$1}")" = "eb0b7151d76e5409e6dc9bb4a023551de5e0704673d5ac9f726319ef84a32387" || exit 5;
    test "$(sha256sum docs/governance/D002G_ACCEPTANCE_RULES.md | awk "{print \$1}")" = "875b1e3eb031b8e5333dc8b455454f0a30419ead1ebe787aa01d5882e7d6ad31" || exit 6;
