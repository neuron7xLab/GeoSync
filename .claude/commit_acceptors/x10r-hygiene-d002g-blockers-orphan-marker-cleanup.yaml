# Diff-bound commit acceptor for the D-002G BLOCKERS orphan-marker hygiene PR.
#
# PR #692 (D-002H ledger append) hand-resolved a merge conflict against
# docs/governance/D002G_CANONICAL_RUN_BLOCKERS.md and left an orphan
# ``<<<<<<< HEAD`` line at line 254 with no matching ``=======`` /
# ``>>>>>>>``. Text content around the marker is otherwise correct
# (D-002H REFUSED section + D-002I lineage section in the right order).
# Only the literal marker line was orphaned.
#
# This PR is a precondition for merging D-002J prereg + D-002J-P1 data
# registry per the §15 execution order: every governance reader assumes
# the BLOCKERS file is internally well-formed.
#
# Scope: byte-exact removal of one orphan marker line + a permanent
# guard test that scans docs/governance/, docs/research/, and
# .claude/commit_acceptors/ for unresolved merge-conflict markers
# (<<<<<<<, =======, >>>>>>>, |||||||). The guard includes a
# drift-sentinel self-test that the scanner correctly detects fake
# markers in a synthetic file.
#
# Locked-governance shas (D-002C ledger, D-002G prereg/acceptance,
# D-002H prereg, D-002I prereg) are byte-exact preserved.
# NO source-code edit, NO canonical sweep, NO D-002* prereg edit.

id: x10r-hygiene-d002g-blockers-orphan-marker-cleanup
status: ACTIVE
claim_type: chore
promise: >-
  After this PR lands,
  docs/governance/D002G_CANONICAL_RUN_BLOCKERS.md no longer contains
  any unresolved merge-conflict marker line — the orphan
  ``<<<<<<< HEAD`` at line 254 introduced by PR #692 conflict
  resolution is removed, byte-exact everywhere else.

  tests/governance/test_no_unresolved_merge_markers.py carries 4
  guard tests (test_governance_docs_have_no_unresolved_merge_markers,
  test_research_docs_have_no_unresolved_merge_markers,
  test_commit_acceptors_have_no_unresolved_merge_markers,
  test_scanner_finds_markers_when_present) that fail-close the suite
  on any future unresolved marker under docs/governance/,
  docs/research/, or .claude/commit_acceptors/. The drift-sentinel
  self-test asserts the scanner detects all four canonical markers
  in a synthetic file with correct 1-based line numbers.

  Locked-governance sha256 anchors byte-exact preserved:
    D-002C claim ledger
    eb0b7151d76e5409e6dc9bb4a023551de5e0704673d5ac9f726319ef84a32387;
    D-002G acceptance rules
    875b1e3eb031b8e5333dc8b455454f0a30419ead1ebe787aa01d5882e7d6ad31;
    D-002G preregistration
    1ab91f09370e4705a8b0849467bc1f56df2e58d58d5623d3b6d905cbd110bb04;
    D-002H preregistration
    44b18b5a40ce9d188a9c3bd49339621f81a65a15f97a683247902450dd54acec;
    D-002I preregistration
    b646989c032dc0e29f9b791e0b68209ff22b40f4757737712badc8656cf2db5f.

  Pure hygiene: NO source code, NO canonical sweep, NO D-002* prereg
  edit, NO ledger touch. Precondition for merging D-002J prereg
  (PR #694) and D-002J-P1 data registry (PR #695).

