    priority: P1

# ═══════════════════════════════════════════════════
# RICCI CURVATURE
# ═══════════════════════════════════════════════════

ricci:
  curvature_bounds:
    id: INV-RC1
    type: universal
    statement: "Ollivier-Ricci curvature κ(i,j) ≤ 1 for every edge of every connected graph"
    test_type: property_test
    parameters:
      rationale: "κ = 1 − W₁(m_x, m_y)/d(x,y) and W₁ ≥ 0 always, so κ ≤ 1 is a definitional upper bound independent of graph topology or walk laziness"
      lower_bound_note: "The lower bound κ ≥ −1 holds only for lazy random walks (α ≥ 1/2) on a combinatorial metric. The implementation in core/indicators/ricci.py uses 1-D positional embedding (offset/scale from graph attrs) and α = 1/(deg+1), so κ can descend below −1 for non-price-graph topologies with large positional spread (e.g. cycle_12 gives κ=−2 on adjacent nodes separated by 9 in the integer embedding). Price graphs built via build_price_graph() produce adjacent integer node IDs and do satisfy κ ∈ [−1, 1]; that tighter bound is tracked as INV-RC3."
    falsification: "ricci_curvature_edge returns κ > 1 for any edge of any connected graph"
    priority: P0

  positive_curvature_clustering:
    id: INV-RC2
    type: qualitative
    statement: "κ > 0 indicates clustering / community structure"
    test_type: correlation_test
    priority: P2

  price_graph_bounds:
    id: INV-RC3
    type: universal
    statement: "κ(i,j) ∈ [−1, 1] for every edge of a price graph built via core.indicators.ricci.build_price_graph"
    test_type: property_test
    parameters:
      scope: "build_price_graph output only — adjacent integer price-level nodes with unit delta in the 1D embedding"
      tighter_than_RC1: "This is the tightened Ollivier bound that requires (a) consecutive integer node IDs and (b) lazy random walk with α = 1/(deg+1), both guaranteed by the price-graph constructor"
    falsification: "κ outside [−1, 1] on any edge of a build_price_graph() output with a finite, bounded price series"
    priority: P1

# ═══════════════════════════════════════════════════
# KELLY SIZING
# Physics: log-optimal betting in the small-edge continuous limit.
# Source: Kelly 1956; Thorp 2006; core/neuro/kuramoto_kelly.py
# ═══════════════════════════════════════════════════

kelly:
  optimal_fraction_formula:
    id: INV-KELLY1
    type: algebraic
    statement: "f* = μ / σ² for log-optimal betting in the small-edge continuous limit"
    test_type: property_test
    parameters:
      mu: "expected excess return"
      sigma: "return volatility (std)"
      small_edge_regime: "|μ/σ²| well inside (0, 1) so finite-sample MC argmax is stable"
    falsification: "computed f* deviates from μ/σ² by more than one grid step on analytic inputs"
    common_mistake: "Picking μ/σ² ≈ 1 puts f* at the grid boundary where the negative return tail biases the MC estimator low. Stay interior (e.g. μ=0.01, σ≈0.17 → f*≈0.33)."
    scope_note: "INV-KELLY1 describes the THEORETICAL optimum f* = μ/σ². The production KuramotoKellyAdapter does NOT compute raw Kelly — it computes kelly_base * scale(R) where scale is a coherence-adjusted multiplier ∈ [floor, ceil]. The theoretical formula is witnessed on synthetic distributions (test_T8, test_T20). The adapter's output is bounded by INV-KELLY2 (fraction cap). These are two layers: theory (INV-KELLY1) + implementation (INV-KELLY2)."
    priority: P0

  fraction_cap:
    id: INV-KELLY2
    type: universal
    statement: "The applied Kelly fraction is never larger than the configured drawdown cap"
    test_type: property_test
    parameters:
      f_max: "configured cap from risk policy (half-Kelly typical, 0.25–0.5)"
    falsification: "engine returns f_applied > f_max for any input"
    priority: P0

  log_growth_optimality:
    id: INV-KELLY3
    type: statistical
    statement: "E[log(1 + f*·X)] ≥ E[log(1 + f'·X)] for any f' ≠ f* on bounded returns"
    test_type: ensemble_test
    parameters:
      n_trials: "≥ 1e5 samples from a bounded distribution (Uniform, truncated Normal)"
      grid_step: "1/200 over f ∈ [0, 1]"
      boundedness: "|X| < 1/f_max so log1p(f·X) stays real for every tested f"
    falsification: "argmax of empirical E[log(1+fX)] differs from μ/σ² by more than grid_step + one MC sigma"
    common_mistake: "Using unbounded returns (Gaussian with large σ) yields log(negative) and corrupts the argmax — always truncate or use bounded distributions."
    priority: P1

# ═══════════════════════════════════════════════════
# ORDER MANAGEMENT SYSTEM (OMS)
# Physics: accounting conservation, idempotency, causal ordering.
# Source: execution/oms.py; core/physics/portfolio_conservation.py
# ═══════════════════════════════════════════════════

oms:
  portfolio_energy_conservation:
    id: INV-OMS1
    type: universal
    statement: "Portfolio kinetic energy E_kinetic = ½·Σ|pos|·ret² ≥ 0 for every portfolio state"
    test_type: property_test
    parameters:
      module: "core.physics.portfolio_conservation.PortfolioEnergyConservation"
      scope: "Energy-level conservation check; per-fill accounting (Σ Δpos·price + Δcash = 0) still awaits a full OMS + book fixture and is tracked as future work."
      rationale: "The universal conservation primitive the platform actually exposes today is the kinetic-energy non-negativity in PortfolioEnergyConservation. E_kinetic is a sum of non-negative products, so any negative return from compute_kinetic is a bug in the absolute-value path."
    falsification: "PortfolioEnergyConservation.compute_kinetic returns a negative value on any (positions, returns) pair"
    priority: P0

  idempotency:
    id: INV-OMS2
    type: universal
    statement: "apply(order) ≡ apply(order, order, ..., order) — same client_order_id produces at most one state change"
    test_type: property_test
    parameters:
      n_replays: "≥ 5 submissions of the identical order"
    falsification: "second submission of the same client_order_id changes book state"
    priority: P0

  causal_order:
    id: INV-OMS3
    type: universal
    statement: "Lifecycle event timestamps are monotonically non-decreasing per order_id"
    test_type: property_test
    falsification: "t_{k+1} < t_k observed in lifecycle.history(order_id) sequence"
    scope_note: "Monotonicity relies on the clock callable passed to OrderLifecycle (default: time.time() which is monotonic on Linux). The OMS itself does not validate timestamp ordering — it is a consequence of single-threaded synchronous event recording under RLock."
    priority: P0

# ═══════════════════════════════════════════════════
# SIGNAL BUS
# Physics: DAG structure per tick, deterministic replay under fixed seed.
# Source: core/neuro/signal_bus.py
# ═══════════════════════════════════════════════════

signalbus:
  acyclic_fanout:
    id: INV-SB1
    type: universal
    statement: "The NeuroSignalBus supports DAG fanout: a linear chain of subscriber callbacks fires each node exactly once per root publish"
    test_type: property_test
    falsification: "any subscriber in a DAG-wired chain fires zero or more than once on a single root publish"
    scope_note: "The bus is a flat pub/sub (signal_bus.py) with no built-in cycle detector or topological sort. Cyclic subscriptions (A→B→A) cause Python RecursionError, not a clean rejection. The invariant asserts correct DAG traversal when the subscription graph IS acyclic — it does not claim the bus prevents cycles."
    priority: P0

  deterministic_replay:
    id: INV-SB2
    type: universal
    statement: "Publishing an identical sequence of values into fresh NeuroSignalBus instances produces bit-identical snapshots"
    test_type: property_test
    parameters:
      n_runs: "≥ 3 fresh-bus replays of the same publish sequence"
    falsification: "two fresh bus instances receiving the same publish sequence yield different snapshot values"
    scope_note: "The bus is deterministic by construction — it is a pure latch with no RNG, no hash-dependent ordering, and no concurrency (all publishes happen under RLock). No explicit replay() method or seed parameter is needed; determinism is a structural property of the latch design."
    priority: P0

# ═══════════════════════════════════════════════════
# HPC KERNELS
# Physics: numerical reproducibility and stability.
# Source: geosync_hpc/*.py
# ═══════════════════════════════════════════════════

hpc:
  seeded_reproducibility:
    id: INV-HPC1
    type: universal
    statement: "kernel(seed, x, dtype) == kernel(seed, x, dtype) bit-for-bit on fixed hardware"
    test_type: property_test
    parameters:
      n_runs: "≥ 3"
      tolerance_cross_isa: "1 ULP across different CPU/GPU ISAs; 0 ULP on identical hardware"
    falsification: "two identical invocations on the same hardware differ by any ULP"
    priority: P0

  numerical_stability:
    id: INV-HPC2
    type: universal
    statement: "Finite inputs within documented range produce finite outputs (no NaN/Inf propagation)"
    test_type: property_test
    parameters:
      kappa_max: "condition-number ceiling configured per kernel"
    falsification: "any finite input within spec yields NaN/Inf or cond(A) > kappa_max"
    priority: P0

# ═══════════════════════════════════════════════════
# CRYPTOBIOSIS — Phase-Transition Survival
# Physics: tardigrade-inspired state machine. System exits threat space
# rather than resisting. DORMANT = zero metabolism = zero computation.
# Source: core/neuro/cryptobiosis.py
# ═══════════════════════════════════════════════════

cryptobiosis:
  dormant_zero_multiplier:
    id: INV-CB1
    type: universal
    statement: "DORMANT state produces multiplier == 0.0 EXACTLY (not approximately)"
    test_type: property_test
    falsification: "CryptobiosisController in DORMANT state returns multiplier != 0.0"
    priority: P0

  vitrification_o1:
    id: INV-CB2
    type: universal
    statement: "Vitrification (ACTIVE → DORMANT) completes in O(1) ticks — no iterative wind-down"
    test_type: property_test
    parameters:
      max_ticks: "2 (one tick VITRIFYING, next tick DORMANT)"
    falsification: "System remains in VITRIFYING for more than 1 tick after entry"
    priority: P0

  snapshot_sufficiency:
    id: INV-CB3
    type: universal
    statement: "The snapshot captured at vitrification contains all data required for recovery"
    test_type: property_test
    falsification: "snapshot is None while in DORMANT state"
    priority: P1

  rehydration_monotone:
    id: INV-CB4
    type: monotonic
    statement: "Rehydration stages are non-decreasing: stage(t+1) ≥ stage(t) while T < entry"
    test_type: trajectory_test
    falsification: "rehydration_stage decreases between consecutive ticks with T < entry_threshold"
    priority: P0

  entry_above_modules:
    id: INV-CB5
    type: conditional
    statement: "Cryptobiosis entry threshold exceeds individual module distress thresholds"
    test_type: property_test
    parameters:
      rationale: "Cryptobiosis is a last resort — individual modules (GABA, Serotonin veto) should fire first"
    falsification: "entry_threshold ≤ any individual module's crisis threshold"
    priority: P1

  distress_bounded:
    id: INV-CB6
    type: universal
    statement: "Combined distress score T ∈ [0, 1] for every input"
    test_type: property_test
    falsification: "T outside [0, 1] after any update call"
    priority: P0

  hysteresis:
    id: INV-CB7
    type: universal
    statement: "exit_threshold < entry_threshold (hysteresis prevents oscillation)"
    test_type: property_test
    falsification: "CryptobiosisConfig accepts exit >= entry without raising ValueError"
    priority: P0

  rehydration_abort:
    id: INV-CB8
    type: conditional
    statement: "T ≥ entry_threshold during REHYDRATING → immediate return to DORMANT"
    test_type: property_test
    falsification: "System stays in REHYDRATING after receiving T ≥ entry_threshold"
    priority: P0

# ═══════════════════════════════════════════════════
# LYAPUNOV EXPONENT — Chaos/Order Detection
# Physics: Rosenstein (1993) MLE from scalar time series.
# Source: core/physics/lyapunov_exponent.py
# ═══════════════════════════════════════════════════

lyapunov_exponent:
  mle_finite:
    id: INV-LE1
    type: universal
    statement: "MLE is finite for any finite bounded input series"
    test_type: property_test
    falsification: "maximal_lyapunov_exponent returns NaN/Inf on finite input"
    priority: P0

  mle_sign_semantics:
    id: INV-LE2
    type: qualitative
    statement: "MLE(white noise) ≈ 0; MLE(damped oscillator) < 0; MLE(logistic map r=4) > 0"
    test_type: sweep_test
    parameters:
      noise: "iid Gaussian → λ ≈ 0 (no predictable structure)"
      stable: "damped sine → λ < 0 (converging trajectory)"
      chaotic: "logistic map x_{n+1} = 4x(1-x) → λ = ln(2) ≈ 0.693"
    falsification: "sign of MLE disagrees with known dynamical regime"
    priority: P0

# ═══════════════════════════════════════════════════
# SPECTRAL GAP — Algebraic Connectivity
# Physics: Fiedler eigenvalue λ₂ of graph Laplacian.
# Source: core/physics/lyapunov_exponent.py (spectral_gap function)
# ═══════════════════════════════════════════════════

spectral_gap:
  lambda2_non_negative:
    id: INV-SG1
    type: universal
    statement: "λ₂ ≥ 0 always (Laplacian is positive semi-definite)"
    test_type: property_test
    falsification: "spectral_gap returns negative value on any adjacency matrix"
    priority: P0

  lambda2_connectivity:
    id: INV-SG2
    type: conditional
    statement: "λ₂ > 0 ⟺ graph is connected; λ₂ = 0 ⟺ graph is disconnected"
    test_type: property_test
    falsification: "λ₂ > 0 for a disconnected graph, or λ₂ = 0 for a connected graph"
    priority: P0

# ═══════════════════════════════════════════════════
# OTT-ANTONSEN REDUCTION — Exact Mean-Field Dynamics
# Physics: Ott & Antonsen (2008) dimensionality reduction.
# Source: core/kuramoto/ott_antonsen.py
# ═══════════════════════════════════════════════════

ott_antonsen:
  order_parameter_bounded:
    id: INV-OA1
    type: universal
    statement: "|z(t)| ≤ 1 for every step of the Ott-Antonsen trajectory"
    test_type: property_test
    falsification: "OttAntonsenEngine.integrate returns |z| > 1 at any step"
    priority: P0

  supercritical_steady_state:
    id: INV-OA2
    type: algebraic
    statement: "K > 2Δ ⟹ R_∞ = √(1 − 2Δ/K) matches ODE integration to < 1e-3"
    test_type: property_test
    parameters:
      formula: "R_∞ = sqrt(1 - K_c/K) where K_c = 2Δ"
      cross_validation: "N-body Kuramoto with Lorentzian ω matches within 3/√N"
    falsification: "|R_numerical - R_analytical| > 1e-3 after T=100"
    priority: P0

  subcritical_decay:
    id: INV-OA3
    type: asymptotic
    statement: "K < 2Δ ⟹ R → 0 exponentially (rate ∝ K_c − K)"
    test_type: convergence_test
    parameters:
      critical_slowing: "at K → K_c, decay rate → 0 (excluded from test at K=0.99)"
    falsification: "R stays above 1e-4 after T=100 with K ≤ 0.8·K_c"
    priority: P0

# ═══════════════════════════════════════════════════
# DRO-ARA REGIME OBSERVER (Hurst + ADF + ARA loop)
# Scope: core/dro_ara/*.py
# ═══════════════════════════════════════════════════

dro_ara:
  gamma_derivation:
    id: INV-DRO1
    type: algebraic
    statement: "γ = 2·H + 1 to floating-point precision for every admissible input"
    test_type: property_test
    parameters:
      tolerance: "|γ − (2·H + 1)| < 1e-5"
      source: "core/dro_ara/engine.py::derive_gamma"
    falsification: "derive_gamma returns γ, H with |γ − (2·H + 1)| ≥ 1e-5"
    priority: P0

  risk_scalar_bounds:
    id: INV-DRO2
    type: universal
    statement: "risk_scalar(γ) = max(0, 1 − |γ − 1|) ∈ [0, 1] for all γ ∈ ℝ"
    test_type: property_test
    parameters:
      lipschitz_constant: "|rs(a) − rs(b)| ≤ |a − b|"
    falsification: "risk_scalar returns value < 0 or > 1 for any γ"
    priority: P0

  invalid_regime_gate:
    id: INV-DRO3
    type: conditional
    statement: "regime == INVALID iff (!stationary ∨ r2 < R2_MIN)"
    condition: "R2_MIN = 0.90 (core/dro_ara/engine.py:R2_MIN)"
    test_type: property_test
    falsification: "classify(gamma, r2<0.90, stationary=True) != INVALID, or classify(gamma, r2, False) != INVALID"
    priority: P0

  long_signal_gate:
    id: INV-DRO4
    type: conditional
    statement: "signal == LONG ⟹ regime == CRITICAL ∧ rs > RS_LONG_THRESH ∧ trend ∈ {CONVERGING, STABLE}"
    condition: "RS_LONG_THRESH = 0.33"
    test_type: property_test
    falsification: "geosync_observe emits LONG with any of the three conjuncts false"
    priority: P0

  fail_closed_input:
    id: INV-DRO5
    type: universal
    statement: "NaN ∨ Inf ∨ constant ∨ rank != 1 ∨ len < window+step ⟹ ValueError"
    test_type: property_test
    falsification: "geosync_observe returns silently on any degenerate input above"
    priority: P0

# ═══════════════════════════════════════════════════
# PRIOR ATTENUATION EXPLORATION MODE
# ═══════════════════════════════════════════════════

rebus:
  activation_guard:
    id: INV-REBUS-1
    type: conditional
    statement: "Activation is allowed only from NOMINAL parent state with finite real coherence >= activation threshold and readable finite-real prior mapping"
    test_type: unit_test
    falsification: "can_activate() returns True for parent_nominal=False, non-real coherence, bool coherence, or coherence<threshold; OR activate() accepts unreadable/malformed prior mapping entries"
    priority: P0

  entropy_forces_reintegration:
    id: INV-REBUS-3
    type: universal
    statement: "If current_entropy exceeds max_entropy, phase must become REINTEGRATION immediately and step() must reject further progression"
    test_type: unit_test
    falsification: "entropy ceiling breach does not set REINTEGRATION or step() continues afterward"
    priority: P0

  duration_forces_reintegration:
    id: INV-REBUS-4
    type: universal
    statement: "If bars_elapsed reaches max_duration_bars, phase must become REINTEGRATION and progression is blocked until terminal restore"
    test_type: unit_test
    falsification: "duration cap reached but phase remains non-REINTEGRATION"
    priority: P0

  terminal_paths_are_closed:
    id: INV-REBUS-5
    type: universal
    statement: "Only reintegrate(success/fail) or emergency_exit may terminate an active exploration cycle"
    test_type: unit_test
    falsification: "gate transitions to INACTIVE without reintegrate() or emergency_exit()"
    priority: P0

  exact_prior_restore:
    id: INV-REBUS-6
    type: universal
    statement: "All terminal paths restore prior weights exactly from backup"
    test_type: unit_test
    falsification: "terminal callback applies priors that differ from stored backup"
    priority: P0

  safety_preemption:
    id: INV-REBUS-7
    type: conditional
    statement: "kill_switch_active or stressed_state must preempt exploration via emergency_exit"
    test_type: unit_test
    falsification: "external safety signal leaves gate active"
    priority: P0

# ═══════════════════════════════════════════════════
# RESEARCH EXTENSIONS (opt-in, experimental, no alpha claim)
# ═══════════════════════════════════════════════════

capital_weighted_kuramoto:
  kbeta_bounds:
    id: INV-KBETA
    type: universal
    statement: "K_ij^β finite, non-negative, symmetric, zero on diagonal; β ∈ [beta_min, beta_max]; K_ij invariant under uniform multiplicative depth scaling"
    test_type: property_test
    falsification: "K_ij contains NaN/Inf, becomes negative, loses symmetry, has nonzero diagonal, β leaves [beta_min, beta_max], or differs after multiplying all bid/ask sizes by c>0"
    priority: P0

ricci_flow:
  flow_surgery_safety:
    id: INV-RC-FLOW
    type: universal
    statement: "Discrete Ricci flow w_ij <- w_ij - eta·kappa·w_ij followed by neckpinch surgery preserves finiteness, non-negativity, symmetry, zero diagonal; with preserve_total_edge_mass=True total mass is conserved; with preserve_connectedness=True bridge edges are clamped not removed; surgery removes at most floor(max_surgery_fraction · n_active_edges) edges"
    test_type: property_test
    falsification: "Post-step weights are non-finite, negative, asymmetric, have nonzero diagonal; bridge edge removed under preserve_connectedness=True; surgery removes more than the cap"
    priority: P0

robust_free_energy:
  robust_dominates_nominal:
    id: INV-FE-ROBUST
    type: universal
    statement: "F_robust(metrics, ambiguity) ≥ F_nominal(metrics) for any non-negative box ambiguity set; equality holds when all radii are zero; F_robust is monotone non-decreasing in any single radius; unknown metrics and negative radii are rejected fail-closed; the base EnergyModel state is never mutated"
    test_type: property_test
    falsification: "F_robust < F_nominal; nonzero ambiguity yields F_robust = F_nominal trivially; increasing a radius decreases F_robust; unknown/negative radii silently accepted; base model output changes after a DR-FREE call"
    priority: P0

higher_order_kuramoto:
  sparse_triadic_safety:
    id: INV-HO-SPARSE
    type: universal
    statement: "Sparse triadic kernel preserves R(t) ∈ [0,1] over the trajectory, reduces to pairwise dynamics when sigma2=0, agrees with the dense reference engine in triangle count on small complete graphs, is deterministic under fixed inputs, and never allocates O(N^3) auxiliary tensors when dense_debug=False"
    test_type: property_test
    falsification: "R outside [0,1]; sigma2=0 produces nonzero triadic RHS; sparse triangle count differs from dense; identical inputs produce different outputs; peak heap exceeds the c·n_triangles ceiling for sparse graphs"
    priority: P0


# ═══════════════════════════════════════════════════
# PNCC — PHYSICS-NATIVE COGNITIVE KERNEL (Wave 1)
# ═══════════════════════════════════════════════════
# Experimental / opt-in. Physics-first, not biology-first.
# Canonical reference: docs/research/pncc/CANONS.md (7 CANONS, 5 pre-registered
# hypotheses, 6 invariants). Two-layer protocol per CANONS §7: this file is the
# assistant-facing layer; physics_contracts/catalog.yaml is the runtime layer.
# Both updated atomically in this commit.
#
# Wave 1 landed: PNCC-A (#378), PNCC-E (#379), PNCC-C (#380).
#   Three invariants registered here.
# Wave 1 dropped: PNCC-B (Mpemba) — INV-MPEMBA-INIT not registered.
# Wave 1 halted: PNCC-D (CNS proxy) — INV-CNS-SAFETY not registered, awaits real telemetry.
# Wave 2 deferred: PNCC-F (free energy) — INV-FREE-ENERGY shadow-tracked by INV-FE1/FE2.

pncc:
  landauer_proxy:
    id: INV-LANDAUER-PROXY
    type: universal
    statement: "Irreversible action proxy cost dominates reversible-alternative cost: C_irr >= C_rev with strict > whenever irreversibility_score > 0"
    test_type: property_test
    falsification: "Any pair of irreversible/reversible actions with identical (token, latency, entropy) where C_irr < C_rev"
    priority: P0
    source: core/physics/thermodynamic_budget.py
    tests: tests/unit/physics/test_thermodynamic_budget.py

  reversible_gate:
    id: INV-REVERSIBLE-GATE
    type: universal
    statement: "Reversible-tagged action implies byte-exact pre-state recovery via rollback(audit_hash)"
    test_type: property_test
    falsification: "1000 random reversible actions where rollback(trace.audit_hash).state_bytes != pre_state"
    priority: P0
    source: core/physics/reversible_gate.py
    tests: tests/unit/physics/test_reversible_gate.py

  no_bio_claim:
    id: INV-NO-BIO-CLAIM
    type: universal
    statement: "Cognitive-performance language must be paired with a registered EvidenceClaim or an explicit disclaimer phrase"
    test_type: property_test
    falsification: "AST-grep over core/, tacl/, runtime/, geosync/ returns >=1 naked violation in non-test source"
    priority: P0
    source: tacl/evidence_ledger.py
    tests: tests/tacl/test_evidence_ledger.py

  criticality:
    id: INV-CRITICALITY
    type: universal
    statement: "Substrate is intelligence-capable iff γ ∈ [1−ε, 1+ε] where γ = 2·H + 1 (DFA-1 Hurst). Outside the metastable window, decisions must fail-closed to DORMANT. ε = cfg.criticality_epsilon."
    test_type: property_test
    falsification: "Any non-DORMANT decision registered with substrate_criticality_at_decision outside [1−ε, 1+ε] AND criticality_window_confirmed=False"
    priority: P0
    source: tacl/evidence_ledger.py
    tests: tests/tacl/test_evidence_ledger.py
    references:
      - "Bak, P. (1996). How Nature Works: The Science of Self-Organized Criticality."
      - "Langton, C. G. (1990). Computation at the edge of chaos. Physica D 42, 12."
      - "Mora, T. & Bialek, W. (2011). Are biological systems poised at criticality? J. Stat. Phys. 144, 268."
      - "Beggs, J. M. & Plenz, D. (2003). Neuronal avalanches in neocortical circuits. J. Neurosci. 23, 11167."
    related: [INV-DRO1, INV-DRO2, INV-DRO4, INV-YV1]

  bekenstein_cognitive:
    id: INV-BEKENSTEIN-COGNITIVE
    type: universal
    statement: "Information capacity of any cognitive substrate is bounded by I ≤ 2π·E·R / (ℏ·c·ln 2) bits, where (R, E) are the substrate's bounding-sphere radius and total energy. Saturated by black holes (Bekenstein-Hawking entropy)."
    test_type: property_test
    falsification: "Any physical system that stably stores or processes I > 2π·E·R/(ℏ·c·ln 2) bits without forming an event horizon, OR an experimental violation of the holographic principle in the high-energy regime."
    priority: P0
    source: core/physics/thermodynamic_budget.py
    tests: tests/unit/physics/test_thermodynamic_budget.py
    references:
      - "Bekenstein, J. D. (1981). Universal upper bound on the entropy-to-energy ratio for bounded systems. Phys. Rev. D 23, 287."
      - "'t Hooft, G. (1993). Dimensional reduction in quantum gravity. arXiv:gr-qc/9310026."
      - "Susskind, L. (1995). The world as a hologram. J. Math. Phys. 36, 6377."
    related: [INV-CRITICALITY, INV-LANDAUER-PROXY, INV-YV1]

  simulation_falsification:
    id: INV-SIMULATION-FALSIFICATION
    type: statistical
    statement: "The simulation hypothesis is operationalized as an enumerable registry of physical signatures, each with a published prediction, an explicit detectability threshold, and a current observation status (NOT_OBSERVED / OPEN / RULED_OUT). Probability is not a field; only status against observation."
    test_type: property_test
    falsification: "Any positive detection at or above a registered signature's threshold without independent corroboration is rejected; a productive ladder must have at least one entry with a published null bound (NOT_OBSERVED) within current instrument reach."
    priority: P1
    source: core/physics/simulation_falsification.py
    tests: tests/unit/physics/test_simulation_falsification.py
    references:
      - "Bekenstein, J. D. (1981). Universal upper bound on the entropy-to-energy ratio for bounded systems. Phys. Rev. D 23, 287."
      - "'t Hooft, G. (1993). Dimensional reduction in quantum gravity. arXiv:gr-qc/9310026."
      - "Susskind, L. (1995). The world as a hologram. J. Math. Phys. 36, 6377."
      - "Beane, S. R., Davoudi, Z., Savage, M. J. (2014). Constraints on the universe as a numerical simulation. Eur. Phys. J. A 50, 148. arXiv:1210.1847."
    related: [INV-BEKENSTEIN-COGNITIVE, INV-CRITICALITY, INV-LANDAUER-PROXY]

  arrow_of_time:
    id: INV-ARROW-OF-TIME
    type: monotonic
    statement: "For any observer-coupled closed system, cumulative net entropy production over any non-empty window is non-negative: Σ_net = ΔS_system + ΔI_observer (bit-space proxy) ≥ 0. Apparent local reductions of S_system must be paid for by observer information cost (Maxwell-demon resolution)."
    test_type: property_test
    falsification: "Any observed sequence of (ΔS_system, ΔI_observer) with ΔS_system + ΔI_observer < 0 in any contiguous window."
    priority: P0
    provenance: ANCHORED
    source: core/physics/arrow_of_time.py
    tests: tests/unit/physics/test_arrow_of_time.py
    references:
      - "Landauer, R. (1961). Irreversibility and Heat Generation in the Computing Process. IBM J. Res. Dev. 5, 183."
      - "Bennett, C. H. (1982). The thermodynamics of computation — a review. Int. J. Theor. Phys. 21, 905."
      - "Penrose, R. (1989). The Emperor's New Mind. Oxford University Press (cosmological-vs-thermodynamic arrow context)."
    related: [INV-LANDAUER-PROXY, INV-CRITICALITY, INV-BEKENSTEIN-COGNITIVE]

  observer_bandwidth:
    id: INV-OBSERVER-BANDWIDTH
    type: conditional
    statement: "For any observer-system pair under decoherence coupling, the system's effective decoherence rate Γ (Hz) is bounded above by the observer's information-acquisition rate Σ̇ (bit/s, treated 1:1 with Hz of resolvable events): Γ ≤ Σ̇. Schema-only: the unit equivalence 1 bit/s ↔ 1 Hz of resolvable events is an ansatz, and the cited references (Zurek 2003, Lieb-Robinson 1972) provide adjacent context rather than direct derivation."
    test_type: property_test
    falsification: "A measured observer-system pair where Γ > Σ̇ in well-isolated conditions, with the observer's bandwidth independently characterized."
    priority: P2
    provenance: SPECULATIVE
    source: core/physics/observer_bandwidth.py
    tests: tests/unit/physics/test_observer_bandwidth.py
    references:
      - "Zurek, W. H. (2003). Decoherence, einselection, and the quantum origins of the classical. Rev. Mod. Phys. 75, 715."
      - "Lieb, E. H. & Robinson, D. W. (1972). The finite group velocity of quantum spin systems. Comm. Math. Phys. 28, 251."
    related: [INV-LANDAUER-PROXY, INV-BEKENSTEIN-COGNITIVE, INV-ARROW-OF-TIME]

  cosmological_compute:
    id: INV-COSMOLOGICAL-COMPUTE
    type: statistical
    statement: "Useful reversible computation in any causal diamond is bounded above by ε · A / (4 · ℓ_p² · ln 2) bits, where A is horizon area, ℓ_p is the Planck length, and ε ∈ (0, 1] is a de-Sitter-complexity efficiency coefficient."
    test_type: property_test
    falsification: "A reproducible measurement of useful quantum computation inside a causal diamond exceeding the holographic ceiling, OR a derivation forcing ε > 1."
    priority: P1
    provenance: EXTRAPOLATED
    source: core/physics/cosmological_compute_bound.py
    tests: tests/unit/physics/test_cosmological_compute_bound.py
    references:
      - "Bekenstein, J. D. (1973). Black holes and entropy. Phys. Rev. D 7, 2333."
      - "'t Hooft, G. (1993). Dimensional reduction in quantum gravity. arXiv:gr-qc/9310026."
      - "Susskind, L. (1995). The world as a hologram. J. Math. Phys. 36, 6377."
      - "Susskind, L. (2014). Computational complexity and black hole horizons. Fortschr. Phys. 64, 24. arXiv:1402.5674."
    related: [INV-BEKENSTEIN-COGNITIVE, INV-LANDAUER-PROXY, INV-SIMULATION-FALSIFICATION]

  # INV-OBSERVER-CPT was demoted on 2026-04-26 (chore/honest-provenance-cleanup):
  # the contract was tautological under any observer-asymmetric kernel and no
  # peer-reviewed model of such a kernel for our universe was cited. The schema
  # is preserved as a research demo at examples/observer_cpt_schema_demo.py and
  # carries no registry weight.

  jacobson_observer:
    id: INV-JACOBSON-OBSERVER
    type: conditional
    statement: "Jacobson 1995 derived Einstein equations from local Clausius δQ = T·dS on causal horizons. An observer-coherence correction c, residual = δQ − T·dS − c, must satisfy: (i) c → 0 in the decoupled limit (pure Jacobson recovery), (ii) any non-zero c at observable scale is a falsifiable extension of GR."
    test_type: property_test
    falsification: "A measured local context where δQ = T·dS holds (Einstein gravity confirmed) but the proposed c is non-zero above tolerance, OR δQ ≠ T·dS at a scale where Einstein gravity is independently confirmed."
    priority: P1
    provenance: EXTRAPOLATED
    source: core/physics/jacobson_observer_coherence.py
    tests: tests/unit/physics/test_jacobson_observer_coherence.py
    references:
      - "Jacobson, T. (1995). Thermodynamics of spacetime: the Einstein equation of state. Phys. Rev. Lett. 75, 1260. arXiv:gr-qc/9504004."
      - "Padmanabhan, T. (2010). Thermodynamical aspects of gravity: new insights. Rep. Prog. Phys. 73, 046901. arXiv:0911.5004."
      - "Verlinde, E. (2011). On the origin of gravity and the laws of Newton. JHEP 04, 029."
    related: [INV-BEKENSTEIN-COGNITIVE, INV-COSMOLOGICAL-COMPUTE, INV-ARROW-OF-TIME]

  anchored_substrate_gate:
    id: INV-ANCHORED-SUBSTRATE-GATE
    type: conditional
    statement: "A substrate is *thermodynamically admissible* iff both ANCHORED-tier physical bounds hold simultaneously: I_observed ≤ 2π·E·R/(ℏ·c·ln 2) (INV-BEKENSTEIN-COGNITIVE) AND Σ_net = ΔS_system + ΔI_observer ≥ 0 (INV-ARROW-OF-TIME). The gate names the failing axis (or both). NOTE: passing the gate is necessary but NOT sufficient for any cognitive claim — non-cognitive systems satisfy both bounds trivially."
    test_type: property_test
    falsification: "A substrate where both ingredient invariants pass independently but the composite gate reports inadmissible, OR where one ingredient fails but the composite reports admissible. Composition must be the AND of the two ANCHORED axes."
    priority: P0
    provenance: ANCHORED
    source: core/physics/anchored_substrate_gate.py
    tests: tests/unit/physics/test_anchored_substrate_gate.py
    references:
      - "Bekenstein, J. D. (1981). Universal upper bound on the entropy-to-energy ratio for bounded systems. Phys. Rev. D 23, 287."
      - "Landauer, R. (1961). Irreversibility and Heat Generation in the Computing Process. IBM J. Res. Dev. 5, 183."
      - "Bennett, C. H. (1982). The thermodynamics of computation — a review. Int. J. Theor. Phys. 21, 905."
    related: [INV-BEKENSTEIN-COGNITIVE, INV-ARROW-OF-TIME]
