# NEURO OPERATIONALIZATION LEDGER
#
# Purpose:
#   Map every neuroscience / physics-inspired term in GeoSync runtime/docs to
#   one of {OPERATIONAL, PARTIAL, DECORATIVE, OVERCLAIM, LEGACY, REJECTED}.
#   Operational entries MUST cite an INV-* contract from CLAUDE.md, an input
#   contract, an output contract, a falsifier and an existing test path.
#
# Audit philosophy (CLAUDE.md, Section 0):
#   "Neuroscience is not decoration. Neuroscience is an algorithmic constraint
#   source. If the concept does not change behavior, remove it from runtime
#   naming. If it changes behavior but cannot be falsified, downgrade it."
#
# Schema (validated by tools/audit/neuro_symbolic_audit.py):
#   id                    — unique stable id, kebab-case
#   term                  — canonical neuro/physics anchor (e.g. dopamine, kuramoto)
#   file                  — path relative to repo root
#   line_range            — [start, end] inclusive
#   current_usage         — one-sentence description of what the symbol does
#   classification        — OPERATIONAL | PARTIAL | DECORATIVE | OVERCLAIM | LEGACY | REJECTED
#   claimed_role          — biological/physical claim implied by the naming
#   actual_algorithmic_role — what the code actually computes
#   input_contract        — typed inputs (free-form string but required for OPERATIONAL)
#   output_contract       — typed outputs (free-form string but required for OPERATIONAL)
#   falsifier             — what would invalidate the mechanism (required for OPERATIONAL)
#   existing_tests        — list of test file paths that exercise this entry
#   missing_tests         — list of tests that should exist but do not
#   runtime_path          — YES | NO | UNKNOWN
#   remediation_action    — KEEP | ADD_FALSIFIER | ADD_NULL_MODEL | ADD_TEST | RENAME | QUARANTINE_DOC | REJECT | DELETE
#   priority              — P0 | P1 | P2 | P3
#   reason                — short rationale (one sentence)
#   inv_refs              — list of INV-* identifiers from CLAUDE.md (required for OPERATIONAL)

