ssl = on
ssl_cert_file = '/etc/postgresql/tls/cortex-db-server.pem'
ssl_key_file = '/etc/postgresql/tls/cortex-db-server.key.pem'
ssl_ca_file = '/etc/postgresql/tls/root-ca.pem'
ssl_min_protocol_version = 'TLSv1.2'
ssl_max_protocol_version = 'TLSv1.3'
ssl_prefer_server_ciphers = on
listen_addresses = '*'
