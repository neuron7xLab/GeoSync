# ---------------------------------------------------------------------------
# Legacy docstrings in two scripts/ helpers that transitively pull the
# scripts.cli module through the TYPE_CHECKING-style guard in
# scripts/__init__.py. Editing these files causes the python-quality CI
# job to walk 272+ pre-existing mypy errors in scripts/api_management/
# which are outside the scope of the rebrand cleanup. The rebrand for
# these two files is scheduled for a follow-up PR that also fixes
# scripts/api_management/ typing.
# ---------------------------------------------------------------------------

[[allow]]
path = "scripts/run_backtest.py"
token = "NeuroTrade"
reason = "Touching this file triggers cascading mypy failures from scripts/api_management/ (pre-existing). Rebrand scheduled for a follow-up that also fixes those types."

[[allow]]
