# SPDX-License-Identifier: MIT
#
# Brand-consistency allowlist.
#
# Each [[allow]] entry grandfathers a single (path, token) pair that must
# remain in the repo for a documented reason. Entries are matched
# exactly by tools/quality/brand_consistency.py.
#
# Adding a new entry requires a human-readable reason. Removing an entry
# requires the corresponding residue to be cleaned up from the source.
#
# Schema:
#   [[allow]]
#   path = "relative/path/to/file.ext"
#   token = "LegacyToken"
#   reason = "one-line justification"
#
# ---------------------------------------------------------------------------
# The brand-consistency guard itself must enumerate the forbidden tokens
# as source-level constants and must exercise them in its tests. Those
# self-references are the only legitimate legacy-token occurrences in
# the tracked source tree.
# ---------------------------------------------------------------------------

