\*
\* TLC configuration for the AdmissionGate specification.
\*
\* Bounds are chosen so the full state space finishes in < 2 s on a laptop
\* while still covering every interleaving of the four barriers. Every
\* event has independent pass/fail per barrier, so the 3-event × 4-barrier
\* space already hits the cross-product of all rejection paths.
\*
\* CHECK_DEADLOCK is disabled: the model is a bounded state machine whose
\* terminal state (MaxEvents emitted, pending empty) is a legitimate halt,
\* not a safety violation. Safety is established by the three INVARIANTs
\* below; liveness of Decide is asserted by the WF_vars(Decide) clause
\* inside Spec itself.

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

CONSTANTS
  EventTypes        = {"e1", "e2", "e3"}
  RegisteredEvents  = {"e1", "e2"}
  StructurallyValid = {"e1", "e2"}
  StateValid        = {"e1"}
  InvariantValid    = {"e1"}
  MaxEvents         = 4

INVARIANT TypeOK
INVARIANT SafeFirstRejectionWins
INVARIANT RejectCodeMatchesBarrier
