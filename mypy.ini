[mypy]
python_version = 3.11
files =
    nak_controller,
    analytics,
    application,
    backtest,
    core,
    domain,
    execution,
    interfaces,
    markets,
    nfpro,
    observability,
    src,
    tools
mypy_path = .
namespace_packages = True

# Phased strict mode rollout - starting with minimal checks
# Only enable checks that pass to establish a clean baseline
warn_unused_configs = True
warn_redundant_casts = True
strict_equality = True
show_error_codes = True
plugins = pydantic.mypy

# Disable strict checks globally - to be re-enabled incrementally
warn_return_any = False
check_untyped_defs = False
warn_unused_ignores = False
no_implicit_optional = False
disallow_untyped_defs = False
disallow_incomplete_defs = False
disallow_untyped_calls = False
disallow_untyped_decorators = False

# Allow flexibility for external libraries  
ignore_missing_imports = True

# ============================================================================
# Excluded modules - significant type debt requiring cleanup
# These modules are temporarily excluded while CI is stabilized
# TODO: Create a tracking issue and update this link
# ============================================================================

# Vendor and examples
[mypy-tools.vendor.*]
ignore_errors = True

[mypy-examples.*]
ignore_errors = True

# Core neuro modules - heavy numpy/torch type complexity
[mypy-src.geosync.core.neuro.*]
ignore_errors = True

[mypy-core.neuro.*]
ignore_errors = True

# Execution modules - external API integration complexity
[mypy-execution.*]
ignore_errors = True

# Observability - tracing/metrics type complexity
[mypy-observability.*]
ignore_errors = True

# Application layer - FastAPI/Pydantic interaction issues
[mypy-application.*]
