[mypy]
python_version = 3.11
files =
    nak_controller,
    analytics,
    application,
    backtest,
    core,
    domain,
    execution,
    interfaces,
    markets,
    nfpro,
    observability,
    src,
    tools
mypy_path = .
namespace_packages = True

# Phased strict mode rollout - starting with minimal checks
# Only enable checks that pass to establish a clean baseline
warn_unused_configs = True
warn_redundant_casts = True
strict_equality = True
show_error_codes = True
plugins = pydantic.mypy

# Disable strict checks globally - to be re-enabled incrementally
warn_return_any = False
check_untyped_defs = False
warn_unused_ignores = False
no_implicit_optional = False
disallow_untyped_defs = False
disallow_incomplete_defs = False
disallow_untyped_calls = False
disallow_untyped_decorators = False

# Per-module overrides for genuinely untyped libraries
[mypy-ccxt.*]
ignore_missing_imports = True
[mypy-deap.*]
ignore_missing_imports = True
[mypy-gudhi.*]
ignore_missing_imports = True
[mypy-POT.*]
ignore_missing_imports = True
[mypy-scalene.*]
ignore_missing_imports = True
[mypy-py_spy.*]
ignore_missing_imports = True
[mypy-efinance.*]
ignore_missing_imports = True
[mypy-exfinance.*]
ignore_missing_imports = True
[mypy-questdb.*]
ignore_missing_imports = True
[mypy-kafka.*]
ignore_missing_imports = True
[mypy-pactman.*]
ignore_missing_imports = True
[mypy-grpc.*]
ignore_missing_imports = True
[mypy-google.protobuf.*]
ignore_missing_imports = True
[mypy-scipy.*]
ignore_missing_imports = True
[mypy-statsmodels.*]
ignore_missing_imports = True
[mypy-pywt.*]
ignore_missing_imports = True
[mypy-jax.*]
ignore_missing_imports = True

