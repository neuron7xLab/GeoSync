# ============================================================================
# Modules with strict type checking enabled
# ============================================================================

# Phase 1: Core domain models - strict compliance required
[mypy-domain.*]
ignore_errors = False
disallow_untyped_defs = True
disallow_incomplete_defs = True
disallow_untyped_calls = True
disallow_untyped_decorators = True
no_implicit_reexport = True
warn_return_any = True
check_untyped_defs = True
no_implicit_optional = True

# Interfaces and backtest - temporarily relaxed until type debt is addressed
[mypy-interfaces.*]
ignore_errors = True

# Backtest engine
[mypy-backtest.*]
ignore_errors = True

# CoherenceBridge adapter modules
[mypy-coherence_bridge.*]
ignore_errors = False
disallow_untyped_defs = False
check_untyped_defs = False
warn_unused_ignores = False

# Pre-existing type debt in scripts/modules (not in coherence_bridge scope)
[mypy-scripts.*]
ignore_errors = True

[mypy-modules.*]
ignore_errors = True

[mypy-tacl.*]
