# ----------------------------------------------------------------
# Four falsifiable hypotheses — pre-committed BEFORE implementation
# ----------------------------------------------------------------
hypotheses:
  - id: H_I1
    name: M1 null seed offset degeneracy
    claim: |
      The M1 null cohort (null_seed = base_seed + 10000) is marginally
      degenerate under permutation null audit because seed offset 10000
      may produce K_null with subtle structural similarity to K_p, even
      though M1 admissibility verifies bit-distinctness.
    falsification_protocol: |
      D-002I-P1/H1 will re-run the null audit only (NOT the canonical
      sweep) with alternative null_seed_offset_M1 values from the set
      {100000, 1000000, hash-mixed} on the same locked ricci_flow grid.
    support_criterion: |
      aggregate_verdict flips FAIL -> PASS for at least one alternative
      offset.
    refutation_criterion: |
      All alternative offsets retain aggregate_verdict == FAIL.
    scope: M1 mechanism only

  - id: H_I2
    name: M3 generator over-fit to precursor marginals
    claim: |
      The M3 topology-conditioned null is too smooth. The match tolerance
      tol_marginal = 0.05 over-fits K_null to K_p marginals, making the
      cohort statistically indistinguishable from precursor at the
      permutation null audit level.
    falsification_protocol: |
      D-002I-P1/H2 will re-run the null audit only (NOT the canonical
      sweep) with tol_marginal in {0.01, 0.005, 0.001} (tighter -- the
      generator must work harder).
    support_criterion: |
      aggregate_verdict flips FAIL -> PASS for at least one tighter
      tolerance.
    refutation_criterion: |
      All tighter tolerances retain aggregate_verdict == FAIL.
    scope: M3 mechanism only

  - id: H_I3
    name: Signal genuinely below permutation-detectable threshold
    claim: |
      The signal magnitude (signal_over_ci ~= 1.08 on sync_auc M1 only)
      is genuinely too small. Null audit FAIL reflects true signal
      weakness, not a mechanism design fault.
    falsification_protocol: |
      D-002I-P1/H3 will parametrise lambda scaling at the runner level
      ONLY (NOT a substrate code edit -- that would violate the locked
      substrate code anchor; the substrate code lock is preserved).
      The evaluation grid is the doubled-lambda set
      {0.0, 0.1, 0.2, 0.4, 0.8, 2.0}.
    support_criterion: |
      Null audit verdict flips FAIL -> PASS with augmented signal.
    refutation_criterion: |
      Signal augmentation does not change the null audit verdict.
    scope: |
      Signal-magnitude interpretation only; no substrate code edit;
      no D-002H prereg edit; this is investigation, not validation.

  - id: H_I4
    name: Bonferroni n_cells=216 over-correction
    claim: |
      D-002H inherited n_cells=216 from the D-002G 3-substrate grid.
      With the D-002H 18-cell scope, the effective per-cell alpha
      = 0.05 / 216 = 2.314814e-4 is over-strict. Re-evaluation with
      n_cells=18 (per-cell alpha = 0.05 / 18 = 2.777778e-3) may change
      the R2 verdicts.
    falsification_protocol: |
      D-002I-P1/H4 will re-derive the verdict from the existing
      sweep_capsule_v1.json with n_cells=18 (no re-run of the sweep).
    support_criterion: |
      R1 ∧ R2 ∧ R3 conjunction flips such that at least one cell PASSes
      with n_cells=18 -- PROVIDED NULL_AUDIT separately PASSes for that
      cell. If NULL_AUDIT still FAILs, H_I4 is moot because NULL_AUDIT
      precedes R1/R2/R3 in the acceptance chain.
    refutation_criterion: |
      No R2 verdict change with n_cells=18, OR NULL_AUDIT still FAILs
      (which renders H_I4 moot regardless of R2 change).
    scope: |
      Bonferroni denominator interpretation only; does NOT change the
      D-002H pre-registration; does NOT re-run the canonical sweep.

