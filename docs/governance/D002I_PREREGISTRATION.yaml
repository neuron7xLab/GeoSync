# ----------------------------------------------------------------
# Decision tree post-investigation (pre-committed)
# ----------------------------------------------------------------
decision_tree:
  - condition: "all 4 hypotheses REFUTED"
    interpretation: |
      D-002H REFUSED is structural: the M1+M3 mechanism families on
      ricci_flow at this signal magnitude are fundamentally insufficient
      for the permutation null audit. D-002H stays as terminal scoped
      negative artifact; any forward motion = fresh D-002J pre-reg.
  - condition: "exactly 1 hypothesis SUPPORTED"
    interpretation: |
      Identifies a single dominant failure axis. Forward motion =
      fresh D-002J pre-registration designed against that axis only.
      D-002H REFUSED still stands as canonical verdict; D-002I does
      not retroactively flip it.
  - condition: "≥ 2 hypotheses SUPPORTED"
    interpretation: |
      Multiple confounded failure axes. Forward motion = fresh D-002J
      pre-reg, but design must orthogonalise the axes before any new
      canonical run can be authorised.
