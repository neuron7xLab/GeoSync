# ----------------------------------------------------------------
# §1 — Justification (verbatim from plan §1)
# ----------------------------------------------------------------
justification: |
  D-002H REFUSED_NULL_AUDIT_FAIL; D-002I diagnosis showed sub-threshold
  signal + insufficient grid power (n_seeds=20, median n_min≈93, H_I3
  CONFIRMED, H_I1/H_I4 REJECTED, H_I2 UNKNOWN due to M3 audit gap).
  Conclusion: do NOT rescue ricci_flow post-hoc — open new lineage with
  substrates that carry direct financial mechanics.

# ----------------------------------------------------------------
# §2 — Central goal (verbatim from plan §2)
# ----------------------------------------------------------------
central_goal: |
  Build GeoSync as benchmark engine for financial systemic-risk
  mechanisms:
    financial substrate -> crisis window -> mechanistic signal ->
    null hierarchy -> power analysis -> canonical run -> claim ledger.
  Do not prove a chosen hypothesis. Do not tune parameters. Do not
  "rescue" negative results. Build a system where only signal that
  survives null models + power analysis + crisis-grounded validation
  survives.

# ----------------------------------------------------------------
# §3 — Central thesis (verbatim from plan §3)
# ----------------------------------------------------------------
central_thesis: |
  Financial systemic-risk signal must be sought in mechanisms with
  economic causality (repo collateral chains, liquidity rollover stress,
  interbank exposure concentration, haircut shock propagation,
  rehypothecation loops, funding maturity mismatch, market-wide
  deleveraging, crisis-window synchronisation). If signal exists, it
  manifests as detectable deviation from strong nulls inside known
  stress windows.

# ----------------------------------------------------------------
# §4 — Research questions (5 pinned at pre-registration)
# ----------------------------------------------------------------
research_questions:
  - id: RQ1
    question: |
      Can financially motivated substrates yield stronger signal/null
      separation than ricci_flow?
  - id: RQ2
    question: |
      Does detectable precursor signal emerge before real crisis
      windows?
  - id: RQ3
    question: |
      Which null models best kill false signal?
  - id: RQ4
    question: |
      What minimum sample/seed/bootstrap/shuffle budget yields
      power ≥ 0.8?
  - id: RQ5
    question: |
      Can we build a reproducible benchmark where negative results
      carry equal value to positive ones?

# ----------------------------------------------------------------
# §5 — Architecture (7 workstreams)
# ----------------------------------------------------------------
workstreams:
  - id: W1
    name: Data Source Matrix
    plan_section: §6
    summary: |
      Public source registry: BIS banking statistics, FRED/ALFRED,
      OFR / repo / short-term funding, ECB money-market / secured
      funding literature, public bank balance-sheet proxies, public
      crisis timelines, rates/FX/liquidity stress indicators.
    acceptance: |
      Each source has provenance, license boundary, coverage window,
      frequency, known limitations.
    scaffold_doc: docs/research/D002J_DATA_SOURCE_MATRIX.md
  - id: W2
    name: Crisis Window Registry
    plan_section: §7
    summary: |
      Initial set: 2007-2009 GFC; 2011-2012 Eurozone Sovereign; 2019
      US Repo Spike; 2020 COVID Dash-for-Cash; 2022 UK Gilt/LDI;
      2023 Regional Banking Stress.
    acceptance: |
      Each window: start_date, end_date, justification, observable
      stress indicators, related data sources, forbidden
      interpretations.
    scaffold_doc: docs/research/D002J_CRISIS_WINDOW_REGISTRY.md
  - id: W3
    name: Synthetic Positive Controls
    plan_section: §8
    summary: |
      Substrates: planted_precrisis_synchronisation;
      planted_liquidity_contagion; planted_repo_haircut_spiral;
      planted_network_concentration_shock.
    acceptance: |
      Known effect size, known onset time, known null expectation,
      known topology, known failure mode; pipeline detects planted
      signal AND refuses corrupted positive control.
  - id: W4
    name: Financial Mechanistic Substrates
    plan_section: §9
    summary: |
      Candidates: repo_collateral_haircut_network;
      rehypothecation_chain; liquidity_rollover_stress;
      DebtRank_contagion; interbank_exposure_reconstruction;
      Barabasi_balance_sheet_constrained; FX_rates_shock_propagation.
    acceptance: |
      Explicit economic mechanism; interpretable parameters;
      null-admissibility testable; failure modes predeclared; no
      substrate promoted without positive-control survival.
  - id: W5
    name: Null Model Hierarchy
    plan_section: §10
    summary: |
      Models: degree_preserving; weight_preserving;
      temporal_block_bootstrap; window_shift_placebo;
      label_permutation; configuration_model;
      sparse_maximum_entropy_reconstruction; shock_time_placebo;
      IAAFT_surrogate.
    acceptance: |
      Each null has concrete failure target; null does NOT destroy
      invariants it should preserve; non-trivial; deterministic
      replay; documented invalid conditions.
    scaffold_doc: docs/research/D002J_NULL_MODEL_HIERARCHY.md
  - id: W6
    name: Power-First Canonical Design
    plan_section: §11
    summary: |
      Mandatory metrics: minimal_detectable_effect; n_min;
      power_target ≥ 0.8; runtime_budget; false_negative_risk;
      metric_specific_power; null_specific_power.
    acceptance: |
      Hard gate: no canonical run without power report; no grid with
      majority underpowered cells; explicit runtime budget; explicit
      false-negative risk; predeclared stopping rule.
    scaffold_doc: docs/research/D002J_POWER_FIRST_PROTOCOL.md
  - id: W7
    name: Benchmark Package
    plan_section: §12
    summary: |
      Documents: README_RESEARCH, DATA_CARD, MODEL_CARD,
      BENCHMARK_CARD, NEGATIVE_RESULTS, REPRODUCE, LEADERBOARD,
      CLAIM_LEDGER.
    acceptance: |
      One-command reproduction; deterministic outputs; no hidden
      data dependency; no unbounded claim; negative results
      preserved; external reader understands benchmark without
      reading 20 PRs.

