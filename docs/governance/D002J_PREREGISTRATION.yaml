# ----------------------------------------------------------------
# §22 — Final framing (verbatim from plan §22)
# ----------------------------------------------------------------
final_framing: |
  D-002J turns GeoSync from a system that checks one substrate
  hypothesis into a reproducible research bench for financial
  systemic-risk mechanisms. Goal is not to avoid falsification —
  goal is to build data/null/power/governance quality such that
  falsification becomes the main source of scientific power, not
  a destruction of work.

