  truthful terminal outcome.

# ----------------------------------------------------------------
# §1 — Central claim (pre-register exactly this scope, no broader)
# ----------------------------------------------------------------
central_claim: >
  A narrow, event-conditioned funding-liquidity benchmark can produce
  detectable crisis-transition signatures under point-in-time public
  observables, scored against pre-registered matched placebo windows,
  WITHOUT relying on a broad canonical sweep.

# ----------------------------------------------------------------
# §2 — Locked mechanism (single, the strongest P5 substrate)
# ----------------------------------------------------------------
primary_mechanism: funding_liquidity_rollover
primary_mechanism_rationale: >
  The funding_liquidity_rollover substrate has the most direct
  point-in-time public observables (SOFR, OFR tri-party repo volumes,
  FRED H.15 reference rates) and the lowest fake-network risk of the
  three P5 substrates — it does not require a contagion-proxy or an
  unobservable interbank network. It is the single locked mechanism;
  no other P5 substrate is in scope for D-002K.

# ----------------------------------------------------------------
# §3 — Locked crisis windows (three, all funding-liquidity events)
# ----------------------------------------------------------------
primary_windows:
  - CW3_US_REPO_SPIKE_2019
  - CW4_COVID_DASH_FOR_CASH_2020
  - CW5_UK_GILT_LDI_2022
primary_windows_rationale: >
  CW3 (2019 US repo spike), CW4 (2020 COVID dash-for-cash), and CW5
  (2022 UK gilt/LDI crisis) are each a funding-liquidity stress event
  with strong public point-in-time data and a direct observable path
  to the funding_liquidity_rollover mechanism. They are exactly the
  three crisis windows the P5 funding_liquidity_rollover substrate
  declares; no broader window set is in scope.

# ----------------------------------------------------------------
# §4 — Observable families (point-in-time public only)
# ----------------------------------------------------------------
primary_observable_families:
  - level_shift
  - spread_widening
  - volatility_burst
  - recovery_time
  - transition_steepness
  - stress_persistence

# ----------------------------------------------------------------
# §5 — Primary metric (exactly ONE locked endpoint)
# ----------------------------------------------------------------
primary_metric: pre_post_standardized_mean_shift
primary_metric_definition: >
  pre_post_standardized_mean_shift := (mean(funding_stress_index over
  the locked in-crisis window) - mean(funding_stress_index over the
  locked matched pre-window baseline)) / pooled_std(pre-window
  baseline). It is a single scalar standardized mean shift (Cohen's-d
  form) of the funding_stress_index observable between the locked
  pre-window baseline and the locked in-crisis window, computed
  identically for every crisis window and every matched placebo
  window. Exactly one primary endpoint; not "a few".

# ----------------------------------------------------------------
# §6 — Secondary metrics (exploratory ONLY, never confirmatory)
# ----------------------------------------------------------------
secondary_metrics:
  - max_zscore
  - area_under_stress_curve
  - recovery_half_life
  - slope_into_crisis
  - volatility_ratio
  - persistence_above_threshold
secondary_metrics_status: exploratory_only
secondary_metrics_note: >
  Secondary metrics are exploratory ONLY. They never enter the primary
  confirmatory decision, never enter the Bonferroni denominator, and
  may not be promoted to a primary endpoint without a fresh D-002L
  pre-registration.

# ----------------------------------------------------------------
# §7 — Matched-placebo policy (locked BEFORE any scoring)
# ----------------------------------------------------------------
matched_placebo_policy:
  match_on:
    - macro_period
    - volatility_regime
    - calendar_length
    - data_availability
    - pre_window_baseline_variance
  n_placebo_per_crisis: 5
  selection: deterministic_pre_registered_algorithm
  selection_note: >
    Placebo windows are selected by a deterministic pre-registered
    algorithm seeded only by the locked crisis-window calendar and the
    match_on covariates. They are NOT hand-picked. The selection
    algorithm and its inputs are locked at this pre-registration and
    may not be altered after scoring opens.
  locked_before_scoring: true

# ----------------------------------------------------------------
# §8 — Power-gate policy (the D-002J lesson applied at P-power)
# ----------------------------------------------------------------
power_gate_policy:
  must_run_before_any_scoring: true
  power_target: 0.8
  alpha_policy:
    family: bonferroni
    denominator_rule: "n_windows * n_primary_metrics"
    denominator_value: 3
    note: >
      Narrow BY DESIGN — NOT relaxed. 3 crisis windows x 1 primary
      metric = Bonferroni denominator 3. This is a legitimately smaller
      denominator because there are honestly fewer pre-registered
      hypotheses (3, not D-002J's 102), NOT because alpha was loosened
      at a fixed hypothesis count. Fewer hypotheses honestly => a
      legitimately smaller denominator. Loosening alpha at a fixed
      hypothesis count is forbidden laundering.
  refuse_if: "honest_effect_prior < minimum_detectable_effect at feasible n"
  effect_prior_source: >
    Must be honestly derived from the P4 positive-control ground-truth
    magnitudes or new pre-registered ground truth; NO inflation; the
    provenance must be documented. An inflated prior is the exact
    failure being designed against and is forbidden.

# ----------------------------------------------------------------
# §9 — Authorisation gates (all closed at pre-registration)
# ----------------------------------------------------------------
canonical_run_authorized: false
benchmark_only: true
requires_power_first_approval: true
zero_data_zero_scoring_zero_model_run: true

