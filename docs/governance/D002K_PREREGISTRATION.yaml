no_rescue_boundary: >
  D-002K does NOT reopen, mutate, or rescue D-002J. D-002J remains
  terminally REFUSED at P7 (POWER_GATE_REFUSED_UNDERPOWERED). D-002K is
  a fresh, narrower lineage designed against the effect_too_small axis.
  Narrowing the scope (3 windows, 1 mechanism, 1 primary metric) is
