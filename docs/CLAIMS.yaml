  - id: reset-wave-phase-synchronization
    priority: P0
    tier: ANCHORED
    description: >
      Damped phase synchronization on the compact manifold [-π, π)
      satisfies four numerical invariants (per docs/reset_wave_validation_report.md):
      (i) bounded phase potential V = mean(1 − cos(Δφ)) ≥ 0 by construction;
      (ii) inside the empirical stable region (coupling_gain · dt ≤ 0.2)
      V is non-increasing on every step;
      (iii) any |Δφ| > max_phase_error trips the fail-closed safety lock,
      after which final_potential == initial_potential exactly;
      (iv) same input + config ⇒ bit-identical ResetWaveResult.
      SCOPE (Wave-7 tightening): the four invariants hold ONLY under
      ideal computational conditions — single-process, synchronous
      input, no clock skew, no dropped or out-of-order updates, no
      concurrent writers. Distributed asynchronous resilience is
      tracked as a separate claim (reset-wave-distributed-resilience)
      with its own adapter and adversarial test surface; see also
