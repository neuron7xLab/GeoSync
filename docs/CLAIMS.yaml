# Claim/evidence registry — fail-closed gate for canonical claims.
#
# Each claim is a public assertion the repository makes about itself
# ("the cross-asset Kuramoto strategy survives 5 walk-forward folds",
# "the BacktesterCAL session is bit-identical across repeated runs",
# "the executable ledger is overflow-safe").
#
# A claim is admitted to canonical state only when every path listed
# under `evidence_paths` exists and is tracked. CI enforces this via
# `scripts/ci/check_claims.py`; missing evidence on a P0 / P1 claim
# fails the build.
#
# ---------------------------------------------------------------------
# Schema v2 (2026-05-03, IERD-PAI-FPS-UX-001 adoption)
# ---------------------------------------------------------------------
#
# Per-claim fields:
#
#   id              : str   — unique identifier (kebab-case).
#   priority        : str   — one of {P0, P1, P2}. P0/P1 are gated.
#   tier            : str   — IERD tier: ANCHORED | EXTRAPOLATED |
#                              SPECULATIVE | UNKNOWN. Required at v2.
#   description     : str   — one-sentence statement of the claim.
#   evidence_paths  : list  — repo-relative paths required to exist.
#                              Source files, tests, frozen artefacts.
#   added_utc       : str   — ISO 8601 UTC date claim was registered.
#
# Tier semantics:
#
#   ANCHORED
#     Evidence is complete: every artefact in evidence_paths exists,
#     a falsifying test exists and is referenced, and the surface
#     statement matches what the test verifies.
#
#   EXTRAPOLATED
#     Evidence is partial: at least one of (test, artefact, citation)
#     is named but has known limitation. The claim's description must
#     explicitly enumerate the missing evidence and the confidence
#     ceiling. May appear in product docs only with the limitation cited.
#
#   SPECULATIVE
#     Hypothesis only — no falsifying test exists yet. Forbidden in
#     README, product docs, API docs, and reports. Allowed only in
#     research notes (paper/, research/, docs/research/).
#
#   UNKNOWN
#     Tier not yet assessed. Must have a tracking issue and a deadline
#     for re-classification. Treat as SPECULATIVE for surface text.
#
# Adding a claim: append an entry, ensure every evidence_path is
# present, run `python scripts/ci/check_claims.py` locally before push.
# Promoting a P2 → P1 / P0 is a *contract change* and should be
# reviewed as carefully as a public API rename.
# Promoting EXTRAPOLATED → ANCHORED is a *contract change*: either
# the missing evidence has been added, or the description was tightened.

schema_version: 3

claims:

  - id: hpc-runtime-state-seal-bit-identical
    priority: P0
    tier: ANCHORED
    description: >
      BacktesterCAL.run produces bit-identical output on repeated calls
      against the same calibrated instance — every streaming component
      (FeatureStore, RegimeModel, Guardrails, Execution, ConformalCQR)
      rewinds to its post-calibration baseline.
    evidence_paths:
      - geosync_hpc/backtest.py
      - geosync_hpc/features.py
      - geosync_hpc/regime.py
      - geosync_hpc/risk.py
      - geosync_hpc/conformal.py
      - geosync_hpc/execution.py
      - tests/geosync_hpc/test_backtest_runtime_reset.py
    falsifier:
      test_id: tests/geosync_hpc/test_backtest_runtime_reset.py::test_backtester_run_is_bit_identical_across_repeated_calls
      invariants_cited:
        - INV-HPC1
      failure_signature: >
        Two repeated invocations of BacktesterCAL.run on the same
        calibrated instance and identical input produce a result tuple
        whose hash differs by any byte (or any element of the result
        whose binary representation differs by any ULP on identical
        hardware). The test asserts deep equality on the canonical
        result envelope; any divergence prints the offending field
        path and triggers AssertionError naming INV-HPC1.
    added_utc: "2026-04-25"
    last_updated_utc: "2026-05-08"

