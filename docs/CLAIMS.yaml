      reduction |z(t)| ≤ 1 always (INV-OA1). Subcritical decay
      R(t→∞) → 0 for K < K_c (INV-K2 / INV-OA3) and supercritical
      growth R_∞ ∝ √(K − K_c) (INV-K3) are verified by sweep tests.
    evidence_paths:
      - core/kuramoto
