  - id: reset-wave-distributed-resilience
    priority: P0
    tier: EXTRAPOLATED
    description: >
      The distributed-resilience adapter
      (geosync.neuroeconomics.reset_wave_distributed) intercepts five
      async failure modes that violate the ideal-conditions assumption
      of reset-wave-phase-synchronization: (1) clock-jitter envelope
      via JitterEnvelope, (2) staleness via StalenessGate, (3)
      out-of-order replay via ConcurrencyGuard, (4) partial node
      failure via PartialFailureDetector, (5) re-entry / adversarial
      gradient jumps via DiscontinuityMonitor. On any guard violation
      the adapter fires a fail-closed safety lock with an explicit
      `fail_reason`; the base solver does not run. EXTRAPOLATED scope:
      the guards are fail-closed by construction (FACT — tested per
      branch) but together they DO NOT deliver CAP-theorem-level
      consensus or distributed clock synchronisation; they refuse to
      compute on inputs that violate their preconditions. Residual gap
      documented in KNOWN_LIMITATIONS L-12.
    evidence_paths:
      - geosync/neuroeconomics/reset_wave_distributed.py
      - tests/test_reset_wave_distributed_resilience.py
